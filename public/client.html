<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vision Palace</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Vision Palace">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #252525;
  --blue: #4a9eff;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #4a4a4a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── Join ── */
#join-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; padding: 32px 24px;
}
.join-card { width: 100%; max-width: 340px; }
.join-wordmark {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic; font-weight: 300; font-size: 32px;
  letter-spacing: 0.04em; color: var(--text); margin-bottom: 28px; line-height: 1;
}
.join-card h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 8px; }
.join-card p { color: var(--text2); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }
.field-label { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
.join-input {
  width: 100%; padding: 15px 18px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none; -webkit-appearance: none;
  transition: border-color .2s;
}
.join-input:focus { border-color: var(--blue); }
.join-input::placeholder { color: var(--text3); }
.join-btn {
  width: 100%; margin-top: 14px; padding: 16px; background: var(--blue); border: none;
  border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  letter-spacing: -0.2px; transition: opacity .15s;
}
.join-btn:active { opacity: .85; }
.join-err { color: #ff5555; font-size: 13px; margin-top: 12px; }

/* ── App shell ── */
#app { display: none; height: 100dvh; flex-direction: column; }

/* ── Header ── */
.header {
  display: flex; align-items: center; gap: 14px; padding: 0 18px;
  height: calc(58px + var(--safe-top)); padding-top: var(--safe-top);
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-mark {
  width: 36px; height: 36px; border-radius: 10px; background: #fff;
  overflow: hidden; flex-shrink: 0;
}
.header-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
.header-info { flex: 1; }
.header-name { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; letter-spacing: 0.1px; }

/* ── Views ── */
.view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ── Tab bar ── */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot); flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0; background: none; border: none; cursor: pointer; gap: 3px;
  color: var(--text3); transition: color .15s; position: relative;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { display: flex; align-items: center; justify-content: center; height: 22px; }
.tab-icon svg { width: 22px; height: 22px; }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
.tab-badge {
  position: absolute; top: 6px; right: calc(50% - 22px);
  background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; display: none;
  align-items: center; justify-content: center; padding: 0 4px;
}

/* ── Feed ── */

.feed-scroll {
  flex: 1; overflow-y: auto; padding: 16px 14px 10px;
  display: flex; flex-direction: column; gap: 2px;
  -webkit-overflow-scrolling: touch;
}
.feed-scroll::-webkit-scrollbar { display: none; }

.date-pill { text-align: center; margin: 12px 0 8px; }
.date-pill span {
  background: var(--surface2); color: var(--text3); font-size: 11px; font-weight: 500;
  padding: 4px 12px; border-radius: 10px; letter-spacing: 0.3px;
}

/* Broadcast bubble */
.bc-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 8px; }
.bc-mark {
  width: 30px; height: 30px; border-radius: 50%; background: #fff;
  overflow: hidden; flex-shrink: 0;
}
.bc-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
.bc-bubble {
  max-width: calc(100% - 46px); background: var(--surface);
  border-radius: 18px 18px 18px 4px; overflow: hidden;
  border: 1px solid var(--border);
}
.bc-bubble.pinned { border-color: rgba(74,158,255,.4); }

.bc-pin-bar {
  padding: 8px 14px 0; font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; color: var(--blue);
  display: flex; align-items: center; gap: 6px;
}
.bc-pin-bar::before {
  content: ''; display: block; width: 3px; height: 12px;
  background: var(--blue); border-radius: 2px;
}

.bc-media img {
  width: 100%; display: block; max-height: 340px; object-fit: cover; cursor: pointer;
}
.bc-media video { width: 100%; display: block; max-height: 280px; background: #000; }
.bc-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.bc-media-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; }
.bc-media-grid video { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.media-expired { font-size: 12px; color: var(--text3); padding: 16px; font-style: italic; text-align: center; }

.bc-body { padding: 12px 14px 8px; }
.bc-price { font-size: 22px; font-weight: 800; color: var(--blue); letter-spacing: -0.8px; margin-bottom: 6px; }
.bc-text { font-size: 14px; color: #cccccc; line-height: 1.6; white-space: pre-wrap; }
.bc-time { font-size: 11px; color: var(--text3); margin-top: 8px; letter-spacing: 0.2px; }

.bc-reactions { display: flex; gap: 6px; padding: 0 10px 10px; }
.react-btn {
  flex: 1; padding: 9px 6px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .15s; -webkit-appearance: none; outline: none; letter-spacing: 0.2px;
}
.react-btn:active { opacity: .7; }
.react-btn.yes { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.5); color: #22c55e; }
.react-btn.no  { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.5); color: #ef4444; }

.feed-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 10px; color: var(--text3);
}
.feed-empty-icon {
  width: 56px; height: 56px; border-radius: 16px; background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--text3);
}
.feed-empty p { font-size: 14px; letter-spacing: 0.1px; }

/* ── Private chat (view) ── */

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px 14px 8px;
  display: flex; flex-direction: column;
  -webkit-overflow-scrolling: touch;
}
.chat-messages::-webkit-scrollbar { display: none; }

/* Message groups */
.msg-group { display: flex; flex-direction: column; margin-bottom: 14px; }
.msg-group.from-admin { align-items: flex-start; }
.msg-group.from-me    { align-items: flex-end; }

@keyframes msgSlideLeft {
  from { opacity: 0; transform: translateX(-16px) scale(0.93); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes msgSlideRight {
  from { opacity: 0; transform: translateX(16px) scale(0.93); }
  to   { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes bubblePop {
  from { opacity: 0; transform: translateY(6px) scale(0.95); }
  to   { opacity: 1; transform: none; }
}
.msg-group.anim-in.from-admin { animation: msgSlideLeft  .28s cubic-bezier(0.34, 1.2, 0.64, 1) both; }
.msg-group.anim-in.from-me    { animation: msgSlideRight .28s cubic-bezier(0.34, 1.2, 0.64, 1) both; }
.bubble.anim-in               { animation: bubblePop     .22s cubic-bezier(0.34, 1.2, 0.64, 1) both; }

.bubble {
  max-width: 75%; padding: 9px 13px; border-radius: 18px; margin-bottom: 2px;
  font-size: 15px; line-height: 1.5; word-break: break-word; white-space: pre-wrap;
}
/* Received (admin) */
.msg-group.from-admin .bubble { background: var(--surface2); color: var(--text); }
.msg-group.from-admin .bubble:first-child  { border-top-left-radius: 4px; }
.msg-group.from-admin .bubble:last-of-type { border-bottom-left-radius: 4px; }

/* Sent (me) */
.msg-group.from-me .bubble { background: var(--blue); color: #fff; }
.msg-group.from-me .bubble:first-child  { border-top-right-radius: 4px; }
.msg-group.from-me .bubble:last-of-type { border-bottom-right-radius: 4px; }

.msg-meta { font-size: 11px; color: var(--text3); margin: 2px 5px 0; letter-spacing: 0.2px; }
.msg-group.from-me .msg-meta { text-align: right; }
.bubble-img { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer; }
.bubble-vid { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; }

.typing-row { padding: 0 14px 10px; display: none; }
.typing-dots {
  display: inline-flex; gap: 4px; padding: 10px 14px;
  background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 4px;
}
.typing-dots span { width: 5px; height: 5px; background: var(--text3); border-radius: 50%; animation: bounce .9s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

.chat-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 14px; padding-bottom: max(10px, var(--safe-bot)); flex-shrink: 0;
}
.media-prev-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.prev-thumb {
  position: relative; width: 54px; height: 54px; border-radius: 8px;
  overflow: hidden; border: 1px solid var(--border);
}
.prev-thumb img, .prev-thumb video { width: 100%; height: 100%; object-fit: cover; }
.prev-thumb button {
  position: absolute; top: 3px; right: 3px; width: 16px; height: 16px;
  background: rgba(0,0,0,.85); border: none; color: #fff; border-radius: 50%;
  font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.attach-btn {
  width: 42px; height: 42px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-weight: 300;
}
.msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 22px; color: var(--text); padding: 11px 16px; font-size: 15px;
  resize: none; outline: none; max-height: 120px; min-height: 42px;
  font-family: inherit; line-height: 1.4; -webkit-appearance: none;
}
.msg-input:focus { border-color: var(--blue); }
.msg-input::placeholder { color: var(--text3); }
.send-btn {
  width: 42px; height: 42px; background: var(--blue); border: none; border-radius: 50%;
  color: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: opacity .15s;
}
.send-btn:active { opacity: .8; }
#file-input { display: none; }

.chat-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 10px; color: var(--text3);
}
.chat-empty-icon {
  width: 52px; height: 52px; border-radius: 16px; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text3);
}
.chat-empty p { font-size: 14px; }

/* ── Lightbox ── */
#lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.96);
  z-index: 200; align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
#lb-close {
  position: absolute; top: max(18px, var(--safe-top)); right: 18px;
  background: rgba(255,255,255,.1); border: none; color: #fff;
  width: 34px; height: 34px; border-radius: 50%; font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 600;
}

/* ── PWA banner ── */
#pwa-banner {
  display: none; position: fixed; bottom: calc(var(--safe-bot) + 62px); left: 12px; right: 12px;
  background: #0c1f3a; border: 1px solid rgba(74,158,255,.4); border-radius: 16px;
  padding: 14px 16px; z-index: 60; align-items: center; gap: 12px;
}
#pwa-banner.show { display: flex; }
#pwa-banner p { flex: 1; font-size: 13px; color: #a8c8f0; line-height: 1.45; }
#pwa-install { background: var(--blue); border: none; border-radius: 10px; color: #fff; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; }
#pwa-dismiss { background: none; border: none; color: var(--text3); font-size: 22px; cursor: pointer; line-height: 1; }

/* ── Splash ── */
#splash {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; gap: 12px; transition: opacity 0.5s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }
.splash-logo {
  width: 120px; height: 120px; border-radius: 26px;
  box-shadow: 0 12px 48px rgba(255,255,255,.12);
  margin-bottom: 16px; display: block;
}
.splash-sub {
  font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 400;
  letter-spacing: 0.28em; text-transform: uppercase; color: var(--text3);
}
.splash-dots { display: flex; gap: 5px; margin-top: 6px; }
.splash-dots span {
  width: 5px; height: 5px; background: var(--text3); border-radius: 50%;
  animation: bounce .9s infinite;
}
.splash-dots span:nth-child(2) { animation-delay: .15s; }
.splash-dots span:nth-child(3) { animation-delay: .3s; }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <img src="/logo.png" class="splash-logo" alt="Vision Palace">
  <div class="splash-sub">Stock updates</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<!-- Join / Login -->
<div id="join-screen">
  <div class="join-card">
    <img src="/logo.png" style="width:88px;height:88px;border-radius:20px;display:block;margin-bottom:20px;" alt="Vision Palace">
    <h1 id="entry-title">Welcome</h1>
    <p id="entry-sub"></p>

    <div class="field-label">Display name</div>
    <input class="join-input" type="text" id="name-input" placeholder="Your name" maxlength="40" autocomplete="username" autocapitalize="words">

    <div style="margin-top:16px">
      <div class="field-label">Password</div>
      <input class="join-input" type="password" id="password-input" placeholder="Password" autocomplete="current-password">
    </div>

    <div id="confirm-field" style="margin-top:16px;display:none">
      <div class="field-label">Confirm password</div>
      <input class="join-input" type="password" id="confirm-input" placeholder="Confirm password" autocomplete="new-password">
    </div>

    <button class="join-btn" id="action-btn">Continue</button>
    <div class="join-err" id="join-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="header-mark"><img src="/logo.png" alt="VP"></div>
    <div class="header-info">
      <div class="header-name">Vision Palace</div>
      <div class="header-sub" id="header-sub">Stock updates</div>
    </div>
  </div>

  <!-- Broadcast view -->
  <div class="view active" id="broadcast-view">
    <div class="feed-scroll" id="feed-scroll">
      <div class="feed-empty">
        <div class="feed-empty-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M18 8.5a4 4 0 0 1 0 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2l4 4V4L5 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <p>No updates yet</p>
      </div>
    </div>
  </div>

  <!-- Messages view -->
  <div class="view" id="messages-view">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty">
        <div class="chat-empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <p>No messages yet</p>
      </div>
    </div>
    <div class="typing-row" id="typing-row">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="chat-composer">
      <div class="media-prev-row" id="media-prev-row"></div>
      <div class="input-row">
        <label class="attach-btn" title="Attach file">+<input type="file" id="file-input" multiple accept="image/*,video/*"></label>
        <textarea class="msg-input" id="chat-input" placeholder="Type a message…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">↑</button>
      </div>
    </div>
  </div>

  <!-- Notification prompt banner -->
  <div id="notif-banner" style="display:none;align-items:center;gap:10px;padding:10px 14px;background:#0c1f3a;border-top:1px solid rgba(74,158,255,.25);flex-shrink:0">
    <span style="font-size:18px">🔔</span>
    <p style="flex:1;font-size:13px;color:#a8c8f0;line-height:1.4">Aktivera notiser för meddelanden och sändningar</p>
    <button onclick="enableNotifs()" style="background:var(--blue);border:none;border-radius:10px;color:#fff;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer">Aktivera</button>
    <button onclick="this.parentElement.style.display='none'" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1">×</button>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-broadcast" onclick="switchTab('broadcast')">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 8.5a4 4 0 0 1 0 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M5 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2l4 4V4L5 8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="tab-label">Broadcasts</span>
    </button>
    <button class="tab-btn" id="tab-messages" onclick="switchTab('messages')">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="tab-label">Messages</span>
      <span class="tab-badge" id="msg-badge"></span>
    </button>
  </div>
</div>

<!-- PWA Banner -->
<div id="pwa-banner">
  <p>Install Vision Palace on your home screen for quick access.</p>
  <button id="pwa-install">Install</button>
  <button id="pwa-dismiss">×</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">×</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
let session = JSON.parse(localStorage.getItem('vp_session') || 'null');
let socket = null;
let broadcasts = [];
let myReactions = {};
let pendingMedia = [];
let chatUnread = 0;
let chatOpen = false;
let deferredPWA = null;
let renderedMsgIds = new Set();
let loadingMsgs = false;

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPWA = e;
  if (!localStorage.getItem('vp_pwa_dismissed')) document.getElementById('pwa-banner').classList.add('show');
});
document.getElementById('pwa-install').onclick = async () => {
  if (deferredPWA) { deferredPWA.prompt(); await deferredPWA.userChoice; deferredPWA = null; }
  document.getElementById('pwa-banner').classList.remove('show');
};
document.getElementById('pwa-dismiss').onclick = () => {
  localStorage.setItem('vp_pwa_dismissed','1');
  document.getElementById('pwa-banner').classList.remove('show');
};

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab + '-view').classList.add('active');
  document.getElementById('header-sub').textContent = tab === 'broadcast' ? 'Stock updates' : 'Messages';
  chatOpen = (tab === 'messages');
  if (tab === 'messages') {
    chatUnread = 0; updateUnread();
    markRead();
    if (renderedMsgIds.size === 0) loadMessages();
    else scrollChat();
  }
}

function getInviteToken() {
  const p = location.pathname.split('/');
  const last = p[p.length - 1];
  return (last && last !== 'client') ? last : null;
}

// Set up entry screen based on whether this is a register or login flow
const inviteToken = getInviteToken();
if (inviteToken) {
  document.getElementById('entry-title').textContent = 'Welcome';
  document.getElementById('entry-sub').textContent = 'Create your account to access the exclusive stock feed.';
  document.getElementById('confirm-field').style.display = '';
  document.getElementById('password-input').autocomplete = 'new-password';
  document.getElementById('password-input').placeholder = 'Create a password';
  document.getElementById('action-btn').textContent = 'Continue';
} else {
  document.getElementById('entry-title').textContent = 'Sign in';
  document.getElementById('entry-sub').textContent = 'Welcome back.';
  document.getElementById('confirm-field').style.display = 'none';
  document.getElementById('action-btn').textContent = 'Sign in';
}

document.getElementById('action-btn').onclick = () => inviteToken ? register() : loginClient();
document.getElementById('name-input').addEventListener('keydown', e => e.key === 'Enter' && document.getElementById('password-input').focus());
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (inviteToken) document.getElementById('confirm-input').focus();
    else loginClient();
  }
});
document.getElementById('confirm-input').addEventListener('keydown', e => e.key === 'Enter' && register());

async function register() {
  const name = document.getElementById('name-input').value.trim();
  const password = document.getElementById('password-input').value;
  const confirm = document.getElementById('confirm-input').value;
  const err = document.getElementById('join-err');
  err.textContent = '';
  if (!name) { err.textContent = 'Please enter a name.'; return; }
  if (password.length < 4) { err.textContent = 'Password must be at least 4 characters.'; return; }
  if (password !== confirm) { err.textContent = 'Passwords do not match.'; return; }
  try {
    const r = await fetch(`/api/join/${inviteToken}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name, password })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Something went wrong.'; return; }
    session = d;
    localStorage.setItem('vp_session', JSON.stringify(d));
    history.replaceState(null, '', '/client');
    initApp();
  } catch { err.textContent = 'Connection error.'; }
}

async function loginClient() {
  const name = document.getElementById('name-input').value.trim();
  const password = document.getElementById('password-input').value;
  const err = document.getElementById('join-err');
  err.textContent = '';
  if (!name) { err.textContent = 'Please enter your name.'; return; }
  if (!password) { err.textContent = 'Please enter your password.'; return; }
  try {
    const r = await fetch('/api/auth/client', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name, password })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Something went wrong.'; return; }
    session = d;
    localStorage.setItem('vp_session', JSON.stringify(d));
    initApp();
  } catch { err.textContent = 'Connection error.'; }
}

function initApp() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadMessages();
  setInterval(loadBroadcasts, 8000);
  setInterval(loadMessages, 5000);
  setTimeout(setupPush, 2000);
}

function connectSocket() {
  socket = io({ auth: { session_token: session.session_token }, transports: ['websocket', 'polling'] });
  socket.on('connect', () => { loadBroadcasts(); loadMessages(); setupPush(); });
  socket.on('admin:new_broadcast', d => { broadcasts.unshift(d.broadcast); renderFeed(); scrollFeedBottom(); });
  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x=>x.id===d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderFeed();
  });
  socket.on('broadcast:deleted', d => {
    broadcasts = broadcasts.filter(b => b.id !== d.id);
    renderFeed();
  });
  socket.on('admin:new_message', d => {
    appendChatMsg(d.message);
    if (!chatOpen) { chatUnread++; updateUnread(); }
    else markRead();
  });
  socket.on('admin:typing', () => {
    const row = document.getElementById('typing-row');
    row.style.display = 'block';
    clearTimeout(window._tt);
    window._tt = setTimeout(()=>row.style.display='none', 3000);
    scrollChat();
  });
}

async function loadBroadcasts() {
  try {
    const r = await fetch('/api/broadcasts', { headers:{'x-session-token':session.session_token} });
    if (!r.ok) return;
    const d = await r.json();
    const newList = d.broadcasts || [];
    const sig = b => b.id + (b.is_pinned ? 'p' : '');
    const oldSig = broadcasts.map(sig).join();
    const newSig = newList.map(sig).join();
    if (oldSig === newSig) { broadcasts = newList; return; }
    const s = document.getElementById('feed-scroll');
    const atBottom = s.scrollHeight - s.scrollTop - s.clientHeight < 80;
    const prevTop = s.scrollTop;
    const prevH = s.scrollHeight;
    broadcasts = newList;
    renderFeed();
    if (atBottom) scrollFeedBottom();
    else requestAnimationFrame(() => { s.scrollTop = prevTop + (s.scrollHeight - prevH); });
  } catch(e) {}
}

function renderFeed() {
  const scroll = document.getElementById('feed-scroll');
  if (!broadcasts.length) {
    scroll.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon">[ ]</div><p>No updates yet</p></div>';
    return;
  }
  const sorted = [...broadcasts].sort((a,b)=>{
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return new Date(a.created_at)-new Date(b.created_at);
  });
  let html = '';
  let lastDate = '';
  for (const b of sorted) {
    const dateStr = new Date(b.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
    if (dateStr !== lastDate) {
      html += `<div class="date-pill"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    html += bcBubbleHTML(b);
  }
  scroll.innerHTML = html;
}

function bcBubbleHTML(b) {
  const time = new Date(b.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const media = b.broadcast_media || [];
  const myR = myReactions[b.id];
  const gridClass = media.length > 1 ? 'bc-media bc-media-grid' : 'bc-media';
  const mediaHTML = media.length ? `<div class="${gridClass}">${media.map(m=>
    m.storage_url
      ? (m.type==='video'
        ? `<video src="${m.storage_url}" controls playsinline preload="metadata"></video>`
        : `<img src="${m.thumbnail_url||m.storage_url}" data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
      : `<div class="media-expired">Media no longer available</div>`
  ).join('')}</div>` : '';

  return `<div class="bc-row">
    <div class="bc-mark"><img src="/logo.png" alt="VP"></div>
    <div class="bc-bubble${b.is_pinned?' pinned':''}">
      ${b.is_pinned ? '<div class="bc-pin-bar">Pinned</div>' : ''}
      ${mediaHTML}
      <div class="bc-body">
        ${b.price ? `<div class="bc-price">${esc(b.price)}</div>` : ''}
        ${b.text  ? `<div class="bc-text">${esc(b.text)}</div>` : ''}
        <div class="bc-time">${time}</div>
      </div>
      <div class="bc-reactions">
        <button class="react-btn${myR==='interested'?' yes':''}" onclick="react('${b.id}','interested')">&#10003; Interested</button>
        <button class="react-btn${myR==='not_interested'?' no':''}" onclick="react('${b.id}','not_interested')">&#10005; Pass</button>
      </div>
    </div>
  </div>`;
}

function scrollFeedBottom() {
  const s = document.getElementById('feed-scroll');
  requestAnimationFrame(()=>s.scrollTop=s.scrollHeight);
}

async function react(id, reaction) {
  myReactions[id] = reaction;
  const s = document.getElementById('feed-scroll');
  const prevTop = s.scrollTop;
  renderFeed();
  s.scrollTop = prevTop;
  await fetch(`/api/reactions/${id}`, {
    method:'POST', headers:{'Content-Type':'application/json','x-session-token':session.session_token},
    body: JSON.stringify({ reaction })
  });
}

function bubbleMediaHTML(m) {
  return (m.message_media || []).map(md =>
    md.storage_url
      ? (md.type === 'video'
        ? `<video class="bubble-vid" src="${md.storage_url}" controls playsinline></video>`
        : `<img class="bubble-img" src="${md.thumbnail_url||md.storage_url}" data-full="${md.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
      : ''
  ).join('');
}

function renderMessages(msgs) {
  const c = document.getElementById('chat-messages');
  if (!msgs.length) {
    c.innerHTML = '<div class="chat-empty"><div class="chat-empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><p>No messages yet</p></div>';
    return;
  }
  c.innerHTML = '';
  const groups = [];
  for (const m of msgs) {
    const last = groups[groups.length - 1];
    const gap = last ? new Date(m.created_at) - new Date(last.msgs[last.msgs.length-1].created_at) : Infinity;
    if (last && last.sender === m.sender && gap < 120000) last.msgs.push(m);
    else groups.push({ sender: m.sender, msgs: [m] });
  }
  for (const g of groups) {
    const from = g.sender === 'admin' ? 'from-admin' : 'from-me';
    const time = new Date(g.msgs[g.msgs.length-1].created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    const el = document.createElement('div');
    el.className = `msg-group ${from}`;
    el.innerHTML = g.msgs.map(m => `<div class="bubble">${m.text ? esc(m.text) : ''}${bubbleMediaHTML(m)}</div>`).join('')
      + `<div class="msg-meta">${time}</div>`;
    c.appendChild(el);
    g.msgs.forEach(m => renderedMsgIds.add(m.id));
  }
}

async function loadMessages() {
  if (loadingMsgs) return;
  loadingMsgs = true;
  try {
    const r = await fetch('/api/messages/me/thread', { headers:{'x-session-token':session.session_token} });
    if (!r.ok) return;
    const d = await r.json();
    const msgs = d.messages || [];
    chatUnread = msgs.filter(m => m.sender==='admin' && !m.read).length;
    updateUnread();
    if (!chatOpen) return;
    const newMsgs = msgs.filter(m => !renderedMsgIds.has(m.id));
    if (!newMsgs.length) return;
    if (renderedMsgIds.size === 0) {
      renderMessages(msgs);
      scrollChat();
    } else {
      const c = document.getElementById('chat-messages');
      const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 60;
      newMsgs.forEach(m => appendChatMsg(m));
      if (atBottom) scrollChat();
    }
  } catch(e) {} finally { loadingMsgs = false; }
}

function appendChatMsg(m) {
  if (renderedMsgIds.has(m.id)) return;
  renderedMsgIds.add(m.id);
  const c = document.getElementById('chat-messages');
  const empty = c.querySelector('.chat-empty');
  if (empty) empty.remove();
  const from = m.sender === 'admin' ? 'from-admin' : 'from-me';
  const time = new Date(m.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const lastGroup = c.querySelector('.msg-group:last-child');
  if (lastGroup && lastGroup.classList.contains(from)) {
    const meta = lastGroup.querySelector('.msg-meta');
    if (meta) meta.remove();
    const bbl = document.createElement('div');
    bbl.className = 'bubble anim-in';
    bbl.innerHTML = (m.text ? esc(m.text) : '') + bubbleMediaHTML(m);
    lastGroup.appendChild(bbl);
    const metaEl = document.createElement('div');
    metaEl.className = 'msg-meta';
    metaEl.textContent = time;
    lastGroup.appendChild(metaEl);
  } else {
    const el = document.createElement('div');
    el.className = `msg-group ${from} anim-in`;
    el.innerHTML = `<div class="bubble">${m.text ? esc(m.text) : ''}${bubbleMediaHTML(m)}</div><div class="msg-meta">${time}</div>`;
    c.appendChild(el);
  }
  if (chatOpen) scrollChat();
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  requestAnimationFrame(()=>c.scrollTop=c.scrollHeight);
}

function updateUnread() {
  const el = document.getElementById('msg-badge');
  if (chatUnread>0) { el.textContent=chatUnread; el.style.display='flex'; }
  else el.style.display='none';
}

async function markRead() {
  if (!session) return;
  await fetch(`/api/messages/${session.client_id}/read`, { method:'POST', headers:{'x-session-token':session.session_token} });
  if (socket) socket.emit('client:read_receipt',{client_id:session.client_id});
}

document.getElementById('send-btn').onclick = sendMsg;
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMsg(); }
  if (socket) socket.emit('client:typing');
});
document.getElementById('chat-input').addEventListener('input', function(){ autoResize(this); });

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && !pendingMedia.length) return;
  input.value = '';
  autoResize(input);
  const r = await fetch('/api/messages/me/send', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-session-token':session.session_token},
    body: JSON.stringify({ text, media: pendingMedia })
  });
  if (r.ok) {
    pendingMedia = [];
    document.getElementById('media-prev-row').innerHTML = '';
    const d = await r.json();
    appendChatMsg(d.message);
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

document.getElementById('file-input').addEventListener('change', async e => {
  const form = new FormData();
  Array.from(e.target.files).forEach(f=>form.append('files',f));
  const r = await fetch('/api/upload', { method:'POST', headers:{'x-session-token':session.session_token}, body:form });
  if (!r.ok) { alert('Upload failed. Please try again.'); return; }
  const d = await r.json();
  const row = document.getElementById('media-prev-row');
  for (const f of d.files) {
    pendingMedia.push(f);
    const div = document.createElement('div');
    div.className = 'prev-thumb';
    div.innerHTML = f.type==='video'
      ? `<video src="${f.url}" muted></video><button onclick="rmMedia(this,'${f.url}')">×</button>`
      : `<img src="${f.thumbUrl}"><button onclick="rmMedia(this,'${f.url}')">×</button>`;
    row.appendChild(div);
  }
  e.target.value = '';
});

function rmMedia(btn, url) {
  pendingMedia = pendingMedia.filter(f=>f.url!==url);
  btn.closest('.prev-thumb').remove();
}

function openLightbox(src) {
  document.getElementById('lb-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick = e => {
  if (e.target===e.currentTarget||e.target.id==='lb-close') document.getElementById('lightbox').classList.remove('open');
};

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:calc(var(--safe-bot)+80px);left:50%;transform:translateX(-50%);
    background:${type==='error'?'#3d1a1a':'#1a3d2a'};color:${type==='error'?'#ff8888':'#66dd99'};
    border:1px solid ${type==='error'?'rgba(255,80,80,.4)':'rgba(80,200,120,.4)'};
    padding:10px 18px;border-radius:12px;font-size:13px;z-index:999;
    max-width:90vw;text-align:center;pointer-events:none;white-space:pre-wrap;word-break:break-all;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), type === 'error' ? 8000 : 3000);
}

async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (Notification.permission === 'denied') return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-banner').style.display = 'flex';
    return;
  }
  await registerClientPushSub();
}

async function enableNotifs() {
  const perm = await Notification.requestPermission();
  document.getElementById('notif-banner').style.display = 'none';
  if (perm !== 'granted') return;
  await registerClientPushSub();
}

async function registerClientPushSub() {
  try {
    const kr = await fetch('/api/push/vapid-key');
    if (!kr.ok) throw new Error('vapid-key ' + kr.status);
    const { publicKey } = await kr.json();
    if (!publicKey) throw new Error('no publicKey');

    const sw = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('SW timeout')), 10000))
    ]);

    const existing = await sw.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
    const sub = await sw.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });
    if (!sub) throw new Error('subscribe returned null');

    const r = await fetch('/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-session-token': session.session_token },
      body: JSON.stringify({ subscription: sub.toJSON() })
    });
    if (!r.ok) throw new Error('server ' + r.status);
    console.log('[Push] subscription saved');
  } catch(e) {
    console.error('[Push] setup failed:', e);
    showToast('Notiser: ' + e.message, 'error');
  }
}

function urlBase64ToUint8Array(b64) {
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

const splashStart = Date.now();
const MIN_SPLASH = 1400;

function hideSplash(cb) {
  const wait = Math.max(0, MIN_SPLASH - (Date.now() - splashStart));
  setTimeout(() => {
    const s = document.getElementById('splash');
    s.classList.add('fade-out');
    setTimeout(() => { s.style.display = 'none'; cb && cb(); }, 500);
  }, wait);
}

if (session?.session_token) {
  fetch('/api/messages/me/thread', { headers:{'x-session-token':session.session_token} })
    .then(r => {
      if (r.ok) hideSplash(initApp);
      else { session = null; localStorage.removeItem('vp_session'); hideSplash(); }
    })
    .catch(() => hideSplash());
} else {
  hideSplash();
}
</script>

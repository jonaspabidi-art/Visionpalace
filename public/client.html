<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vision Palace</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Vision Palace">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --blue: #4a9eff;
  --blue-dim: #1a3a6a;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── Join screen ── */
#join-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; padding: 24px; background: var(--bg);
}
.join-card {
  width: 100%; max-width: 380px; text-align: center;
}
.join-logo {
  width: 72px; height: 72px; background: var(--blue); border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900; color: #fff; margin: 0 auto 20px;
  letter-spacing: -1px; box-shadow: 0 8px 32px rgba(74,158,255,.35);
}
.join-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.join-card p { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
.join-card input {
  width: 100%; padding: 15px 18px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none;
  transition: border-color .2s; -webkit-appearance: none;
}
.join-card input:focus { border-color: var(--blue); }
.join-card input::placeholder { color: var(--text3); }
.join-btn {
  width: 100%; margin-top: 12px; padding: 15px; background: var(--blue); border: none;
  border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  transition: opacity .15s; letter-spacing: -0.2px;
}
.join-btn:active { opacity: .8; }
.join-error { color: #ff5555; font-size: 13px; margin-top: 12px; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; display: flex; align-items: center; gap: 12px;
  height: calc(56px + var(--safe-top)); padding-top: var(--safe-top);
  flex-shrink: 0; position: relative; z-index: 10;
}
.header-logo {
  width: 36px; height: 36px; background: var(--blue); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: #fff; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.header-icon-btn {
  width: 36px; height: 36px; background: none; border: none;
  color: var(--text2); font-size: 20px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; border-radius: 50%;
  position: relative; flex-shrink: 0;
}

/* ── Tab bar ── */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot); flex-shrink: 0; position: relative; z-index: 10;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0; background: none; border: none; cursor: pointer; gap: 4px;
  color: var(--text3); transition: color .15s; position: relative;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { font-size: 20px; line-height: 1; }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2px; }
.tab-badge {
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; display: none;
  align-items: center; justify-content: center; padding: 0 4px;
}

/* ── Content views ── */
.view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* ── Feed ── */
#feed-scroll {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
}
#feed-scroll::-webkit-scrollbar { display: none; }

.broadcast-card {
  background: var(--surface); border-radius: 18px; overflow: hidden;
  border: 1px solid var(--border);
}
.broadcast-card.pinned { border-color: rgba(74,158,255,.4); }

.card-media-wrap { position: relative; }
.card-media-wrap img {
  width: 100%; display: block; max-height: 420px; object-fit: cover; cursor: pointer;
}
.card-media-wrap video { width: 100%; display: block; max-height: 360px; background: #000; }
.card-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.card-media-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; }
.card-media-grid video { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.pin-chip {
  position: absolute; top: 10px; left: 10px; background: var(--blue);
  color: #fff; font-size: 10px; font-weight: 700; padding: 4px 8px;
  border-radius: 6px; letter-spacing: 0.3px; display: flex; align-items: center; gap: 4px;
}

.card-body { padding: 14px 16px 12px; }
.card-price {
  font-size: 22px; font-weight: 800; color: var(--blue); letter-spacing: -0.5px; margin-bottom: 8px;
}
.card-text { font-size: 14px; color: #d0d0d0; line-height: 1.55; white-space: pre-wrap; }
.card-time { font-size: 11px; color: var(--text3); margin-top: 8px; }

.card-reactions {
  display: flex; gap: 8px; padding: 0 12px 12px;
}
.react-btn {
  flex: 1; padding: 10px 8px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s; -webkit-appearance: none; outline: none;
}
.react-btn:active { transform: scale(.96); }
.react-btn.yes { background: rgba(34,197,94,.12); border-color: #22c55e; color: #22c55e; }
.react-btn.no { background: rgba(239,68,68,.12); border-color: #ef4444; color: #ef4444; }

.media-expired { font-size: 12px; color: var(--text3); padding: 20px; text-align: center; font-style: italic; }
.feed-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--text3); }
.feed-empty-icon { font-size: 48px; opacity: .3; }
.feed-empty p { font-size: 14px; }

/* ── Chat view ── */
#chat-view { background: var(--bg); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px 12px 4px;
  display: flex; flex-direction: column; gap: 4px;
  -webkit-overflow-scrolling: touch;
}
.chat-messages::-webkit-scrollbar { display: none; }

/* Date divider */
.date-divider {
  text-align: center; margin: 8px 0; position: relative;
}
.date-divider span {
  background: var(--surface2); color: var(--text3); font-size: 11px;
  padding: 3px 10px; border-radius: 8px;
}

/* Bubbles */
.msg-row { display: flex; flex-direction: column; margin-bottom: 2px; }
.msg-row.from-admin { align-items: flex-start; }
.msg-row.from-me { align-items: flex-end; }

.bubble {
  max-width: 78%; padding: 9px 13px; border-radius: 18px; position: relative;
  word-break: break-word; white-space: pre-wrap; font-size: 15px; line-height: 1.4;
}
.msg-row.from-admin .bubble {
  background: var(--surface2); color: var(--text); border-bottom-left-radius: 5px;
}
.msg-row.from-me .bubble {
  background: var(--blue); color: #fff; border-bottom-right-radius: 5px;
}
.bubble-media img {
  max-width: 220px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer;
}
.bubble-media video { max-width: 220px; border-radius: 10px; display: block; margin-top: 6px; }
.msg-meta {
  font-size: 11px; color: var(--text3); margin: 3px 4px 6px; display: flex;
  align-items: center; gap: 4px;
}
.msg-row.from-me .msg-meta { justify-content: flex-end; color: rgba(255,255,255,.45); }

.typing-row { display: flex; align-items: center; gap: 8px; padding: 4px 0 8px; }
.typing-dots { display: flex; gap: 4px; padding: 10px 14px; background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 5px; }
.typing-dots span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce .9s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Chat composer */
.chat-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 12px; padding-bottom: max(10px, var(--safe-bot));
  flex-shrink: 0;
}
.chat-media-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.preview-thumb {
  position: relative; width: 58px; height: 58px; border-radius: 10px;
  overflow: hidden; border: 1px solid var(--border);
}
.preview-thumb img, .preview-thumb video { width: 100%; height: 100%; object-fit: cover; }
.preview-thumb button {
  position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  background: rgba(0,0,0,.75); border: none; color: #fff; border-radius: 50%;
  font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.composer-row { display: flex; align-items: flex-end; gap: 8px; }
.attach-btn {
  width: 42px; height: 42px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 22px; color: var(--text); padding: 11px 16px; font-size: 15px;
  resize: none; outline: none; max-height: 120px; min-height: 42px; font-family: inherit;
  line-height: 1.4; transition: border-color .2s;
}
.chat-input:focus { border-color: var(--blue); }
.chat-input::placeholder { color: var(--text3); }
.send-btn {
  width: 42px; height: 42px; background: var(--blue); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; transition: opacity .15s;
}
.send-btn:active { opacity: .8; }
#client-file-input { display: none; }

.chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text3); }
.chat-empty-icon { font-size: 48px; opacity: .25; }
.chat-empty p { font-size: 13px; }

/* ── Lightbox ── */
#lightbox {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95);
  z-index: 999; align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
#lb-close {
  position: absolute; top: max(16px, var(--safe-top)); right: 16px;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer;
}

/* ── PWA banner ── */
#pwa-banner {
  display: none; position: fixed;
  bottom: calc(var(--safe-bot) + 70px); left: 12px; right: 12px;
  background: #0d2040; border: 1px solid var(--blue); border-radius: 16px;
  padding: 14px 16px; z-index: 50; align-items: center; gap: 10px;
}
#pwa-banner.show { display: flex; }
#pwa-banner p { flex: 1; font-size: 13px; color: #b8d4f8; line-height: 1.4; }
#pwa-install { background: var(--blue); border: none; border-radius: 10px; color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
#pwa-dismiss { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }
</style>
</head>
<body>

<!-- Join -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-logo">VP</div>
    <h1>Vision Palace</h1>
    <p>Ange ditt namn för att gå med</p>
    <input type="text" id="name-input" placeholder="Ditt namn" maxlength="40" autocomplete="off" autocapitalize="words">
    <button class="join-btn" id="join-btn">Fortsätt</button>
    <div class="join-error" id="join-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Header -->
  <div class="app-header">
    <div class="header-logo">VP</div>
    <div class="header-info">
      <div class="header-title">Vision Palace</div>
      <div class="header-sub" id="header-sub">Lageruppdateringar</div>
    </div>
    <button class="header-icon-btn" id="chat-tab-btn" title="Meddelanden">
      💬
      <span class="tab-badge" id="header-badge"></span>
    </button>
  </div>

  <!-- Content -->
  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">

    <!-- Feed view -->
    <div class="view active" id="feed-view">
      <div id="feed-scroll">
        <div class="feed-empty">
          <div class="feed-empty-icon">📦</div>
          <p>Inga uppdateringar ännu</p>
        </div>
      </div>
    </div>

    <!-- Chat view -->
    <div class="view" id="chat-view">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">
          <div class="chat-empty-icon">💬</div>
          <p>Inga meddelanden ännu</p>
        </div>
      </div>
      <div class="typing-row" id="typing-row" style="display:none;padding:0 16px 4px">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="chat-composer">
        <div class="chat-media-preview" id="chat-media-preview"></div>
        <div class="composer-row">
          <label class="attach-btn">📎<input type="file" id="client-file-input" multiple accept="image/*,video/*"></label>
          <textarea class="chat-input" id="chat-input" placeholder="Skriv ett meddelande…" rows="1"></textarea>
          <button class="send-btn" id="send-btn">↑</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-feed" onclick="switchTab('feed')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Uppdateringar</span>
    </button>
    <button class="tab-btn" id="tab-chat" onclick="switchTab('chat')">
      <span class="tab-icon">💬</span>
      <span class="tab-label">Meddelanden</span>
      <span class="tab-badge" id="tab-badge"></span>
    </button>
  </div>
</div>

<!-- PWA Banner -->
<div id="pwa-banner">
  <p>Installera Vision Palace på hemskärmen</p>
  <button id="pwa-install">Installera</button>
  <button id="pwa-dismiss">✕</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
const ONESIGNAL_APP_ID = '90d6532e-6887-42ce-8646-4354e6aa77fe';
let session = JSON.parse(localStorage.getItem('vp_session') || 'null');
let socket = null;
let broadcasts = [];
let myReactions = {};
let pendingMedia = [];
let chatUnread = 0;
let activeTab = 'feed';
let deferredPWA = null;

// ── Service worker ──
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

// ── PWA ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPWA = e;
  if (!localStorage.getItem('vp_pwa_dismissed')) document.getElementById('pwa-banner').classList.add('show');
});
document.getElementById('pwa-install').onclick = async () => {
  if (deferredPWA) { deferredPWA.prompt(); await deferredPWA.userChoice; deferredPWA = null; }
  document.getElementById('pwa-banner').classList.remove('show');
};
document.getElementById('pwa-dismiss').onclick = () => {
  localStorage.setItem('vp_pwa_dismissed','1');
  document.getElementById('pwa-banner').classList.remove('show');
};

// ── Tab switching ──
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab + '-view').classList.add('active');
  if (tab === 'chat') {
    chatUnread = 0; updateBadge();
    markRead();
    scrollChatBottom();
  }
}
document.getElementById('chat-tab-btn').onclick = () => switchTab('chat');

// ── Invite token ──
function getToken() {
  const parts = location.pathname.split('/');
  return parts[parts.length - 1] !== 'client' ? parts[parts.length - 1] : null;
}

// ── Join ──
document.getElementById('join-btn').onclick = join;
document.getElementById('name-input').addEventListener('keydown', e => e.key === 'Enter' && join());
async function join() {
  const name = document.getElementById('name-input').value.trim();
  const err = document.getElementById('join-error');
  err.textContent = '';
  if (!name) { err.textContent = 'Ange ett namn'; return; }
  const token = getToken();
  if (!token) { err.textContent = 'Ogiltig inbjudningslänk'; return; }
  try {
    const r = await fetch(`/api/join/${token}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Fel uppstod'; return; }
    session = d;
    localStorage.setItem('vp_session', JSON.stringify(d));
    initApp();
  } catch { err.textContent = 'Anslutningsfel'; }
}

// ── Init ──
function initApp() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadMessages();
}

function connectSocket() {
  socket = io({ auth: { session_token: session.session_token } });
  socket.on('admin:new_broadcast', d => { broadcasts.unshift(d.broadcast); renderBroadcasts(); });
  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x => x.id === d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderBroadcasts();
  });
  socket.on('admin:new_message', d => {
    appendMsg(d.message);
    if (activeTab !== 'chat') { chatUnread++; updateBadge(); }
    else markRead();
  });
  socket.on('admin:typing', () => {
    const row = document.getElementById('typing-row');
    row.style.display = 'flex';
    clearTimeout(window._tt);
    window._tt = setTimeout(() => row.style.display = 'none', 3000);
    scrollChatBottom();
  });
}

// ── Broadcasts ──
async function loadBroadcasts() {
  const r = await fetch('/api/broadcasts', { headers: { 'x-session-token': session.session_token } });
  const d = await r.json();
  broadcasts = d.broadcasts || [];
  renderBroadcasts();
}

function renderBroadcasts() {
  const feed = document.getElementById('feed-scroll');
  if (!broadcasts.length) {
    feed.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon">📦</div><p>Inga uppdateringar ännu</p></div>';
    return;
  }
  const sorted = [...broadcasts].sort((a,b) => {
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });
  feed.innerHTML = sorted.map(broadcastHTML).join('');
}

function broadcastHTML(b) {
  const date = new Date(b.created_at).toLocaleString('sv-SE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  const media = b.broadcast_media || [];
  const myR = myReactions[b.id];
  const gridClass = media.length === 1 ? '' : 'card-media-grid';

  const mediaHTML = media.length ? `
    <div class="card-media-wrap">
      ${b.is_pinned ? '<div class="pin-chip">📌 Fäst</div>' : ''}
      <div class="${gridClass}">
        ${media.map(m => m.storage_url
          ? (m.type==='video'
            ? `<video src="${m.storage_url}" controls playsinline preload="metadata"></video>`
            : `<img src="${m.thumbnail_url||m.storage_url}" data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
          : `<div class="media-expired">📷 Bild ej längre tillgänglig</div>`
        ).join('')}
      </div>
    </div>` : '';

  const hasBody = b.text || b.price;

  return `<div class="broadcast-card${b.is_pinned?' pinned':''}">
    ${mediaHTML}
    ${hasBody ? `<div class="card-body">
      ${b.price ? `<div class="card-price">${esc(b.price)}</div>` : ''}
      ${b.text ? `<div class="card-text">${esc(b.text)}</div>` : ''}
      <div class="card-time">${date}</div>
    </div>` : `<div style="padding:0 16px 4px"><div class="card-time">${date}</div></div>`}
    <div class="card-reactions">
      <button class="react-btn${myR==='interested'?' yes':''}" onclick="react('${b.id}','interested')">👍 Intresserad</button>
      <button class="react-btn${myR==='not_interested'?' no':''}" onclick="react('${b.id}','not_interested')">❌ Inte intresserad</button>
    </div>
  </div>`;
}

async function react(id, reaction) {
  myReactions[id] = reaction;
  renderBroadcasts();
  await fetch(`/api/reactions/${id}`, {
    method:'POST', headers:{'Content-Type':'application/json','x-session-token':session.session_token},
    body: JSON.stringify({ reaction })
  });
}

// ── Messages ──
async function loadMessages() {
  const r = await fetch('/api/messages/me/thread', { headers: { 'x-session-token': session.session_token } });
  const d = await r.json();
  const msgs = d.messages || [];
  chatUnread = msgs.filter(m => m.sender==='admin' && !m.read).length;
  updateBadge();
  const c = document.getElementById('chat-messages');
  if (!msgs.length) return;
  c.innerHTML = msgs.map(msgHTML).join('');
  scrollChatBottom();
}

function appendMsg(m) {
  const c = document.getElementById('chat-messages');
  const empty = c.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = msgHTML(m);
  c.appendChild(div.firstElementChild);
  scrollChatBottom();
}

function msgHTML(m) {
  const time = new Date(m.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const from = m.sender === 'admin' ? 'from-admin' : 'from-me';
  const media = m.message_media || [];
  const mediaHTML = media.map(md => md.storage_url
    ? (md.type==='video'
      ? `<video src="${md.storage_url}" controls playsinline style="max-width:220px;border-radius:10px;margin-top:6px;display:block"></video>`
      : `<img src="${md.thumbnail_url||md.storage_url}" data-full="${md.storage_url}" onclick="openLightbox(this.dataset.full)" style="max-width:220px;border-radius:10px;margin-top:6px;cursor:pointer;display:block" loading="lazy">`)
    : `<span style="font-size:12px;color:#555;font-style:italic">Bild ej längre tillgänglig</span>`
  ).join('');
  return `<div class="msg-row ${from}">
    <div class="bubble">${m.text?esc(m.text):''}${mediaHTML?`<div class="bubble-media">${mediaHTML}</div>`:''}</div>
    <div class="msg-meta">${time}</div>
  </div>`;
}

function scrollChatBottom() {
  const c = document.getElementById('chat-messages');
  requestAnimationFrame(() => c.scrollTop = c.scrollHeight);
}

function updateBadge() {
  const b1 = document.getElementById('tab-badge');
  const b2 = document.getElementById('header-badge');
  if (chatUnread > 0) {
    b1.textContent = b2.textContent = chatUnread;
    b1.style.display = b2.style.display = 'flex';
  } else {
    b1.style.display = b2.style.display = 'none';
  }
}

async function markRead() {
  if (!session) return;
  await fetch(`/api/messages/${session.client_id}/read`, {
    method:'POST', headers:{'x-session-token':session.session_token}
  });
  if (socket) socket.emit('client:read_receipt',{client_id:session.client_id});
}

document.getElementById('send-btn').onclick = sendMsg;
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  if (socket) socket.emit('client:typing');
});

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && !pendingMedia.length) return;
  input.value = '';
  const r = await fetch('/api/messages/me/send', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-session-token':session.session_token},
    body: JSON.stringify({ text, media: pendingMedia })
  });
  if (r.ok) {
    pendingMedia = [];
    document.getElementById('chat-media-preview').innerHTML = '';
    const d = await r.json();
    appendMsg(d.message);
  }
}

// ── File upload ──
document.getElementById('client-file-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  const form = new FormData();
  files.forEach(f => form.append('files', f));
  const r = await fetch('/api/upload', {
    method:'POST', headers:{'x-session-token':session.session_token}, body: form
  });
  if (!r.ok) { alert('Uppladdning misslyckades'); return; }
  const d = await r.json();
  const prev = document.getElementById('chat-media-preview');
  for (const f of d.files) {
    pendingMedia.push(f);
    const div = document.createElement('div');
    div.className = 'preview-thumb';
    div.innerHTML = f.type==='video'
      ? `<video src="${f.url}" muted></video><button onclick="rmMedia(this,'${f.url}')">✕</button>`
      : `<img src="${f.thumbUrl}"><button onclick="rmMedia(this,'${f.url}')">✕</button>`;
    prev.appendChild(div);
  }
  e.target.value = '';
});

function rmMedia(btn, url) {
  pendingMedia = pendingMedia.filter(f => f.url !== url);
  btn.closest('.preview-thumb').remove();
}

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick = e => {
  if (e.target===e.currentTarget||e.target.id==='lb-close') document.getElementById('lightbox').classList.remove('open');
};

// ── Utils ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Boot ──
if (session?.session_token) {
  fetch('/api/messages/me/thread', { headers: { 'x-session-token': session.session_token } })
    .then(r => { if (r.ok) initApp(); else { session=null; localStorage.removeItem('vp_session'); } })
    .catch(() => {});
}
</script>

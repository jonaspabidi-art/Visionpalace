<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vision Palace</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vision Palace">
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Join screen */
#join-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#0f0f0f;padding:24px}
.join-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;padding:40px 32px;width:100%;max-width:360px;text-align:center}
.join-box h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.join-box p{color:#666;font-size:14px;margin-bottom:28px}
.join-box input{width:100%;padding:14px 16px;background:#252525;border:1px solid #333;border-radius:12px;color:#fff;font-size:16px;outline:none;transition:border .2s;-webkit-appearance:none}
.join-box input:focus{border-color:#4a9eff}
.join-box button{width:100%;margin-top:14px;padding:14px;background:#4a9eff;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s}
.join-box button:hover{background:#3a8ef0}
.join-box button:active{background:#2a7fe0}
.join-error{color:#ff5555;font-size:13px;margin-top:10px}

/* App */
#app{display:none;flex-direction:column;height:100dvh;overflow:hidden}

/* Header */
.header{background:#1a1a1a;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px, env(safe-area-inset-top))}
.header h1{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.header-sub{font-size:11px;color:#555;margin-top:1px}

/* Feed */
#feed-view{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:80px}
#feed-view::-webkit-scrollbar{display:none}

.broadcast-card{background:#1a1a1a;border:1px solid #242424;border-radius:16px;overflow:hidden;transition:border .2s}
.broadcast-card.pinned{border-color:#f59e0b}

.card-header{padding:14px 16px 0;display:flex;align-items:center;gap:8px}
.pin-badge{background:#f59e0b;color:#000;font-size:10px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:0.3px}
.card-time{font-size:12px;color:#555}

.card-media{margin-top:12px}
.card-media-grid{display:grid;gap:3px}
.card-media-grid.single img,.card-media-grid.single video{width:100%;max-height:400px;object-fit:cover;display:block}
.card-media-grid.multi{grid-template-columns:1fr 1fr}
.card-media-grid.multi img{width:100%;aspect-ratio:1;object-fit:cover;cursor:pointer;display:block}
.card-media-grid.multi video{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.card-media-grid img{cursor:pointer}
.media-expired{font-size:12px;color:#444;padding:16px;font-style:italic;text-align:center}

.card-body{padding:14px 16px}
.card-text{font-size:14px;color:#d8d8d8;line-height:1.55;white-space:pre-wrap}
.card-price{font-size:20px;font-weight:800;color:#4a9eff;margin-top:8px;letter-spacing:-0.5px}

.card-reactions{padding:12px 16px 14px;display:flex;gap:10px;border-top:1px solid #1e1e1e}
.reaction-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;border:1px solid #2a2a2a;background:#151515;cursor:pointer;font-size:14px;font-weight:600;color:#888;transition:all .2s;-webkit-appearance:none;outline:none}
.reaction-btn.active-interested{background:#1a3a1a;border-color:#22c55e;color:#22c55e}
.reaction-btn.active-not_interested{background:#3a1a1a;border-color:#ef4444;color:#ef4444}
.reaction-btn:active{opacity:.7}

/* Chat button */
#chat-fab{position:fixed;bottom:max(20px, env(safe-area-inset-bottom, 20px));right:20px;width:56px;height:56px;background:#4a9eff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(74,158,255,.4);z-index:50;transition:transform .15s}
#chat-fab:active{transform:scale(.92)}
#chat-unread{position:absolute;top:-3px;right:-3px;background:#ff4444;color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;display:none}

/* Chat overlay */
#chat-overlay{position:fixed;inset:0;background:#0f0f0f;z-index:60;display:none;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#chat-overlay.open{display:flex;transform:translateY(0)}

.chat-header{background:#1a1a1a;border-bottom:1px solid #222;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
.chat-close{background:none;border:none;color:#4a9eff;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px}
.chat-title{flex:1;font-size:16px;font-weight:700}

.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.chat-messages::-webkit-scrollbar{display:none}

.msg{display:flex;flex-direction:column;max-width:80%}
.msg.admin{align-self:flex-start}
.msg.client{align-self:flex-end}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.4;word-break:break-word;white-space:pre-wrap}
.msg.admin .msg-bubble{background:#252525;color:#e8e8e8;border-bottom-left-radius:5px}
.msg.client .msg-bubble{background:#4a9eff;color:#fff;border-bottom-right-radius:5px}
.msg-meta{font-size:11px;color:#555;margin-top:3px;padding:0 4px}
.msg.client .msg-meta{text-align:right}
.msg-media img{max-width:220px;border-radius:10px;margin-top:6px;cursor:pointer;display:block}
.msg-media video{max-width:220px;border-radius:10px;margin-top:6px;display:block}
.media-expired{font-size:12px;color:#555;font-style:italic}

.typing-indicator{padding:4px 16px 8px;font-size:12px;color:#555;font-style:italic}

.chat-composer-wrap{padding:10px 12px;border-top:1px solid #1e1e1e;background:#111;flex-shrink:0;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.chat-media-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.media-thumb-sm{position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;border:1px solid #333}
.media-thumb-sm img,.media-thumb-sm video{width:100%;height:100%;object-fit:cover}
.media-thumb-sm .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.7);border:none;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.attach-btn{background:#222;border:1px solid #333;border-radius:10px;color:#888;padding:10px 12px;cursor:pointer;font-size:16px;flex-shrink:0}
.chat-input{flex:1;background:#222;border:1px solid #333;border-radius:14px;color:#e8e8e8;padding:10px 14px;font-size:15px;resize:none;outline:none;min-height:44px;max-height:120px;font-family:inherit;line-height:1.4}
.chat-input:focus{border-color:#4a9eff}
.send-btn{background:#4a9eff;border:none;border-radius:10px;color:#fff;padding:10px 14px;cursor:pointer;font-size:18px;flex-shrink:0}
#client-file-input{display:none}

/* PWA install banner */
#pwa-banner{display:none;position:fixed;bottom:max(80px,calc(60px + env(safe-area-inset-bottom)));left:16px;right:16px;background:#1e2a3e;border:1px solid #4a9eff;border-radius:14px;padding:14px 16px;z-index:55;align-items:center;gap:12px}
#pwa-banner.show{display:flex}
#pwa-banner p{flex:1;font-size:13px;color:#c8d8f0;line-height:1.4}
#pwa-install-btn{background:#4a9eff;border:none;border-radius:8px;color:#fff;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
#pwa-dismiss{background:none;border:none;color:#555;cursor:pointer;font-size:18px;flex-shrink:0}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightbox img{max-width:100%;max-height:100%;object-fit:contain}
#lb-close{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}

.empty-feed{text-align:center;color:#333;padding:60px 20px;font-size:14px;line-height:1.6}
.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#333;font-size:14px}
</style>
</head>
<body>

<!-- Join -->
<div id="join-screen">
  <div class="join-box">
    <h1>Vision Palace</h1>
    <p>Välj ett visningsnamn för att gå med</p>
    <input type="text" id="name-input" placeholder="Ditt namn" maxlength="40" autocomplete="off">
    <button id="join-btn">Gå med</button>
    <div class="join-error" id="join-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div>
      <h1>Vision Palace</h1>
      <div class="header-sub">Lageruppdateringar</div>
    </div>
  </div>
  <div id="feed-view">
    <div class="empty-feed">Inga uppdateringar ännu.<br>Håll utkik!</div>
  </div>
</div>

<!-- Chat FAB -->
<button id="chat-fab" style="display:none">
  💬
  <span id="chat-unread"></span>
</button>

<!-- Chat overlay -->
<div id="chat-overlay">
  <div class="chat-header">
    <button class="chat-close" id="chat-close">✕</button>
    <div class="chat-title">Meddelanden</div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="empty-chat"><span>💬</span><span>Ingen konversation ännu</span></div>
  </div>
  <div class="typing-indicator" id="typing-indicator" style="display:none">Admin skriver…</div>
  <div class="chat-composer-wrap">
    <div class="chat-media-row" id="chat-media-row"></div>
    <div class="chat-input-row">
      <label class="attach-btn">
        📎
        <input type="file" id="client-file-input" multiple accept="image/*,video/*">
      </label>
      <textarea class="chat-input" id="chat-input" placeholder="Skriv…" rows="1"></textarea>
      <button class="send-btn" id="send-btn">↑</button>
    </div>
  </div>
</div>

<!-- PWA Banner -->
<div id="pwa-banner">
  <p>Installera Vision Palace på din hemskärm</p>
  <button id="pwa-install-btn">Installera</button>
  <button id="pwa-dismiss">✕</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
const ONESIGNAL_APP_ID = '90d6532e-6887-42ce-8646-4354e6aa77fe';

let session = JSON.parse(localStorage.getItem('vp_session') || 'null');
let socket = null;
let broadcasts = [];
let myReactions = {};
let pendingMedia = [];
let chatUnreadCount = 0;
let chatOpen = false;
let deferredPWAPrompt = null;

// ─── PWA ──────────────────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPWAPrompt = e;
  if (!localStorage.getItem('vp_pwa_dismissed')) {
    document.getElementById('pwa-banner').classList.add('show');
  }
});

document.getElementById('pwa-install-btn').addEventListener('click', async () => {
  if (deferredPWAPrompt) {
    deferredPWAPrompt.prompt();
    const { outcome } = await deferredPWAPrompt.userChoice;
    deferredPWAPrompt = null;
  }
  document.getElementById('pwa-banner').classList.remove('show');
});

document.getElementById('pwa-dismiss').addEventListener('click', () => {
  localStorage.setItem('vp_pwa_dismissed', '1');
  document.getElementById('pwa-banner').classList.remove('show');
});

// ─── OneSignal ────────────────────────────────────────────────────────────────

function initOneSignal() {
  if (typeof OneSignal === 'undefined') return;
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async (OneSignal) => {
    await OneSignal.init({ appId: ONESIGNAL_APP_ID });
    await OneSignal.Notifications.requestPermission();
    const playerId = await OneSignal.User.PushSubscription.id;
    if (playerId && session) {
      await fetch('/api/onesignal/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-session-token': session.session_token },
        body: JSON.stringify({ player_id: playerId })
      });
    }
  });
}

// ─── Join ─────────────────────────────────────────────────────────────────────

function getInviteToken() {
  const parts = location.pathname.split('/');
  return parts[parts.length - 1] !== 'client' ? parts[parts.length - 1] : null;
}

document.getElementById('join-btn').addEventListener('click', join);
document.getElementById('name-input').addEventListener('keydown', e => e.key === 'Enter' && join());

async function join() {
  const name = document.getElementById('name-input').value.trim();
  const err = document.getElementById('join-error');
  err.textContent = '';
  if (!name) { err.textContent = 'Ange ett namn'; return; }

  const token = getInviteToken();
  if (!token) { err.textContent = 'Ogiltig inbjudningslänk'; return; }

  try {
    const r = await fetch(`/api/join/${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Fel uppstod'; return; }
    session = d;
    localStorage.setItem('vp_session', JSON.stringify(d));
    initApp();
  } catch (e) { err.textContent = 'Anslutningsfel'; }
}

// ─── Init ─────────────────────────────────────────────────────────────────────

function initApp() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('chat-fab').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadMessages();
  initOneSignal();
}

function connectSocket() {
  socket = io({ auth: { session_token: session.session_token } });
  socket.on('admin:new_broadcast', d => {
    broadcasts.unshift(d.broadcast);
    renderBroadcasts();
  });
  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x => x.id === d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderBroadcasts();
  });
  socket.on('admin:new_message', d => {
    appendChatMessage(d.message);
    if (!chatOpen) {
      chatUnreadCount++;
      updateChatBadge();
    } else {
      markRead();
    }
  });
  socket.on('admin:typing', () => {
    const ti = document.getElementById('typing-indicator');
    ti.style.display = 'block';
    clearTimeout(window._typingTimer);
    window._typingTimer = setTimeout(() => ti.style.display = 'none', 3000);
  });
}

// ─── Broadcasts ───────────────────────────────────────────────────────────────

async function loadBroadcasts() {
  const r = await fetch('/api/broadcasts', { headers: { 'x-session-token': session.session_token } });
  const d = await r.json();
  broadcasts = d.broadcasts || [];
  renderBroadcasts();
}

function renderBroadcasts() {
  const feed = document.getElementById('feed-view');
  if (broadcasts.length === 0) {
    feed.innerHTML = '<div class="empty-feed">Inga uppdateringar ännu.<br>Håll utkik!</div>';
    return;
  }

  const sorted = [...broadcasts].sort((a, b) => {
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  feed.innerHTML = sorted.map(b => broadcastCardHTML(b)).join('');
  markBroadcastsRead();
}

function broadcastCardHTML(b) {
  const date = new Date(b.created_at).toLocaleString('sv-SE', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  const media = b.broadcast_media || [];
  const myReaction = myReactions[b.id];

  const gridClass = media.length === 1 ? 'single' : 'multi';
  const mediaHTML = media.length > 0
    ? `<div class="card-media"><div class="card-media-grid ${gridClass}">${media.map(m =>
        m.storage_url
          ? (m.type === 'video'
            ? `<video src="${m.storage_url}" controls playsinline preload="metadata"></video>`
            : `<img src="${m.thumbnail_url || m.storage_url}" data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
          : `<div class="media-expired">Bild/video ej längre tillgänglig</div>`
      ).join('')}</div></div>`
    : '';

  const intBtn = `<button class="reaction-btn${myReaction === 'interested' ? ' active-interested' : ''}" onclick="react('${b.id}','interested')">👍 Intresserad</button>`;
  const notBtn = `<button class="reaction-btn${myReaction === 'not_interested' ? ' active-not_interested' : ''}" onclick="react('${b.id}','not_interested')">❌ Inte intresserad</button>`;

  return `
    <div class="broadcast-card${b.is_pinned ? ' pinned' : ''}" data-id="${b.id}">
      <div class="card-header">
        ${b.is_pinned ? '<span class="pin-badge">FÄST</span>' : ''}
        <span class="card-time">${date}</span>
      </div>
      ${mediaHTML}
      <div class="card-body">
        ${b.text ? `<div class="card-text">${escHtml(b.text)}</div>` : ''}
        ${b.price ? `<div class="card-price">${escHtml(b.price)}</div>` : ''}
      </div>
      <div class="card-reactions">${intBtn}${notBtn}</div>
    </div>`;
}

async function react(broadcastId, reaction) {
  myReactions[broadcastId] = reaction;
  renderBroadcasts();
  await fetch(`/api/reactions/${broadcastId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-session-token': session.session_token },
    body: JSON.stringify({ reaction })
  });
}

async function markBroadcastsRead() {
  // Send read receipts for visible broadcasts (simplified: mark all as seen)
  // The socket-based read receipts happen on chat messages specifically
}

// ─── Chat ─────────────────────────────────────────────────────────────────────

document.getElementById('chat-fab').addEventListener('click', openChat);
document.getElementById('chat-close').addEventListener('click', closeChat);

function openChat() {
  chatOpen = true;
  document.getElementById('chat-overlay').classList.add('open');
  chatUnreadCount = 0;
  updateChatBadge();
  markRead();
  scrollChatBottom();
}

function closeChat() {
  chatOpen = false;
  document.getElementById('chat-overlay').classList.remove('open');
}

async function loadMessages() {
  const r = await fetch('/api/messages/me/thread', { headers: { 'x-session-token': session.session_token } });
  const d = await r.json();
  const msgs = d.messages || [];
  const container = document.getElementById('chat-messages');

  const unreadCount = msgs.filter(m => m.sender === 'admin' && !m.read).length;
  chatUnreadCount = unreadCount;
  updateChatBadge();

  container.innerHTML = msgs.length === 0
    ? '<div class="empty-chat"><span>💬</span><span>Ingen konversation ännu</span></div>'
    : msgs.map(m => msgHTML(m)).join('');
  scrollChatBottom();
}

function appendChatMessage(msg) {
  const container = document.getElementById('chat-messages');
  const empty = container.querySelector('.empty-chat');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = msgHTML(msg);
  container.appendChild(div.firstElementChild);
  scrollChatBottom();
}

function msgHTML(m) {
  const time = new Date(m.created_at).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const media = m.message_media || [];
  const mediaHTML = media.map(med =>
    med.storage_url
      ? (med.type === 'video'
        ? `<video src="${med.storage_url}" controls playsinline style="max-width:220px;border-radius:10px;margin-top:6px;display:block"></video>`
        : `<img src="${med.thumbnail_url || med.storage_url}" data-full="${med.storage_url}" onclick="openLightbox(this.dataset.full)" style="max-width:220px;border-radius:10px;margin-top:6px;cursor:pointer;display:block" loading="lazy">`)
      : `<span class="media-expired">Bild/video ej längre tillgänglig</span>`
  ).join('');

  return `
    <div class="msg ${m.sender}">
      <div class="msg-bubble">${m.text ? escHtml(m.text) : ''}${mediaHTML ? `<div class="msg-media">${mediaHTML}</div>` : ''}</div>
      <div class="msg-meta">${time}</div>
    </div>`;
}

function scrollChatBottom() {
  const c = document.getElementById('chat-messages');
  requestAnimationFrame(() => c.scrollTop = c.scrollHeight);
}

function updateChatBadge() {
  const badge = document.getElementById('chat-unread');
  if (chatUnreadCount > 0) {
    badge.textContent = chatUnreadCount;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

async function markRead() {
  if (!session) return;
  await fetch(`/api/messages/${session.client_id}/read`, {
    method: 'POST',
    headers: { 'x-session-token': session.session_token }
  });
  if (socket) socket.emit('client:read_receipt', { client_id: session.client_id });
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (socket) socket.emit('client:typing');
});

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && pendingMedia.length === 0) return;
  input.value = '';

  const r = await fetch('/api/messages/me/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-session-token': session.session_token },
    body: JSON.stringify({ text, media: pendingMedia })
  });
  if (r.ok) {
    pendingMedia = [];
    document.getElementById('chat-media-row').innerHTML = '';
    const d = await r.json();
    appendChatMessage(d.message);
  }
}

// ─── File upload ──────────────────────────────────────────────────────────────

document.getElementById('client-file-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  const formData = new FormData();
  files.forEach(f => formData.append('files', f));
  const r = await fetch('/api/upload', {
    method: 'POST',
    headers: { 'x-session-token': session.session_token },
    body: formData
  });
  if (!r.ok) { alert('Uppladdning misslyckades'); return; }
  const d = await r.json();
  const row = document.getElementById('chat-media-row');
  for (const f of d.files) {
    pendingMedia.push(f);
    const div = document.createElement('div');
    div.className = 'media-thumb-sm';
    div.innerHTML = f.type === 'video'
      ? `<video src="${f.url}" muted></video><button class="rm" onclick="rmChatMedia(this,'${f.url}')">✕</button>`
      : `<img src="${f.thumbUrl}"><button class="rm" onclick="rmChatMedia(this,'${f.url}')">✕</button>`;
    row.appendChild(div);
  }
  e.target.value = '';
});

function rmChatMedia(btn, url) {
  const idx = pendingMedia.findIndex(f => f.url === url);
  if (idx >= 0) pendingMedia.splice(idx, 1);
  btn.closest('.media-thumb-sm').remove();
}

// ─── Lightbox ─────────────────────────────────────────────────────────────────

function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget || e.target.id === 'lb-close') {
    document.getElementById('lightbox').classList.remove('open');
  }
});

// ─── Utils ────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────

if (session && session.session_token) {
  // Verify session still valid
  fetch('/api/messages/me/thread', { headers: { 'x-session-token': session.session_token } })
    .then(r => {
      if (r.ok) initApp();
      else { session = null; localStorage.removeItem('vp_session'); }
    })
    .catch(() => {});
} else if (getInviteToken()) {
  // On join page with token, show join form
}
</script>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vision Palace</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Vision Palace">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --blue: #4a9eff;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── Join ── */
#join-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; padding: 24px;
}
.join-card { width: 100%; max-width: 360px; text-align: center; }
.join-logo {
  width: 72px; height: 72px; background: var(--blue); border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900; color: #fff; margin: 0 auto 20px;
  box-shadow: 0 8px 32px rgba(74,158,255,.35);
}
.join-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
.join-card p { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
.join-input {
  width: 100%; padding: 15px 18px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none; -webkit-appearance: none;
}
.join-input:focus { border-color: var(--blue); }
.join-input::placeholder { color: var(--text3); }
.join-btn {
  width: 100%; margin-top: 12px; padding: 15px; background: var(--blue); border: none;
  border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
}
.join-btn:active { opacity: .85; }
.join-err { color: #ff5555; font-size: 13px; margin-top: 10px; }

/* ── App ── */
#app { display: none; height: 100dvh; flex-direction: column; }

/* ── Header ── */
.header {
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
  height: calc(58px + var(--safe-top)); padding-top: var(--safe-top);
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; position: relative; z-index: 10;
}
.header-avatar {
  width: 40px; height: 40px; border-radius: 50%; background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.header-info { flex: 1; }
.header-name { font-size: 16px; font-weight: 700; }
.header-status { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* ── Feed (broadcast chat style) ── */
#feed-screen { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

.feed-scroll {
  flex: 1; overflow-y: auto; padding: 12px 12px 8px;
  display: flex; flex-direction: column; gap: 2px;
  -webkit-overflow-scrolling: touch;
}
.feed-scroll::-webkit-scrollbar { display: none; }

/* Date pill */
.date-pill {
  text-align: center; margin: 10px 0 6px; pointer-events: none;
}
.date-pill span {
  background: var(--surface2); color: var(--text3); font-size: 11px;
  padding: 4px 12px; border-radius: 10px; font-weight: 500;
}

/* Broadcast bubble — left aligned like incoming WhatsApp message */
.bc-row { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 6px; }
.bc-row .sender-avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; align-self: flex-end;
}
.bc-bubble {
  max-width: calc(100% - 48px); background: var(--surface);
  border-radius: 18px 18px 18px 4px; overflow: hidden;
  border: 1px solid var(--border); position: relative;
}
.bc-bubble.pinned { border-color: rgba(74,158,255,.5); }

.bc-pin-label {
  display: flex; align-items: center; gap: 5px; padding: 7px 14px 0;
  font-size: 11px; color: var(--blue); font-weight: 600; letter-spacing: 0.2px;
}

/* Media inside bubble */
.bc-media img {
  width: 100%; display: block; max-height: 360px; object-fit: cover; cursor: pointer;
}
.bc-media video { width: 100%; display: block; max-height: 300px; background: #000; }
.bc-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.bc-media-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; }
.bc-media-grid video { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
.media-expired { font-size: 12px; color: var(--text3); padding: 14px 16px; font-style: italic; }

/* Text body inside bubble */
.bc-body { padding: 10px 14px 8px; }
.bc-price { font-size: 20px; font-weight: 800; color: var(--blue); margin-bottom: 5px; letter-spacing: -0.5px; }
.bc-text { font-size: 14px; color: #d8d8d8; line-height: 1.55; white-space: pre-wrap; }
.bc-time { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* Reactions inside bubble */
.bc-reactions {
  display: flex; gap: 6px; padding: 0 10px 10px;
}
.react-btn {
  flex: 1; padding: 9px 6px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text3); font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all .15s; -webkit-appearance: none; outline: none;
}
.react-btn:active { transform: scale(.95); }
.react-btn.yes { background: rgba(34,197,94,.1); border-color: #22c55e; color: #22c55e; }
.react-btn.no  { background: rgba(239,68,68,.1); border-color: #ef4444; color: #ef4444; }

.feed-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 10px; color: var(--text3);
}
.feed-empty-icon { font-size: 52px; opacity: .2; }
.feed-empty p { font-size: 14px; }

/* Reply bar at bottom of feed */
.reply-bar {
  padding: 10px 16px; padding-bottom: max(10px, var(--safe-bot));
  background: var(--surface); border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.reply-btn {
  width: 100%; padding: 13px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text2); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 10px; transition: border-color .15s;
}
.reply-btn:active { border-color: var(--blue); }
.reply-btn span { color: var(--text3); font-size: 18px; }

/* ── Private chat overlay ── */
#chat-screen {
  position: fixed; inset: 0; background: var(--bg); z-index: 50;
  display: none; flex-direction: column;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
#chat-screen.open { display: flex; transform: translateY(0); }

.chat-header {
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
  height: calc(58px + var(--safe-top)); padding-top: var(--safe-top);
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.chat-back { background: none; border: none; color: var(--blue); font-size: 26px; cursor: pointer; padding: 0 4px; line-height: 1; }
.chat-header-info { flex: 1; }
.chat-header-name { font-size: 16px; font-weight: 700; }
.chat-header-sub { font-size: 12px; color: var(--text3); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 3px;
  -webkit-overflow-scrolling: touch;
}
.chat-messages::-webkit-scrollbar { display: none; }

.msg-row { display: flex; flex-direction: column; margin-bottom: 2px; }
.msg-row.from-admin { align-items: flex-start; }
.msg-row.from-me    { align-items: flex-end; }
.bubble {
  max-width: 80%; padding: 10px 14px; border-radius: 18px;
  font-size: 15px; line-height: 1.4; word-break: break-word; white-space: pre-wrap;
}
.msg-row.from-admin .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; }
.msg-row.from-me .bubble    { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
.msg-meta { font-size: 11px; color: var(--text3); margin: 3px 4px 4px; }
.msg-row.from-me .msg-meta { text-align: right; }
.bubble-img { max-width: 220px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer; }
.bubble-vid { max-width: 220px; border-radius: 10px; display: block; margin-top: 6px; }

.typing-row { padding: 0 12px 8px; display: none; }
.typing-dots {
  display: inline-flex; gap: 4px; padding: 10px 14px;
  background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 4px;
}
.typing-dots span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce .9s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

.chat-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 12px; padding-bottom: max(10px, var(--safe-bot)); flex-shrink: 0;
}
.media-prev-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.prev-thumb {
  position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.prev-thumb img, .prev-thumb video { width: 100%; height: 100%; object-fit: cover; }
.prev-thumb button {
  position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  background: rgba(0,0,0,.8); border: none; color: #fff; border-radius: 50%;
  font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.attach-btn {
  width: 42px; height: 42px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px;
  color: var(--text); padding: 11px 16px; font-size: 15px; resize: none; outline: none;
  max-height: 120px; min-height: 42px; font-family: inherit; line-height: 1.4;
}
.chat-input:focus { border-color: var(--blue); }
.chat-input::placeholder { color: var(--text3); }
.send-btn {
  width: 42px; height: 42px; background: var(--blue); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.send-btn:active { opacity: .8; }
#file-input { display: none; }

.chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text3); font-size: 14px; }

/* Unread dot on reply button */
.reply-unread {
  background: #ff3b30; color: #fff; font-size: 11px; font-weight: 700;
  min-width: 20px; height: 20px; border-radius: 10px; padding: 0 5px;
  display: none; align-items: center; justify-content: center; margin-left: auto;
}

/* ── Lightbox ── */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 200; align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
#lb-close { position: absolute; top: max(16px,var(--safe-top)); right: 16px; background: rgba(255,255,255,.12); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; }

/* ── PWA banner ── */
#pwa-banner {
  display: none; position: fixed; bottom: calc(var(--safe-bot) + 80px); left: 12px; right: 12px;
  background: #0d2040; border: 1px solid var(--blue); border-radius: 16px;
  padding: 14px 16px; z-index: 60; align-items: center; gap: 10px;
}
#pwa-banner.show { display: flex; }
#pwa-banner p { flex: 1; font-size: 13px; color: #b8d4f8; line-height: 1.4; }
#pwa-install { background: var(--blue); border: none; border-radius: 10px; color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
#pwa-dismiss { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; }
</style>
</head>
<body>

<!-- Join -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-logo">VP</div>
    <h1>Vision Palace</h1>
    <p>Ange ditt namn för att gå med</p>
    <input class="join-input" type="text" id="name-input" placeholder="Ditt namn" maxlength="40" autocomplete="off" autocapitalize="words">
    <button class="join-btn" id="join-btn">Fortsätt</button>
    <div class="join-err" id="join-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">VP</div>
    <div class="header-info">
      <div class="header-name">Vision Palace</div>
      <div class="header-status">Lageruppdateringar</div>
    </div>
  </div>

  <!-- Feed (broadcast as chat bubbles) -->
  <div id="feed-screen">
    <div class="feed-scroll" id="feed-scroll">
      <div class="feed-empty">
        <div class="feed-empty-icon">📦</div>
        <p>Inga uppdateringar ännu</p>
      </div>
    </div>

    <!-- Reply bar -->
    <div class="reply-bar">
      <button class="reply-btn" id="open-chat-btn">
        <span>💬</span>
        <span style="flex:1;text-align:left">Svara privat…</span>
        <span class="reply-unread" id="reply-unread"></span>
      </button>
    </div>
  </div>

</div>

<!-- Private chat -->
<div id="chat-screen">
  <div class="chat-header">
    <button class="chat-back" id="chat-back">‹</button>
    <div class="chat-header-info">
      <div class="chat-header-name">Vision Palace</div>
      <div class="chat-header-sub">Privat konversation</div>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty"><span style="font-size:40px;opacity:.2">💬</span><span>Inga meddelanden ännu</span></div>
  </div>
  <div class="typing-row" id="typing-row">
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="chat-composer">
    <div class="media-prev-row" id="media-prev-row"></div>
    <div class="input-row">
      <label class="attach-btn">📎<input type="file" id="file-input" multiple accept="image/*,video/*"></label>
      <textarea class="chat-input" id="chat-input" placeholder="Skriv ett meddelande…" rows="1"></textarea>
      <button class="send-btn" id="send-btn">↑</button>
    </div>
  </div>
</div>

<!-- PWA Banner -->
<div id="pwa-banner">
  <p>Installera Vision Palace på hemskärmen</p>
  <button id="pwa-install">Installera</button>
  <button id="pwa-dismiss">✕</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
const ONESIGNAL_APP_ID = '90d6532e-6887-42ce-8646-4354e6aa77fe';
let session = JSON.parse(localStorage.getItem('vp_session') || 'null');
let socket = null;
let broadcasts = [];
let myReactions = {};
let pendingMedia = [];
let chatUnread = 0;
let chatOpen = false;
let deferredPWA = null;

// ── SW & PWA ──
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPWA = e;
  if (!localStorage.getItem('vp_pwa_dismissed')) document.getElementById('pwa-banner').classList.add('show');
});
document.getElementById('pwa-install').onclick = async () => {
  if (deferredPWA) { deferredPWA.prompt(); await deferredPWA.userChoice; deferredPWA = null; }
  document.getElementById('pwa-banner').classList.remove('show');
};
document.getElementById('pwa-dismiss').onclick = () => {
  localStorage.setItem('vp_pwa_dismissed','1');
  document.getElementById('pwa-banner').classList.remove('show');
};

// ── Chat open/close ──
document.getElementById('open-chat-btn').onclick = openChat;
document.getElementById('chat-back').onclick = closeChat;

function openChat() {
  chatOpen = true;
  document.getElementById('chat-screen').classList.add('open');
  chatUnread = 0; updateUnread();
  markRead();
  scrollChat();
}
function closeChat() {
  chatOpen = false;
  document.getElementById('chat-screen').classList.remove('open');
}

// ── Join ──
function getToken() {
  const p = location.pathname.split('/');
  return p[p.length-1] !== 'client' ? p[p.length-1] : null;
}
document.getElementById('join-btn').onclick = join;
document.getElementById('name-input').addEventListener('keydown', e => e.key==='Enter' && join());
async function join() {
  const name = document.getElementById('name-input').value.trim();
  const err = document.getElementById('join-err');
  err.textContent = '';
  if (!name) { err.textContent = 'Ange ett namn'; return; }
  const token = getToken();
  if (!token) { err.textContent = 'Ogiltig inbjudningslänk'; return; }
  try {
    const r = await fetch(`/api/join/${token}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ display_name: name })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error||'Fel uppstod'; return; }
    session = d;
    localStorage.setItem('vp_session', JSON.stringify(d));
    initApp();
  } catch { err.textContent = 'Anslutningsfel'; }
}

// ── Init ──
function initApp() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadMessages();
}

function connectSocket() {
  socket = io({ auth: { session_token: session.session_token } });
  socket.on('admin:new_broadcast', d => {
    broadcasts.unshift(d.broadcast);
    renderFeed();
    scrollFeedBottom();
  });
  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x=>x.id===d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderFeed();
  });
  socket.on('admin:new_message', d => {
    appendChatMsg(d.message);
    if (!chatOpen) { chatUnread++; updateUnread(); }
    else markRead();
  });
  socket.on('admin:typing', () => {
    const row = document.getElementById('typing-row');
    row.style.display = 'block';
    clearTimeout(window._tt);
    window._tt = setTimeout(()=>row.style.display='none', 3000);
    scrollChat();
  });
}

// ── Broadcasts as chat bubbles ──
async function loadBroadcasts() {
  const r = await fetch('/api/broadcasts', { headers: { 'x-session-token': session.session_token } });
  const d = await r.json();
  broadcasts = d.broadcasts || [];
  renderFeed();
  scrollFeedBottom();
}

function renderFeed() {
  const scroll = document.getElementById('feed-scroll');
  if (!broadcasts.length) {
    scroll.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon">📦</div><p>Inga uppdateringar ännu</p></div>';
    return;
  }

  const sorted = [...broadcasts].sort((a,b) => {
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return new Date(a.created_at) - new Date(b.created_at);
  });

  let html = '';
  let lastDate = '';
  for (const b of sorted) {
    const d = new Date(b.created_at);
    const dateStr = d.toLocaleDateString('sv-SE', { day:'2-digit', month:'long' });
    if (dateStr !== lastDate) {
      html += `<div class="date-pill"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    html += broadcastBubbleHTML(b);
  }
  scroll.innerHTML = html;
}

function broadcastBubbleHTML(b) {
  const time = new Date(b.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const media = b.broadcast_media || [];
  const myR = myReactions[b.id];

  const gridClass = media.length > 1 ? 'bc-media bc-media-grid' : 'bc-media';
  const mediaHTML = media.length ? `<div class="${gridClass}">${media.map(m =>
    m.storage_url
      ? (m.type==='video'
        ? `<video src="${m.storage_url}" controls playsinline preload="metadata"></video>`
        : `<img src="${m.thumbnail_url||m.storage_url}" data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
      : `<div class="media-expired">📷 Bild ej längre tillgänglig</div>`
  ).join('')}</div>` : '';

  const hasContent = b.text || b.price;

  return `<div class="bc-row">
    <div class="sender-avatar">VP</div>
    <div class="bc-bubble${b.is_pinned?' pinned':''}">
      ${b.is_pinned ? '<div class="bc-pin-label">📌 Fäst meddelande</div>' : ''}
      ${mediaHTML}
      ${hasContent ? `<div class="bc-body">
        ${b.price ? `<div class="bc-price">${esc(b.price)}</div>` : ''}
        ${b.text ? `<div class="bc-text">${esc(b.text)}</div>` : ''}
        <div class="bc-time">${time}</div>
      </div>` : `<div style="padding:4px 14px 6px"><div class="bc-time">${time}</div></div>`}
      <div class="bc-reactions">
        <button class="react-btn${myR==='interested'?' yes':''}" onclick="react('${b.id}','interested')">👍 Intresserad</button>
        <button class="react-btn${myR==='not_interested'?' no':''}" onclick="react('${b.id}','not_interested')">❌ Inte intresserad</button>
      </div>
    </div>
  </div>`;
}

function scrollFeedBottom() {
  const s = document.getElementById('feed-scroll');
  requestAnimationFrame(() => s.scrollTop = s.scrollHeight);
}

async function react(id, reaction) {
  myReactions[id] = reaction;
  renderFeed();
  await fetch(`/api/reactions/${id}`, {
    method:'POST', headers:{'Content-Type':'application/json','x-session-token':session.session_token},
    body: JSON.stringify({ reaction })
  });
}

// ── Chat messages ──
async function loadMessages() {
  const r = await fetch('/api/messages/me/thread', { headers:{'x-session-token':session.session_token} });
  const d = await r.json();
  const msgs = d.messages || [];
  chatUnread = msgs.filter(m=>m.sender==='admin'&&!m.read).length;
  updateUnread();
  const c = document.getElementById('chat-messages');
  if (!msgs.length) return;
  c.innerHTML = msgs.map(chatMsgHTML).join('');
  scrollChat();
}

function appendChatMsg(m) {
  const c = document.getElementById('chat-messages');
  const empty = c.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = chatMsgHTML(m);
  c.appendChild(div.firstElementChild);
  scrollChat();
}

function chatMsgHTML(m) {
  const time = new Date(m.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const from = m.sender==='admin' ? 'from-admin' : 'from-me';
  const media = m.message_media || [];
  const mediaHTML = media.map(md =>
    md.storage_url
      ? (md.type==='video'
        ? `<video class="bubble-vid" src="${md.storage_url}" controls playsinline></video>`
        : `<img class="bubble-img" src="${md.thumbnail_url||md.storage_url}" data-full="${md.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
      : `<span style="font-size:12px;color:#555;font-style:italic">Bild ej tillgänglig</span>`
  ).join('');
  return `<div class="msg-row ${from}">
    <div class="bubble">${m.text?esc(m.text):''}${mediaHTML}</div>
    <div class="msg-meta">${time}</div>
  </div>`;
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  requestAnimationFrame(()=>c.scrollTop=c.scrollHeight);
}

function updateUnread() {
  const el = document.getElementById('reply-unread');
  if (chatUnread>0) { el.textContent=chatUnread; el.style.display='flex'; }
  else el.style.display='none';
}

async function markRead() {
  if (!session) return;
  await fetch(`/api/messages/${session.client_id}/read`, { method:'POST', headers:{'x-session-token':session.session_token} });
  if (socket) socket.emit('client:read_receipt',{client_id:session.client_id});
}

// ── Send message ──
document.getElementById('send-btn').onclick = sendMsg;
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMsg(); }
  if (socket) socket.emit('client:typing');
});

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && !pendingMedia.length) return;
  input.value = '';
  const r = await fetch('/api/messages/me/send', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-session-token':session.session_token},
    body: JSON.stringify({ text, media: pendingMedia })
  });
  if (r.ok) {
    pendingMedia = [];
    document.getElementById('media-prev-row').innerHTML = '';
    const d = await r.json();
    appendChatMsg(d.message);
  }
}

// ── File upload ──
document.getElementById('file-input').addEventListener('change', async e => {
  const form = new FormData();
  Array.from(e.target.files).forEach(f=>form.append('files',f));
  const r = await fetch('/api/upload', { method:'POST', headers:{'x-session-token':session.session_token}, body:form });
  if (!r.ok) { alert('Uppladdning misslyckades'); return; }
  const d = await r.json();
  const row = document.getElementById('media-prev-row');
  for (const f of d.files) {
    pendingMedia.push(f);
    const div = document.createElement('div');
    div.className = 'prev-thumb';
    div.innerHTML = f.type==='video'
      ? `<video src="${f.url}" muted></video><button onclick="rmMedia(this,'${f.url}')">✕</button>`
      : `<img src="${f.thumbUrl}"><button onclick="rmMedia(this,'${f.url}')">✕</button>`;
    row.appendChild(div);
  }
  e.target.value = '';
});

function rmMedia(btn, url) {
  pendingMedia = pendingMedia.filter(f=>f.url!==url);
  btn.closest('.prev-thumb').remove();
}

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById('lb-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick = e => {
  if (e.target===e.currentTarget||e.target.id==='lb-close') document.getElementById('lightbox').classList.remove('open');
};

// ── Utils ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Boot ──
if (session?.session_token) {
  fetch('/api/messages/me/thread', { headers:{'x-session-token':session.session_token} })
    .then(r => { if (r.ok) initApp(); else { session=null; localStorage.removeItem('vp_session'); } })
    .catch(()=>{});
}
</script>

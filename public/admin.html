<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vision Palace – Admin</title>
<link rel="manifest" href="/admin-manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="VP Admin">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --blue: #4a9eff;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── Login ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; padding: 24px; background: var(--bg);
}
.login-card { width: 100%; max-width: 360px; text-align: center; }
.login-logo {
  width: 88px; height: 88px; border-radius: 22px; background: #fff;
  overflow: hidden; margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(255,255,255,.12);
}
.login-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.login-card h1 {
  font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
  font-size: 30px; font-weight: 300; letter-spacing: 0.04em; margin-bottom: 6px;
}
.login-card p { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
.login-card input {
  width: 100%; padding: 15px 18px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none; transition: border-color .2s;
  -webkit-appearance: none;
}
.login-card input:focus { border-color: var(--blue); }
.login-btn {
  width: 100%; margin-top: 12px; padding: 15px; background: var(--blue); border: none;
  border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
}
.login-btn:active { opacity: .85; }
.login-error { color: #ff5555; font-size: 13px; margin-top: 12px; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 14px; display: flex; align-items: center; gap: 10px;
  height: calc(56px + var(--safe-top)); padding-top: var(--safe-top);
  flex-shrink: 0;
}
.header-logo {
  width: 36px; height: 36px; border-radius: 10px; background: #fff;
  overflow: hidden; flex-shrink: 0;
}
.header-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.hbtn {
  padding: 7px 13px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.hbtn:active { opacity: .75; }
.hbtn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.icon-btn {
  width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── Search bar ── */
#search-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 14px; flex-shrink: 0;
}
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.search-input {
  width: 100%; padding: 9px 14px 9px 36px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 11px; color: var(--text);
  font-size: 14px; outline: none; -webkit-appearance: none;
}
.search-input:focus { border-color: var(--blue); }

/* ── Tab bar ── */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot); flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0; background: none; border: none; cursor: pointer; gap: 4px;
  color: var(--text3); transition: color .15s; position: relative;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { display: flex; align-items: center; justify-content: center; height: 20px; }
.tab-icon svg { width: 20px; height: 20px; }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
.tab-badge {
  position: absolute; top: 6px; right: calc(50% - 20px);
  background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; display: none;
  align-items: center; justify-content: center; padding: 0 4px;
}

/* ── Views ── */
.view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* ══════════════════════════════════════════
   INVENTORY VIEW
══════════════════════════════════════════ */
#inventory-view { display: none; flex-direction: column; }
#inventory-view.active { display: flex; }
.inv-scroll { flex: 1; overflow-y: auto; padding: 14px; -webkit-overflow-scrolling: touch; }
.inv-scroll::-webkit-scrollbar { display: none; }
.inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.inv-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column;
}
.inv-card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--surface2); display: block; }
.inv-card-img-ph {
  width: 100%; aspect-ratio: 1; background: var(--surface2); display: flex;
  align-items: center; justify-content: center; color: var(--text3); font-size: 11px;
}
.inv-card-body { padding: 9px 10px 10px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.inv-card-ref { font-size: 10px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; }
.inv-card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
.inv-card-price { font-size: 15px; font-weight: 700; color: var(--blue); margin-top: 4px; }
.inv-empty { margin: auto; color: var(--text3); font-size: 14px; text-align: center; padding: 40px; }

/* Inventory toolbar */
.inv-toolbar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 10px 14px 0; flex-shrink: 0; }
.inv-catalog-btn { padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.inv-catalog-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.inv-catalog-btn:active { opacity: 0.75; }

/* Catalog client picker */
#cat-picker-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: flex-end; }
#cat-picker-modal.open { display: flex; }
.cat-picker-sheet { width: 100%; background: var(--surface); border-radius: 20px 20px 0 0; padding: 16px 0 max(24px,var(--safe-bot)); max-height: 70vh; display: flex; flex-direction: column; }
.cat-picker-list { flex: 1; overflow-y: auto; }

/* Inventory card actions */
.inv-card-actions { display: flex; gap: 6px; margin-top: 6px; }
.inv-edit-btn { flex: 1; padding: 8px 0; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.inv-edit-btn:active { opacity: 0.75; }
.inv-del-btn { width: 34px; padding: 8px 0; background: none; border: 1px solid var(--border); color: #ff5555; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
.inv-del-btn:active { background: rgba(255,80,80,.12); }

/* FAB — add item */
.inv-fab { position: absolute; bottom: 16px; right: 16px; width: 52px; height: 52px; background: var(--blue); border: none; border-radius: 50%; color: #fff; font-size: 26px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(74,158,255,.4); z-index: 10; }
.inv-fab:active { opacity: 0.85; }
#inventory-view { position: relative; }

/* Inventory form modal */
#inv-form-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: flex-end; }
#inv-form-modal.open { display: flex; }
.inv-form-sheet { width: 100%; background: var(--surface); border-radius: 20px 20px 0 0; max-height: 92dvh; display: flex; flex-direction: column; padding-bottom: max(16px, var(--safe-bot)); }
.inv-form-header { display: flex; align-items: center; padding: 16px 16px 0; gap: 12px; flex-shrink: 0; }
.inv-form-title { flex: 1; font-size: 17px; font-weight: 700; }
.inv-form-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; -webkit-overflow-scrolling: touch; }
.inv-form-body::-webkit-scrollbar { display: none; }

/* Image picker in form */
.inv-img-pick { width: 100%; aspect-ratio: 1; background: var(--surface2); border: 1.5px dashed var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; overflow: hidden; position: relative; }
.inv-img-pick img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.inv-img-pick-label { font-size: 13px; color: var(--text3); }
.inv-img-pick input { display: none; }

/* Client picker modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: flex; align-items: flex-end;
}
.modal-sheet {
  width: 100%; background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 16px 0 max(24px, var(--safe-bot)); max-height: 70vh; display: flex; flex-direction: column;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 15px; font-weight: 700; padding: 0 16px 12px; border-bottom: 1px solid var(--border); }
.modal-list { flex: 1; overflow-y: auto; }
.modal-row {
  display: flex; align-items: center; padding: 14px 16px; gap: 12px;
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.modal-row:active { background: var(--surface2); }
.modal-row-name { font-size: 15px; font-weight: 500; }
.modal-row-sub { font-size: 12px; color: var(--text3); }
.modal-cancel { margin: 12px 16px 0; padding: 14px; text-align: center; background: var(--surface2); border: none; border-radius: 12px; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }

/* ══════════════════════════════════════════
   INVOICE VIEW
══════════════════════════════════════════ */
#invoice-view { display: none; flex-direction: column; }
#invoice-view.active { display: flex; }
.inv-form-scroll { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 20px; }
.inv-form-scroll::-webkit-scrollbar { display: none; }
.inv-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
.inv-field { margin-bottom: 12px; }
.inv-field label { display: block; font-size: 11px; color: var(--text3); margin-bottom: 5px; font-weight: 500; }
.inv-input {
  width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 15px; font-family: inherit; outline: none;
}
.inv-input:focus { border-color: var(--blue); }
.inv-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.inv-line-item { background: var(--surface2); border-radius: 10px; padding: 12px; margin-bottom: 8px; position: relative; }
.inv-line-remove { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px 8px; line-height: 1; }
.inv-add-row { width: 100%; padding: 12px; background: none; border: 1px dashed var(--border); border-radius: 10px; color: var(--text3); font-size: 13px; cursor: pointer; font-family: inherit; margin-bottom: 4px; }
.inv-type-toggle { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.inv-type-btn { flex: 1; background: none; border: none; color: var(--text3); font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 11px; cursor: pointer; font-family: inherit; transition: background .15s, color .15s; }
.inv-type-btn.active { background: var(--blue); color: #fff; }
.inv-gen-btn { width: 100%; padding: 16px; background: var(--blue); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.inv-gen-btn:active { opacity: 0.85; }
.inv-preview-area { flex: 1; overflow-y: auto; padding: 16px; }
.inv-preview-area::-webkit-scrollbar { display: none; }
.inv-doc-wrap { background: #fff; border-radius: 12px; padding: 24px 20px; color: #111; font-size: 11px; line-height: 1.6; box-shadow: 0 4px 24px rgba(0,0,0,.3); }
.inv-doc-title { font-size: 20px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 4px; }
.inv-doc-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; padding: 16px 0; border-top: 1.5px solid #111; border-bottom: 1.5px solid #111; }
.inv-doc-party-label { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 6px; font-weight: 600; }
.inv-doc-party-name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.inv-doc-party-detail { font-size: 10px; color: #555; line-height: 1.7; }
.inv-doc-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
.inv-doc-table th { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #999; padding: 0 0 8px; text-align: left; font-weight: 600; border-bottom: 1px solid #111; }
.inv-doc-table th:not(:first-child) { text-align: right; }
.inv-doc-table td { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 10px; vertical-align: middle; }
.inv-doc-table td:not(:first-child) { text-align: right; }
.inv-doc-total-row { display: flex; justify-content: flex-end; gap: 20px; font-size: 10px; color: #555; margin-top: 4px; }
.inv-doc-total-row.final { font-size: 14px; font-weight: 800; color: #111; margin-top: 8px; border-top: 1.5px solid #111; padding-top: 8px; }
.inv-save-btn { width: 100%; padding: 14px; background: #111; border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 16px; }
.inv-preview-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.inv-preview-tab { flex: 1; padding: 14px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text3); background: none; border: none; cursor: pointer; font-family: inherit; }
.inv-preview-tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); margin-bottom: -1px; }

/* ══════════════════════════════════════════
   BROADCAST VIEW — WhatsApp group chat style
══════════════════════════════════════════ */
#broadcast-view { display: none; flex-direction: column; }
#broadcast-view.active { display: flex; }

.bc-feed {
  flex: 1; overflow-y: auto; padding: 14px 14px 10px;
  display: flex; flex-direction: column; gap: 2px;
  -webkit-overflow-scrolling: touch;
}
.bc-feed::-webkit-scrollbar { display: none; }

.feed-empty {
  margin: auto; color: var(--text3); font-size: 14px; text-align: center; padding: 40px 0;
}

/* Each broadcast row — right-aligned (admin sends) */
.bc-msg-row {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  margin-bottom: 6px;
}

.bc-pin-tag {
  font-size: 10px; color: var(--blue); margin-bottom: 2px;
  padding-right: 2px; letter-spacing: 0.2px; opacity: 0.8;
}

.bc-bubble {
  max-width: 84%;
  background: var(--blue);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 13px 8px;
  word-break: break-word;
}

.bc-bubble-media { margin-bottom: 8px; }
.bc-bubble-media img {
  max-width: 220px; width: 100%; border-radius: 10px;
  display: block; cursor: pointer; margin-bottom: 2px;
}
.bc-bubble-media video {
  max-width: 220px; width: 100%; border-radius: 10px; display: block;
}
.bc-media-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
  border-radius: 10px; overflow: hidden; max-width: 220px;
}
.bc-media-grid img {
  width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block;
}

.bc-bubble-price {
  font-size: 16px; font-weight: 800; margin-bottom: 4px;
  color: rgba(255,255,255,.9);
}
.bc-bubble-text {
  font-size: 15px; line-height: 1.4; white-space: pre-wrap;
}

.bc-bubble-footer {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; margin-top: 6px;
}
.bc-bubble-time { font-size: 11px; opacity: .6; }
.bc-react-btn {
  background: rgba(255,255,255,.18); border: none; color: #fff;
  border-radius: 10px; padding: 3px 9px; font-size: 11px;
  cursor: pointer; font-family: inherit;
}
.bc-react-btn:active { opacity: .75; }
.bc-pin-btn {
  background: none; border: none; color: rgba(255,255,255,.5);
  font-size: 14px; cursor: pointer; padding: 0; line-height: 1;
}
.bc-pin-btn.pinned { color: #fff; }
.bc-del-btn {
  background: none; border: none; color: rgba(255,255,255,.3);
  font-size: 14px; cursor: pointer; padding: 0; line-height: 1; transition: color .15s;
}
.bc-del-btn:active { color: #ff5555; }

/* Optimistic / pending broadcast bubble */
.bc-msg-row.pending .bc-bubble { opacity: 0.62; }
.bc-msg-row.pending .bc-bubble-footer .bc-react-btn,
.bc-msg-row.pending .bc-bubble-footer .bc-pin-btn,
.bc-msg-row.pending .bc-bubble-footer .bc-del-btn { display: none; }
.bc-sending-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.55); border-top-color: transparent;
  animation: spin .7s linear infinite; vertical-align: middle;
}
.bc-msg-row.failed .bc-bubble { background: #802929; opacity: 1; }
.bc-msg-row.failed .bc-bubble-footer .bc-retry-btn {
  background: rgba(255,255,255,.18); border: none; color: #fff;
  border-radius: 10px; padding: 3px 9px; font-size: 11px;
  cursor: pointer; font-family: inherit;
}

/* Date separator */
.bc-date-sep { text-align: center; margin: 10px 0 8px; }
.bc-date-sep span {
  background: var(--surface2); color: var(--text3); font-size: 11px;
  font-weight: 500; padding: 4px 12px; border-radius: 10px;
}

/* ── Broadcast composer ── */
.bc-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 8px 12px; padding-bottom: max(8px, var(--safe-bot)); flex-shrink: 0;
}
.bc-media-prev {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
}
.prev-sm {
  position: relative; width: 56px; height: 56px; border-radius: 8px;
  overflow: hidden; border: 1px solid var(--border);
}
.prev-sm img, .prev-sm video { width: 100%; height: 100%; object-fit: cover; }
.prev-sm button {
  position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  background: rgba(0,0,0,.8); border: none; color: #fff; border-radius: 50%;
  font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
@keyframes spin { to { transform: rotate(360deg); } }
.prev-sm.uploading::after {
  content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.45); z-index: 1;
}
.prev-sm.uploading::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 18px; height: 18px; margin: -9px 0 0 -9px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite; z-index: 2;
}

.bc-extras {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.bc-price-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 8px 12px; font-size: 14px;
  outline: none; -webkit-appearance: none;
}
.bc-price-input:focus { border-color: var(--blue); }
.bc-price-input::placeholder { color: var(--text3); }
.pin-toggle-sm {
  display: flex; align-items: center; gap: 6px; font-size: 13px;
  color: var(--text2); white-space: nowrap; cursor: pointer;
}
.pin-toggle-sm input { accent-color: var(--blue); width: 16px; height: 16px; }

.bc-main-row { display: flex; gap: 8px; align-items: flex-end; }

.attach-bc {
  width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 22px; font-weight: 300;
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ══════════════════════════════════════════

/* ══════════════════════════════════════════
   PRIVATE CHAT PANEL
══════════════════════════════════════════ */
#chat-panel {

.chat-panel-header {

.danger-btn {

.msg-meta { font-size: 11px; color: var(--text3); margin: 3px 4px 6px; display: flex; align-items: center; gap: 4px; }
.msg-row.from-admin .msg-meta { align-self: flex-end; }
.read-tick { color: rgba(255,255,255,.6); }
.bubble-media img { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer; }
.bubble-media video { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; }
.typing-row { padding: 4px 16px 8px; }
.typing-dots { display: inline-flex; gap: 4px; padding: 10px 14px; background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 5px; }
.typing-dots span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce .9s infinite; }

@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

.label-bar {

}
.label-bar input {

}

.chat-composer {

.composer-row { display: flex; gap: 8px; align-items: flex-end; }
.attach-sm {
  width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px;
  color: var(--text); padding: 10px 16px; font-size: 15px; resize: none; outline: none;
  max-height: 120px; min-height: 40px; font-family: inherit; line-height: 1.4;
}
.msg-input:focus { border-color: var(--blue); }
.msg-input::placeholder { color: var(--text3); }
#chat-file-input { display: none; }
.chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text3); font-size: 14px; }

/* ── Modals ── */
.modal-bg {

}

/* ── Lightbox ── */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 999; align-items: center; justify-content: center; }

#lb-close { position: absolute; top: max(16px, var(--safe-top)); right: 16px; background: rgba(255,255,255,.12); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; }
</style>

<body>

        <input class="inv-input" id="invf-buy" type="number" min="0" step="any" inputmode="decimal" placeholder="0">
      </div>
      <div class="inv-field">
        <label>Anteckningar</label>
        <textarea class="inv-input" id="invf-notes" rows="3" placeholder="Fritext…"></textarea>
      </div>
      <button class="inv-gen-btn" onclick="saveInvItem()">Spara</button>
    </div>
  </div>
</div>

<!-- Catalog → client picker -->
<div id="cat-picker-modal" onclick="if(event.target===this)closeCatalogClientPicker()">
  <div class="cat-picker-sheet">
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:15px;font-weight:700;padding:0 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0">Skicka katalog till klient</div>
    <div class="cat-picker-list" id="cat-picker-list"></div>
    <button onclick="closeCatalogClientPicker()" style="margin:12px 16px 0;padding:14px;text-align:center;background:var(--surface2);border:none;border-radius:12px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0">Avbryt</button>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

let token = localStorage.getItem('vp_admin_token');
let socket = null;
let broadcasts = [];
let clients = [];
let currentClientId = null;
let pendingBcMedia = [];
let pendingChatMedia = [];
let inFlightBcTempIds = new Set();
let bcLoadGen = 0;
let totalUnread = 0;
let extrasOpen = false;
let searchVisible = false;
let invItemsMap = {};
let invLineItems = [];
let invLineNextId = 0;
let invCustType = 'company';

// ── Auth ──
document.getElementById('login-btn').onclick = login;
document.getElementById('pw-input').addEventListener('keydown', e => e.key === 'Enter' && login());

async function login() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch('/api/auth/admin', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Fel lösenord'; return; }
    token = d.token;
    localStorage.setItem('vp_admin_token', token);
    initApp();
  } catch { err.textContent = 'Anslutningsfel'; }
}

document.getElementById('logout-btn').onclick = () => {
  localStorage.removeItem('vp_admin_token');
  location.reload();
};

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab + '-view').classList.add('active');
  const titles = { broadcast: 'Sändningar', clients: 'Klienter', inventory: 'Lager', invoice: 'Faktura' };
  document.getElementById('header-title').textContent = titles[tab] || tab;
  document.getElementById('search-toggle-btn').style.display = tab === 'broadcast' ? '' : 'none';
  if (tab !== 'broadcast' && searchVisible) toggleSearch();
  if (tab === 'inventory') loadInventory();
  if (tab === 'invoice') populateInvClientPicker();
}

// ── Search toggle ──
document.getElementById('search-toggle-btn').onclick = toggleSearch;
function toggleSearch() {
  searchVisible = !searchVisible;
  document.getElementById('search-bar').style.display = searchVisible ? '' : 'none';
  if (!searchVisible) {
    document.getElementById('search-input').value = '';
    loadBroadcasts();
  }
}
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(window._st);
  window._st = setTimeout(() => loadBroadcasts(e.target.value), 300);
});

// ── Extras toggle (price + pin) ──
document.getElementById('bc-extras-btn').onclick = () => {
  extrasOpen = !extrasOpen;
  document.getElementById('bc-extras').style.display = extrasOpen ? 'flex' : 'none';
  document.getElementById('bc-extras-btn').classList.toggle('active', extrasOpen);
};

// ── Init ──
function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadClients();
  setTimeout(setupPush, 2000);
}

async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (Notification.permission === 'denied') return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-btn').style.display = '';
    return;
  }
  await registerAdminPushSub();
}

async function enableNotifs() {
  const perm = await Notification.requestPermission();
  document.getElementById('notif-btn').style.display = 'none';
  if (perm !== 'granted') return;
  await registerAdminPushSub();
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:${type==='error'?'#3d1a1a':'#1a3d2a'};color:${type==='error'?'#ff8888':'#66dd99'};
    border:1px solid ${type==='error'?'rgba(255,80,80,.4)':'rgba(80,200,120,.4)'};
    padding:10px 18px;border-radius:12px;font-size:13px;z-index:999;
    max-width:90vw;text-align:center;pointer-events:none;white-space:pre-wrap;word-break:break-all;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), type === 'error' ? 8000 : 3000);
}

async function registerAdminPushSub() {
  try {
    const kr = await fetch('/api/push/vapid-key');
    if (!kr.ok) throw new Error('vapid-key ' + kr.status);
    const { publicKey } = await kr.json();
    if (!publicKey) throw new Error('no publicKey');

    const sw = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('SW timeout')), 10000))
    ]);

    const existing = await sw.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
    const sub = await sw.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });
    if (!sub) throw new Error('subscribe returned null');

    const r = await fetch('/api/push/admin-subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ subscription: sub.toJSON() })
    });
    if (!r.ok) throw new Error('server ' + r.status);
    console.log('[Push] Admin subscription saved');
  } catch(e) {
    console.error('[Push] Admin setup failed:', e);
    showToast('Notiser: ' + e.message, 'error');
  }
}

function urlBase64ToUint8Array(b64) {
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function connectSocket() {
  socket = io({ auth: { token }, transports: ['websocket', 'polling'] });

  socket.on('admin:new_broadcast', d => {
    // Our own optimistic POST is still in flight — let the HTTP response replace the pending bubble
    if (d.client_temp_id && inFlightBcTempIds.has(d.client_temp_id)) return;
    if (broadcasts.find(x => x.id === d.broadcast.id)) return;
    broadcasts.push(d.broadcast);
    appendBroadcast(d.broadcast);
  });

  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x => x.id === d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderFeed();
  });

  socket.on('broadcast:deleted', d => {
    broadcasts = broadcasts.filter(b => b.id !== d.id);
    const row = document.querySelector(`.bc-msg-row[data-id="${d.id}"]`);
    if (row) row.remove();
  });

  socket.on('broadcast:new_reaction', d => {
    const b = broadcasts.find(x => x.id === d.broadcast_id);
    if (b) b.broadcast_reactions = d.reactions;
    // Update just the reaction counts in the DOM
    updateReactionUI(d.broadcast_id, d.reactions);
  });

  socket.on('client:new_message', d => {
    if (currentClientId === d.client.id) {
      appendMsg(d.message);
      markRead(currentClientId);
    } else {
      let c = clients.find(x => x.id === d.client.id);
      if (!c) {
        // Client not in local list yet — refresh from server
        loadClients();
      } else {
        c.unread_count = (c.unread_count || 0) + 1;
        renderClients();
        updateUnreadBadge();
      }
    }
  });

  socket.on('client:last_seen', d => {
    const c = clients.find(x => x.id === d.client_id);
    if (c) { c.last_seen_at = d.last_seen_at; renderClients(); }
  });

  socket.on('client:joined', d => { clients.unshift({ ...d.client, unread_count: 0 }); renderClients(); });

  // After reconnect (e.g. server restart), reload fresh data and re-register push
  socket.on('connect', () => {
    loadBroadcasts();
    loadClients();
    setupPush();
  });

  socket.on('client:updated', d => {
    const i = clients.findIndex(x => x.id === d.client.id);
    if (i >= 0) clients[i] = { ...clients[i], ...d.client };
    renderClients();
    if (currentClientId === d.client.id) updateChatHeader();
  });

  socket.on('client:typing', d => {
    if (currentClientId === d.client_id) {
      const row = document.getElementById('typing-row');
      row.style.display = 'block';
      clearTimeout(window._tt);
      window._tt = setTimeout(() => row.style.display = 'none', 3000);
    }
  });

  socket.on('client:read_receipt', d => {
    if (currentClientId === d.client_id) markMsgsReadUI();
  });
}

// ── API ──
function api(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) }
  });
}

// ── Broadcasts ──
async function loadBroadcasts(q = '') {
  const gen = ++bcLoadGen;
  const url = q ? `/api/broadcasts/search?q=${encodeURIComponent(q)}` : '/api/broadcasts';
  const r = await api(url);
  if (gen !== bcLoadGen) return; // a newer call is already in flight — discard this result
  const d = await r.json();
  if (gen !== bcLoadGen) return;
  const pending = broadcasts.filter(b => b._pending || b._failed);
  const fresh = (d.broadcasts || []).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  broadcasts = [...fresh, ...pending];
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('bc-feed');
  if (!broadcasts.length) {
    feed.innerHTML = '<div class="feed-empty">Inga sändningar ännu</div>';
    return;
  }
  let html = '';
  let lastDate = '';
  for (const b of broadcasts) {
    const d = new Date(b.created_at);
    const dateStr = d.toLocaleDateString('sv-SE', { day: '2-digit', month: 'short', year: 'numeric' });
    if (dateStr !== lastDate) {
      html += `<div class="bc-date-sep"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    html += bcBubbleHTML(b);
  }
  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

function appendBroadcast(b) {
  if (document.querySelector(`.bc-msg-row[data-id="${b.id}"]`)) return;
  const feed = document.getElementById('bc-feed');
  const empty = feed.querySelector('.feed-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = bcBubbleHTML(b);
  feed.appendChild(div.firstElementChild);
  requestAnimationFrame(() => { feed.scrollTop = feed.scrollHeight; });
}

function bcBubbleHTML(b) {
  const time = new Date(b.created_at).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const media = b.broadcast_media || [];
  const interested = (b.broadcast_reactions || []).filter(r => r.reaction === 'interested').length;
  const notInt = (b.broadcast_reactions || []).filter(r => r.reaction === 'not_interested').length;
  const pending = !!b._pending;
  const failed = !!b._failed;

  const imgSrc = m => m.thumbnail_url || m.storage_url || '';
  const imgAttrs = m => (pending || failed)
    ? ''
    : `data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)"`;

  let mediaHTML = '';
  if (media.length === 1) {
    const m = media[0];
    mediaHTML = m.storage_url
      ? (m.type === 'video'
        ? `<video src="${m.storage_url}" ${pending ? '' : 'controls'} style="max-width:220px;border-radius:10px;display:block;margin-bottom:6px"></video>`
        : `<img src="${imgSrc(m)}" ${imgAttrs(m)} style="max-width:220px;border-radius:10px;display:block;margin-bottom:6px;cursor:${pending ? 'default' : 'pointer'}" loading="lazy">`)
      : '';
  } else if (media.length > 1) {
    const imgs = media.map(m => m.storage_url && m.type !== 'video'
      ? `<img src="${imgSrc(m)}" ${imgAttrs(m)} loading="lazy">`
      : ''
    ).join('');
    mediaHTML = `<div class="bc-media-grid" style="margin-bottom:6px">${imgs}</div>`;
  }

  let footerHTML;
  if (pending) {
    footerHTML = `<span class="bc-bubble-time">Skickar… <span class="bc-sending-dot"></span></span>`;
  } else if (failed) {
    footerHTML = `<span class="bc-bubble-time" style="color:#ffb3b3" title="${esc(b._failReason || '')}">Fel: ${esc(b._failReason || 'okänt')}</span>
      <button class="bc-retry-btn" onclick="retryBroadcast('${b.id}')">Försök igen</button>
      <button class="bc-del-btn" onclick="discardFailedBroadcast('${b.id}')" title="Släng">✕</button>`;
  } else {
    footerHTML = `<span class="bc-bubble-time">${time}</span>
      <button class="bc-react-btn" onclick="showReactions('${b.id}')">✓ ${interested} &nbsp; ✕ ${notInt}</button>
      <button class="bc-pin-btn${b.is_pinned ? ' pinned' : ''}" onclick="togglePin('${b.id}')" title="${b.is_pinned ? 'Ta bort fästning' : 'Fäst'}">◈</button>
      <button class="bc-del-btn" onclick="deleteBroadcast('${b.id}')" title="Ta bort">✕</button>`;
  }

  const rowCls = `bc-msg-row${pending ? ' pending' : ''}${failed ? ' failed' : ''}`;
  return `<div class="${rowCls}" data-id="${b.id}">
    ${b.is_pinned ? '<div class="bc-pin-tag">◈ Fäst</div>' : ''}
    <div class="bc-bubble">
      ${mediaHTML}
      ${b.price ? `<div class="bc-bubble-price">${esc(b.price)}</div>` : ''}
      ${b.text ? `<div class="bc-bubble-text">${esc(b.text)}</div>` : ''}
      <div class="bc-bubble-footer">${footerHTML}</div>
    </div>
  </div>`;
}

function updateReactionUI(broadcastId, reactions) {
  const row = document.querySelector(`.bc-msg-row[data-id="${broadcastId}"]`);
  if (!row) return;
  const interested = reactions.filter(r => r.reaction === 'interested').length;
  const notInt = reactions.filter(r => r.reaction === 'not_interested').length;
  const btn = row.querySelector('.bc-react-btn');
  if (btn) btn.innerHTML = `✓ ${interested} &nbsp; ✕ ${notInt}`;
}

function postBroadcast() {
  const text = document.getElementById('bc-text').value.trim();
  const price = document.getElementById('bc-price').value.trim();
  const is_pinned = document.getElementById('bc-pin').checked;
  const items = pendingBcMedia.filter(i => !i.removed);
  if (!text && !price && items.length === 0) return;

  // Clear composer instantly — gives immediate feedback regardless of network speed
  document.getElementById('bc-text').value = '';
  document.getElementById('bc-price').value = '';
  document.getElementById('bc-pin').checked = false;
  pendingBcMedia = [];
  document.getElementById('bc-media-prev').innerHTML = '';
  if (extrasOpen) {
    extrasOpen = false;
    document.getElementById('bc-extras').style.display = 'none';
    document.getElementById('bc-extras-btn').classList.remove('active');
  }
  autoResize(document.getElementById('bc-text'));

  // Build optimistic broadcast and show it in the feed immediately
  const tempId = 'tmp-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  inFlightBcTempIds.add(tempId);
  const optimistic = {
    id: tempId,
    text, price, is_pinned,
    created_at: new Date().toISOString(),
    broadcast_media: items.map(i => ({
      storage_url: i.url || i.localUrl,
      thumbnail_url: i.thumbUrl || i.localUrl,
      type: i.type
    })),
    broadcast_reactions: [],
    _pending: true,
    _items: items
  };
  broadcasts.push(optimistic);
  appendBroadcast(optimistic);

  sendBroadcast(optimistic);
}

async function sendBroadcast(optimistic) {
  const tempId = optimistic.id;
  try {
    // Wait for all uploads in this draft (silenced promises — never throw)
    const promises = [...new Set(optimistic._items.map(i => i.uploadPromise).filter(Boolean))];
    if (promises.length) await Promise.all(promises);

    // Check upload results via item.url (set by uploadFiles on success)
    const failedUploads = optimistic._items.filter(i => !i.removed && !i.url);
    if (failedUploads.length) throw new Error('upload incomplete');

    // Only include items that successfully uploaded
    const media = optimistic._items.filter(i => !i.removed && i.url)
      .map(i => ({ url: i.url, thumbUrl: i.thumbUrl, type: i.type }));

    const r = await api('/api/broadcasts', {
      method: 'POST',
      body: JSON.stringify({
        text: optimistic.text,
        price: optimistic.price,
        is_pinned: optimistic.is_pinned,
        media,
        client_temp_id: tempId
      })
    });
    if (!r.ok) {
      const errBody = await r.json().catch(() => ({}));
      throw new Error(`server ${r.status}: ${errBody.error || 'unknown'}`);
    }
    const d = await r.json();

    if (d.broadcast) {
      replaceOptimisticBroadcast(tempId, d.broadcast);
    } else {
      // Broadcast was saved but server couldn't return full data — reload to show it
      discardOptimisticBroadcast(tempId);
      loadBroadcasts();
    }
  } catch (e) {
    markBroadcastFailed(tempId, e.message);
  } finally {
    inFlightBcTempIds.delete(tempId);
  }
}

function discardOptimisticBroadcast(tempId) {
  broadcasts = broadcasts.filter(b => b.id !== tempId);
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) row.remove();
}

function replaceOptimisticBroadcast(tempId, real) {
  const idx = broadcasts.findIndex(b => b.id === tempId);
  if (idx >= 0) broadcasts[idx] = real;
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) {
    const div = document.createElement('div');
    div.innerHTML = bcBubbleHTML(real);
    const el = div.firstElementChild;
    if (el) row.replaceWith(el);
    else loadBroadcasts(); // fallback — shouldn't happen but be safe
  }
}

function markBroadcastFailed(tempId, reason) {
  const b = broadcasts.find(x => x.id === tempId);
  if (!b) return;
  b._pending = false;
  b._failed = true;
  b._failReason = reason || 'okänt fel';
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) {
    const div = document.createElement('div');
    div.innerHTML = bcBubbleHTML(b);
    row.replaceWith(div.firstElementChild);
  }
}

function retryBroadcast(tempId) {
  const b = broadcasts.find(x => x.id === tempId);
  if (!b) return;
  b._pending = true;
  b._failed = false;
  inFlightBcTempIds.add(tempId);
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) {
    const div = document.createElement('div');
    div.innerHTML = bcBubbleHTML(b);
    row.replaceWith(div.firstElementChild);
  }
  sendBroadcast(b);
}

function discardFailedBroadcast(tempId) {
  broadcasts = broadcasts.filter(b => b.id !== tempId);
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) row.remove();
}

document.getElementById('bc-send-btn').onclick = postBroadcast;
document.getElementById('bc-text').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postBroadcast(); }
});
document.getElementById('bc-text').addEventListener('input', function () { autoResize(this); });

async function deleteBroadcast(id) {
  if (!confirm('Ta bort detta meddelande för alla? Det går inte att ångra.')) return;
  // Remove instantly from UI — don't wait for server
  broadcasts = broadcasts.filter(b => b.id !== id);
  const row = document.querySelector(`.bc-msg-row[data-id="${id}"]`);
  if (row) row.remove();
  api(`/api/broadcasts/${id}`, { method: 'DELETE' });
}

async function togglePin(id) {
  const b = broadcasts.find(x => x.id === id);
  if (b) b.is_pinned = !b.is_pinned;
  renderFeed();
  api(`/api/broadcasts/${id}/pin`, { method: 'PATCH' });
}

async function showReactions(id) {
  const r = await api(`/api/reactions/${id}`);
  const d = await r.json();
  const list = document.getElementById('reaction-list');
  list.innerHTML = !d.reactions?.length
    ? '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Inga reaktioner ännu</div>'
    : d.reactions.map(r => `<div class="reaction-item">
        <span class="reaction-name">${esc(r.clients?.admin_label || r.clients?.display_name || 'Okänd')}</span>
        <span class="reaction-val">${r.reaction === 'interested' ? '✓ Intresserad' : '✕ Inte intresserad'}</span>
      </div>`).join('');
  document.getElementById('reaction-modal').classList.add('open');
}

// ── Clients ──
function renderClients() {
  const list = document.getElementById('clients-list');
  const active = clients.filter(c => !c.is_inactive);
  const inactive = clients.filter(c => c.is_inactive);
  if (!clients.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px">Inga klienter ännu</div>';
    return;
  }
  list.innerHTML = [...active, ...inactive].map(c => {
    const init = (c.admin_label || c.display_name || '?')[0].toUpperCase();
    const seen = c.last_seen_at ? timeAgo(c.last_seen_at) : '';
    const unread = c.unread_count > 0 ? `<div class="unread-badge">${c.unread_count}</div>` : '';
    return `<div class="client-row${c.is_inactive ? ' client-inactive' : ''}" onclick="openChat('${c.id}')">
      <div class="client-avatar">${init}</div>
      <div class="client-body">
        <div class="client-name">${esc(c.admin_label || c.display_name)}</div>
        <div class="client-label">${c.admin_label ? esc(c.display_name) : ''}</div>
      </div>
      <div class="client-right">
        ${unread}
        <div class="last-seen-txt">${seen}</div>
      </div>
    </div>`;
  }).join('');
}

function updateUnreadBadge() {
  totalUnread = clients.reduce((s, c) => s + (c.unread_count || 0), 0);
  const badge = document.getElementById('clients-badge');
  if (totalUnread > 0) { badge.textContent = totalUnread; badge.style.display = 'flex'; }
  else badge.style.display = 'none';
}

async function loadClients() {
  const r = await api('/api/clients');
  const d = await r.json();

function msgHTML(m) {
  const time = new Date(m.created_at).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const from = m.sender === 'admin' ? 'from-admin' : 'from-client';
  const media = m.message_media || [];
  const mediaHTML = media.map(md => md.storage_url
    ? (md.type === 'video'
      ? `<video src="${md.storage_url}" controls style="max-width:200px;border-radius:10px;margin-top:6px;display:block"></video>`
      : `<img src="${md.thumbnail_url || md.storage_url}" data-full="${md.storage_url}" onclick="openLightbox(this.dataset.full)" style="max-width:200px;border-radius:10px;margin-top:6px;cursor:pointer;display:block" loading="lazy">`)
    : `<span style="font-size:12px;color:#555;font-style:italic">Bild ej tillgänglig</span>`
  ).join('');
  const tick = m.sender === 'admin' ? `<span class="read-tick">${m.read ? '✓✓' : '✓'}</span>` : '';
  return `<div class="msg-row ${from}">
    <div class="bubble">${m.text ? esc(m.text) : ''}${mediaHTML ? `<div class="bubble-media">${mediaHTML}</div>` : ''}</div>
    <div class="msg-meta">${time} ${tick}</div>

}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const items = pendingChatMedia.filter(i => !i.removed);
  if (!text && items.length === 0) return;
  input.value = '';
  autoResize(input);

  // Wait for any uploads in this draft
  const promises = [...new Set(items.map(i => i.uploadPromise).filter(Boolean))];
  if (promises.length) {
    try { await Promise.all(promises); }
    catch { return; } // alert already shown by uploadFiles
  }
  const media = items.map(i => ({ url: i.url, thumbUrl: i.thumbUrl, type: i.type }));

  const r = await api(`/api/messages/${currentClientId}`, {
    method: 'POST', body: JSON.stringify({ text, media })
  });
  if (r.ok) {
    pendingChatMedia = [];
    document.getElementById('chat-media-prev').innerHTML = '';
    const d = await r.json();
    appendMsg(d.message);
  }
}

// ── Media upload ──
function uploadFiles(files, arr, prevEl) {
  const items = Array.from(files).map(file => {
    const localUrl = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video');
    const div = document.createElement('div');
    div.className = 'prev-sm uploading';
    div.innerHTML = isVideo
      ? `<video src="${localUrl}" muted></video><button>✕</button>`
      : `<img src="${localUrl}" alt=""><button>✕</button>`;
    const item = {
      localUrl,
      type: isVideo ? 'video' : 'image',
      url: null,
      thumbUrl: null,
      uploadPromise: null,
      removed: false,
      _div: div
    };
    div.querySelector('button').onclick = () => {
      item.removed = true;
      const idx = arr.indexOf(item);
      if (idx >= 0) arr.splice(idx, 1);
      div.remove();
    };
    prevEl.appendChild(div);
    arr.push(item);
    return { item, file };
  });

  const up = (async () => {
    const form = new FormData();
    items.forEach(({ file }) => form.append('files', file));
    const r = await fetch('/api/upload', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form });
    if (!r.ok) throw new Error('upload failed');
    const d = await r.json();
    d.files.forEach((f, i) => {
      const { item } = items[i];
      item.url = f.url;
      item.thumbUrl = f.thumbUrl;
      if (item._div.parentElement) item._div.classList.remove('uploading');
    });
  })();

  // Silenced promise: never rejects, so await Promise.all([uploadPromise]) only throws
  // if the JS engine itself is broken. Failure is detected via item.url being null.
  const upSilenced = up.catch(() => {});
  upSilenced.then(() => {
    // Show alert only if items actually failed (url not set)
    if (items.some(({ item }) => !item.url && !item.removed)) {
      items.forEach(({ item }) => {
        if (item._div.parentElement) item._div.classList.remove('uploading');
      });
      alert('Uppladdning misslyckades');
    }
  });

  items.forEach(({ item }) => item.uploadPromise = upSilenced);
}

function timeAgo(iso) {
  const d = (Date.now() - new Date(iso)) / 1000;

function handleInvImg(input) {
  const file = input.files[0];
  if (!file) return;
  compressInvImage(file, base64 => {

  });
}

function compressInvImage(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const image = new Image();
    image.onload = () => {
      const MAX = 400;
      const scale = Math.min(1, MAX / Math.max(image.width, image.height));
      const w = Math.round(image.width * scale);
      const h = Math.round(image.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(image, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', 0.65));
    };
    image.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function generateCatalogPDF() {
  const items = Object.values(invItemsMap);
  if (!items.length) { showToast('Lagret är tomt', 'error'); return; }

  const btn = document.querySelector('.inv-catalog-btn');
  btn.textContent = 'Genererar…'; btn.disabled = true;

  if (!window.jspdf) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    doc.setProperties({ title: 'Vision Palace – Katalog', creator: 'Vision Palace' });

    const PW = 210, PH = 297, M = 14, COLS = 2, CGAP = 6, RGAP = 8;
    const CW = (PW - M * 2 - CGAP) / COLS;
    const IH = 76, TH = 24, CH = IH + TH;

    const drawHeader = (first) => {
      if (first) {
        doc.setFont('times', 'italic'); doc.setFontSize(21); doc.setTextColor(26, 26, 26);
        doc.text('Vision Palace', PW / 2, M + 7, { align: 'center' });
        doc.setFont('helvetica', 'normal'); doc.setFontSize(6.5); doc.setTextColor(160, 160, 160);
        doc.text('K  A  T  A  L  O  G', PW / 2, M + 13, { align: 'center' });
        doc.text(new Date().toLocaleDateString('sv-SE'), PW / 2, M + 18, { align: 'center' });
        doc.setDrawColor(221, 217, 209); doc.setLineWidth(0.25);
        doc.line(M, M + 22, PW - M, M + 22);
        return M + 27;
      } else {
        doc.setFont('times', 'italic'); doc.setFontSize(9); doc.setTextColor(190, 185, 175);
        doc.text('Vision Palace', PW / 2, M + 4, { align: 'center' });
        doc.setDrawColor(221, 217, 209); doc.setLineWidth(0.2);
        doc.line(M, M + 6, PW - M, M + 6);
        return M + 11;
      }
    };

    let y = drawHeader(true), col = 0;
    for (const item of items) {
      if (y + CH > PH - M) { doc.addPage(); y = drawHeader(false); col = 0; }
      const x = M + col * (CW + CGAP);
      if (item.image) {
        try {
          const fmt = item.image.startsWith('data:image/png') ? 'PNG' : 'JPEG';
          doc.addImage(item.image, fmt, x, y, CW, IH, undefined, 'MEDIUM');
        } catch {
          doc.setFillColor(238, 233, 227); doc.rect(x, y, CW, IH, 'F');
        }
      } else {
        doc.setFillColor(238, 233, 227); doc.rect(x, y, CW, IH, 'F');
      }
      doc.setDrawColor(221, 217, 209); doc.setLineWidth(0.2); doc.rect(x, y, CW, CH);
      doc.line(x, y + IH, x + CW, y + IH);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(6); doc.setTextColor(171, 171, 171);
      doc.text(String(item.ref_code || '').toUpperCase(), x + 4, y + IH + 5.5);
      doc.setFont('times', 'normal'); doc.setFontSize(11); doc.setTextColor(26, 26, 26);
      const ns = doc.splitTextToSize(item.name, CW - 8);
      doc.text(ns[0] + (ns.length > 1 ? '…' : ''), x + 4, y + IH + 13);
      doc.setFontSize(13);
      doc.text(item.sell_price != null ? `€ ${Number(item.sell_price).toLocaleString('sv-SE')}` : '—', x + 4, y + IH + 21);
      col++; if (col >= COLS) { col = 0; y += CH + RGAP; }
    }

    const total = doc.getNumberOfPages();
    for (let p = 1; p <= total; p++) {
      doc.setPage(p); doc.setFont('helvetica', 'normal');
      doc.setFontSize(6.5); doc.setTextColor(180, 180, 180);
      doc.text(`${p} / ${total}`, PW / 2, PH - 6, { align: 'center' });
    }

    const today = new Date().toLocaleDateString('sv-SE').replace(/\//g, '-');
    doc.save(`katalog-clunettes-${today}.pdf`);
    showToast('Katalog skapad', 'success');
  } catch (e) {
    showToast('PDF-fel: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Katalog PDF'; btn.disabled = false;
  }
}

      doc.text(ns[0] + (ns.length > 1 ? '…' : ''), x + 4, y + IH + 13);
      doc.setFontSize(13);
      doc.text(item.sell_price != null ? `€ ${Number(item.sell_price).toLocaleString('sv-SE')}` : '—', x + 4, y + IH + 21);
      col++; if (col >= COLS) { col = 0; y += CH + RGAP; }
    }
    const total = doc.getNumberOfPages();
    for (let p = 1; p <= total; p++) {
      doc.setPage(p); doc.setFont('helvetica', 'normal');
      doc.setFontSize(6.5); doc.setTextColor(180, 180, 180);
      doc.text(`${p} / ${total}`, PW / 2, PH - 6, { align: 'center' });
    }

    // Upload PDF blob
    const blob = doc.output('blob');
    const form = new FormData();
    form.append('files', blob, 'katalog.pdf');
    const up = await fetch('/api/upload', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form });
    if (!up.ok) { showToast('Uppladdning misslyckades', 'error'); return; }
    const ud = await up.json();
    const pdfUrl = ud.files?.[0]?.url;
    if (!pdfUrl) { showToast('Ingen URL från uppladdning', 'error'); return; }

    // Send as message
    const r = await api(`/api/messages/${clientId}`, {
      method: 'POST',
      body: JSON.stringify({
        text: 'Vision Palace – Katalog',
        message_type: 'pdf',
        metadata: { url: pdfUrl }
      })
    });
    if (r.ok) {
      const d = await r.json();
      if (currentClientId === clientId) appendMsg(d.message);
      showToast('Katalog skickad', 'success');
    } else {
      showToast('Kunde inte skicka katalogen', 'error');
    }
  } catch (e) {
    showToast('Fel: ' + e.message, 'error');
  }
}

function populateInvClientPicker() {

function fillInvClient(clientId) {

function setInvCustType(type) {

function switchInvTab(tab) {
  document.getElementById('inv-panel-form').style.display = tab === 'form' ? '' : 'none';
  document.getElementById('inv-panel-preview').style.display = tab === 'preview' ? '' : 'none';
  document.getElementById('inv-tab-form').classList.toggle('active', tab === 'form');
  document.getElementById('inv-tab-preview').classList.toggle('active', tab === 'preview');
  if (tab === 'preview') scaleInvDoc();
}

function scaleInvDoc() {
  const outer = document.getElementById('inv-scale-outer');
  const inner = document.getElementById('inv-doc-inner');
  if (!outer || !inner) return;
  const available = outer.offsetWidth;
  const scale = Math.min(1, available / 794);
  inner.style.transform = scale < 1 ? `scale(${scale})` : '';
  outer.style.height = scale < 1 ? Math.ceil(1123 * scale) + 'px' : '';
}

function addInvLine(desc = '', qty = '1', price = '', vat = '0') {
  const id = invLineNextId++;
  invLineItems.push({ id, desc, qty, price, vat });
  renderInvLines();
}

function removeInvLine(id) {
  invLineItems = invLineItems.filter(r => r.id !== id);
  renderInvLines();
}

function updateInvLine(id, field, value) {
  const item = invLineItems.find(r => r.id === id);
  if (item) item[field] = value;
}

function renderInvLines() {
  const container = document.getElementById('inv-line-items');
  if (!container) return;
  container.innerHTML = '';
  invLineItems.forEach(item => {
    const div = document.createElement('div');
    div.className = 'inv-line-item';
    div.innerHTML = `
      <button class="inv-line-remove" title="Ta bort">×</button>
      <div class="inv-field">
        <label>Beskrivning / Artikelnr</label>
        <input class="inv-input" type="text" placeholder="ex. CT0622S-005" data-field="desc">
      </div>
      <div class="inv-row-grid">
        <div class="inv-field">
          <label>Antal</label>
          <input class="inv-input" type="number" min="0" step="any" inputmode="decimal" data-field="qty">
        </div>
        <div class="inv-field">
          <label>Pris (€)</label>
          <input class="inv-input" type="number" min="0" step="0.01" placeholder="0.00" inputmode="decimal" data-field="price">
        </div>
      </div>
      <div class="inv-field">
        <label>Momssats (%)</label>
        <select class="inv-input" data-field="vat">
          <option value="0">0%</option>
          <option value="6">6%</option>
          <option value="12">12%</option>
          <option value="25">25%</option>
        </select>
      </div>`;
    div.querySelector('[data-field="desc"]').value = item.desc;
    div.querySelector('[data-field="qty"]').value = item.qty;
    div.querySelector('[data-field="price"]').value = item.price;
    div.querySelector('[data-field="vat"]').value = item.vat;
    div.querySelector('.inv-line-remove').addEventListener('click', () => removeInvLine(item.id));
    div.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('change', () => updateInvLine(item.id, input.dataset.field, input.value));
    });
    container.appendChild(div);
  });
}

function generateInvoice() {

    subtotal += net;
    if (!vatGroups[vat]) vatGroups[vat] = 0;
    vatGroups[vat] += net * (vat / 100);

  const totalVat = Object.values(vatGroups).reduce((a, b) => a + b, 0);

async function saveInvPDF() {
  const inner = document.getElementById('inv-doc-inner');
  if (!inner) { alert('Generera fakturan först'); return; }
  if (!window.html2pdf) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    }).catch(() => { alert('Kunde inte ladda PDF-biblioteket'); });
  }
  if (!window.html2pdf) return;
  const invNumber = document.getElementById('inv-number').value.trim() || 'invoice';
  const outer = document.getElementById('inv-scale-outer');
  const savedTransform = inner.style.transform;
  const savedOuterHeight = outer ? outer.style.height : '';
  inner.style.transform = '';
  inner.style.minHeight = '0';
  if (outer) outer.style.height = '';
  await html2pdf().set({
    margin: 0,
    filename: `invoice-${invNumber}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
  }).from(inner).save();
  inner.style.transform = savedTransform;
  inner.style.minHeight = '';
  if (outer) outer.style.height = savedOuterHeight;
  scaleInvDoc();
}

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vision Palace – Admin</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --blue: #4a9eff;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── Login ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; padding: 24px; background: var(--bg);
}
.login-card { width: 100%; max-width: 360px; text-align: center; }
.login-logo {
  width: 72px; height: 72px; background: var(--blue); border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900; color: #fff; margin: 0 auto 20px;
  box-shadow: 0 8px 32px rgba(74,158,255,.35);
}
.login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
.login-card p { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
.login-card input {
  width: 100%; padding: 15px 18px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none; transition: border-color .2s;
  -webkit-appearance: none;
}
.login-card input:focus { border-color: var(--blue); }
.login-btn {
  width: 100%; margin-top: 12px; padding: 15px; background: var(--blue); border: none;
  border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
}
.login-btn:active { opacity: .85; }
.login-error { color: #ff5555; font-size: 13px; margin-top: 12px; }

/* ── App ── */
#app { display: none; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; display: flex; align-items: center; gap: 12px;
  height: calc(56px + var(--safe-top)); padding-top: var(--safe-top);
  flex-shrink: 0;
}
.header-logo {
  width: 36px; height: 36px; background: var(--blue); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: #fff; flex-shrink: 0;
}
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.hbtn {
  padding: 7px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.hbtn:active { opacity: .75; }
.hbtn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

/* ── Tab bar ── */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot); flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0; background: none; border: none; cursor: pointer; gap: 4px;
  color: var(--text3); transition: color .15s; position: relative;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { font-size: 20px; }
.tab-label { font-size: 10px; font-weight: 600; }
.tab-badge {
  position: absolute; top: 6px; right: calc(50% - 18px);
  background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; display: none;
  align-items: center; justify-content: center; padding: 0 4px;
}

/* ── Views ── */
.view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* ── Compose view ── */
#compose-view { overflow-y: auto; padding: 16px; gap: 12px; -webkit-overflow-scrolling: touch; }
#compose-view::-webkit-scrollbar { display: none; }

.compose-card { background: var(--surface); border-radius: 16px; overflow: hidden; }
.compose-card-header {
  padding: 14px 16px 0; font-size: 12px; font-weight: 700; color: var(--text3);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.compose-textarea {
  width: 100%; padding: 12px 16px; background: transparent; border: none;
  color: var(--text); font-size: 15px; resize: none; outline: none;
  min-height: 90px; font-family: inherit; line-height: 1.5;
}
.compose-textarea::placeholder { color: var(--text3); }
.compose-divider { height: 1px; background: var(--border); margin: 0 16px; }
.compose-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; }
.compose-input {
  flex: 1; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 14px; outline: none;
  -webkit-appearance: none;
}
.compose-input::placeholder { color: var(--text3); }
.compose-input:focus { border-color: var(--blue); }
.pin-toggle {
  display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text2);
}
.pin-toggle input { width: 18px; height: 18px; accent-color: var(--blue); cursor: pointer; }

.media-add-btn {
  display: flex; align-items: center; gap: 8px; padding: 11px 16px;
  background: var(--surface2); border: 1.5px dashed var(--border); border-radius: 12px;
  cursor: pointer; color: var(--text3); font-size: 14px; transition: all .15s;
}
.media-add-btn:hover, .media-add-btn:active { border-color: var(--blue); color: var(--blue); }
#file-input { display: none; }

.media-grid-preview { display: flex; gap: 8px; flex-wrap: wrap; }
.prev-thumb {
  position: relative; width: 72px; height: 72px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border);
}
.prev-thumb img, .prev-thumb video { width: 100%; height: 100%; object-fit: cover; }
.prev-thumb .rm {
  position: absolute; top: 3px; right: 3px; width: 18px; height: 18px;
  background: rgba(0,0,0,.75); border: none; color: #fff; border-radius: 50%;
  font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.post-btn {
  width: 100%; padding: 15px; background: var(--blue); border: none; border-radius: 14px;
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .15s;
}
.post-btn:active { opacity: .85; }

/* ── Feed view (admin) ── */
#admin-feed-view { overflow-y: auto; -webkit-overflow-scrolling: touch; }
#admin-feed-view::-webkit-scrollbar { display: none; }

.search-bar { padding: 12px 16px; position: sticky; top: 0; background: var(--bg); z-index: 5; }
.search-input {
  width: 100%; padding: 10px 14px 10px 38px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 12px; color: var(--text);
  font-size: 14px; outline: none; -webkit-appearance: none;
}
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }

.feed-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px; }

.admin-card {
  background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
}
.admin-card.pinned { border-color: rgba(74,158,255,.4); }
.admin-card-media img {
  width: 100%; max-height: 200px; object-fit: cover; display: block; cursor: pointer;
}
.admin-card-media video { width: 100%; max-height: 160px; object-fit: cover; display: block; }
.admin-card-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.admin-card-media-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; }
.admin-card-body { padding: 12px 14px; }
.admin-card-price { font-size: 18px; font-weight: 800; color: var(--blue); margin-bottom: 4px; }
.admin-card-text { font-size: 13px; color: #ccc; line-height: 1.5; white-space: pre-wrap; }
.admin-card-footer {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.admin-card-meta { font-size: 11px; color: var(--text3); }
.admin-card-actions { display: flex; gap: 8px; align-items: center; }
.reactions-pill {
  font-size: 12px; color: var(--text2); background: var(--surface2);
  padding: 5px 10px; border-radius: 8px; cursor: pointer; border: none;
}
.pin-btn {
  font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); cursor: pointer;
}
.pin-active { border-color: var(--blue); color: var(--blue); }

/* ── Clients view ── */
#clients-view { overflow-y: auto; -webkit-overflow-scrolling: touch; }
#clients-view::-webkit-scrollbar { display: none; }
.clients-list { padding: 8px 0; }
.client-row {
  display: flex; align-items: center; gap: 12px; padding: 13px 16px;
  border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; transition: background .12s;
}
.client-row:active { background: var(--surface); }
.client-avatar {
  width: 46px; height: 46px; border-radius: 50%; background: var(--blue-dim, #1a3a6a);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--blue); flex-shrink: 0;
}
.client-body { flex: 1; min-width: 0; }
.client-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-label { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.unread-badge {
  background: var(--blue); color: #fff; font-size: 11px; font-weight: 700;
  min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; padding: 0 5px;
}
.last-seen-txt { font-size: 11px; color: var(--text3); }
.client-inactive { opacity: .35; }

/* ── Chat panel ── */
#chat-panel {
  position: fixed; inset: 0; background: var(--bg); z-index: 40;
  display: none; flex-direction: column;
  transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
}
#chat-panel.open { display: flex; transform: translateX(0); }

.chat-panel-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; display: flex; align-items: center; gap: 12px;
  height: calc(56px + var(--safe-top)); padding-top: var(--safe-top); flex-shrink: 0;
}
.back-btn {
  background: none; border: none; color: var(--blue); font-size: 22px;
  cursor: pointer; padding: 4px; display: flex; align-items: center;
}
.chat-panel-info { flex: 1; min-width: 0; }
.chat-panel-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-panel-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.danger-btn {
  padding: 6px 12px; border-radius: 8px; border: 1px solid #ff3b30;
  background: transparent; color: #ff3b30; font-size: 12px; cursor: pointer;
}

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px;
  -webkit-overflow-scrolling: touch;
}
.chat-messages::-webkit-scrollbar { display: none; }

.msg-row { display: flex; flex-direction: column; margin-bottom: 2px; }
.msg-row.from-admin { align-items: flex-end; }
.msg-row.from-client { align-items: flex-start; }
.bubble {
  max-width: 78%; padding: 9px 13px; border-radius: 18px;
  word-break: break-word; white-space: pre-wrap; font-size: 15px; line-height: 1.4; position: relative;
}
.msg-row.from-admin .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 5px; }
.msg-row.from-client .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 5px; }
.msg-meta { font-size: 11px; color: var(--text3); margin: 3px 4px 6px; display: flex; align-items: center; gap: 4px; }
.msg-row.from-admin .msg-meta { align-self: flex-end; }
.read-tick { color: rgba(255,255,255,.6); }
.bubble-media img { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer; }
.bubble-media video { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; }
.typing-row { padding: 4px 16px 8px; }
.typing-dots { display: inline-flex; gap: 4px; padding: 10px 14px; background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 5px; }
.typing-dots span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce .9s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* Label edit bar */
.label-bar {
  padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.label-bar input {
  flex: 1; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px; outline: none;
}
.label-bar input:focus { border-color: var(--blue); }
.label-save { padding: 8px 14px; background: var(--blue); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }

.chat-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 12px; padding-bottom: max(10px, var(--safe-bot)); flex-shrink: 0;
}
.chat-media-prev { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.prev-sm {
  position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.prev-sm img, .prev-sm video { width: 100%; height: 100%; object-fit: cover; }
.prev-sm button { position: absolute; top: 2px; right: 2px; width: 15px; height: 15px; background: rgba(0,0,0,.75); border: none; color: #fff; border-radius: 50%; font-size: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.composer-row { display: flex; gap: 8px; align-items: flex-end; }
.attach-sm {
  width: 42px; height: 42px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px;
  color: var(--text); padding: 10px 16px; font-size: 15px; resize: none; outline: none;
  max-height: 120px; min-height: 42px; font-family: inherit; line-height: 1.4;
}
.msg-input:focus { border-color: var(--blue); }
.msg-input::placeholder { color: var(--text3); }
.send-btn {
  width: 42px; height: 42px; background: var(--blue); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#chat-file-input { display: none; }
.chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text3); font-size: 14px; }

/* ── Modals ── */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 80; align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-sheet {
  background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 500px;
  padding: 20px; padding-bottom: max(20px, var(--safe-bot)); max-height: 80dvh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

.invite-row {
  display: flex; align-items: center; gap: 8px; background: var(--surface2);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.invite-url { flex: 1; font-size: 12px; color: var(--blue); word-break: break-all; line-height: 1.4; }
.copy-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; flex-shrink: 0; }

.reaction-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface2); border-radius: 10px; margin-bottom: 6px; font-size: 13px; }
.reaction-name { font-weight: 600; }
.reaction-val { color: var(--text2); }

/* ── Lightbox ── */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 999; align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
#lb-close { position: absolute; top: max(16px, var(--safe-top)); right: 16px; background: rgba(255,255,255,.12); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">VP</div>
    <h1>Vision Palace</h1>
    <p>Admin-inloggning</p>
    <input type="password" id="pw-input" placeholder="Lösenord" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Logga in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <div class="header-logo">VP</div>
    <div class="header-title">Admin</div>
    <button class="hbtn primary" id="invite-open-btn">+ Bjud in</button>
    <button class="hbtn" id="logout-btn">Logga ut</button>
  </div>

  <div style="flex:1;overflow:hidden;display:flex;flex-direction:column">

    <!-- Compose -->
    <div class="view active" id="compose-view">
      <div class="compose-card">
        <div class="compose-card-header">Ny sändning</div>
        <textarea class="compose-textarea" id="bc-text" placeholder="Skriv en uppdatering till alla klienter…"></textarea>
        <div class="compose-divider"></div>
        <div class="compose-row">
          <input class="compose-input" id="bc-price" placeholder="Pris (valfritt)" style="max-width:160px">
          <label class="pin-toggle">
            <input type="checkbox" id="bc-pin"> Fäst
          </label>
        </div>
        <div class="compose-divider"></div>
        <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">
          <label class="media-add-btn">
            <span>📎</span><span>Lägg till bilder / video</span>
            <input type="file" id="file-input" multiple accept="image/*,video/*">
          </label>
          <div class="media-grid-preview" id="bc-media-preview"></div>
          <button class="post-btn" id="post-btn">Publicera sändning</button>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div class="view" id="admin-feed-view">
      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="search-input" placeholder="Sök sändningar…">
        </div>
      </div>
      <div class="feed-list" id="feed-list">
        <div style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px">Inga sändningar ännu</div>
      </div>
    </div>

    <!-- Clients -->
    <div class="view" id="clients-view">
      <div class="clients-list" id="clients-list">
        <div style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px">Inga klienter ännu</div>
      </div>
    </div>

  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-compose" onclick="switchTab('compose')">
      <span class="tab-icon">✏️</span>
      <span class="tab-label">Komponera</span>
    </button>
    <button class="tab-btn" id="tab-admin-feed" onclick="switchTab('admin-feed')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Sändningar</span>
    </button>
    <button class="tab-btn" id="tab-clients" onclick="switchTab('clients')">
      <span class="tab-icon">👥</span>
      <span class="tab-label">Klienter</span>
      <span class="tab-badge" id="clients-badge"></span>
    </button>
  </div>
</div>

<!-- Chat panel -->
<div id="chat-panel">
  <div class="chat-panel-header">
    <button class="back-btn" id="chat-back">‹</button>
    <div class="chat-panel-info">
      <div class="chat-panel-name" id="cp-name"></div>
      <div class="chat-panel-sub" id="cp-sub"></div>
    </div>
    <button class="danger-btn" id="toggle-inactive-btn"></button>
  </div>
  <div class="label-bar">
    <input id="label-input" placeholder="Intern etikett (syns bara för dig)…">
    <button class="label-save" id="label-save-btn">Spara</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty">💬 Ingen konversation ännu</div>
  </div>
  <div class="typing-row" id="typing-row" style="display:none">
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="chat-composer">
    <div class="chat-media-prev" id="chat-media-prev"></div>
    <div class="composer-row">
      <label class="attach-sm">📎<input type="file" id="chat-file-input" multiple accept="image/*,video/*"></label>
      <textarea class="msg-input" id="msg-input" placeholder="Skriv ett meddelande…" rows="1"></textarea>
      <button class="send-btn" id="send-btn">↑</button>
    </div>
  </div>
</div>

<!-- Invite modal -->
<div class="modal-bg" id="invite-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Bjud in klienter</div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px">
      <label style="font-size:13px;color:var(--text2)">Antal:</label>
      <input type="number" id="invite-count" value="1" min="1" max="10" style="width:60px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none">
      <button class="hbtn primary" id="gen-invites-btn">Generera</button>
    </div>
    <div id="invite-links"></div>
    <button class="hbtn" style="width:100%;margin-top:12px;padding:12px;justify-content:center" onclick="document.getElementById('invite-modal').classList.remove('open')">Stäng</button>
  </div>
</div>

<!-- Reactions modal -->
<div class="modal-bg" id="reaction-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Reaktioner</div>
    <div id="reaction-list"></div>
    <button class="hbtn" style="width:100%;margin-top:12px;padding:12px" onclick="document.getElementById('reaction-modal').classList.remove('open')">Stäng</button>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<script>
let token = localStorage.getItem('vp_admin_token');
let socket = null;
let broadcasts = [];
let clients = [];
let currentClientId = null;
let pendingMedia = [];
let pendingChatMedia = [];
let totalUnread = 0;

// ── Auth ──
document.getElementById('login-btn').onclick = login;
document.getElementById('pw-input').addEventListener('keydown', e => e.key==='Enter' && login());

async function login() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch('/api/auth/admin', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Fel lösenord'; return; }
    token = d.token;
    localStorage.setItem('vp_admin_token', token);
    initApp();
  } catch { err.textContent = 'Anslutningsfel'; }
}

document.getElementById('logout-btn').onclick = () => {
  localStorage.removeItem('vp_admin_token');
  location.reload();
};

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab + '-view').classList.add('active');
}

// ── Init ──
function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadClients();
}

function connectSocket() {
  socket = io({ auth: { token } });
  socket.on('admin:new_broadcast', d => { broadcasts.unshift(d.broadcast); renderFeed(); });
  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x => x.id===d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderFeed();
  });
  socket.on('client:new_message', d => {
    if (currentClientId === d.client.id) {
      appendMsg(d.message);
      markRead(currentClientId);
    } else {
      const c = clients.find(x => x.id===d.client.id);
      if (c) { c.unread_count = (c.unread_count||0)+1; renderClients(); updateUnreadBadge(); }
    }
  });
  socket.on('broadcast:new_reaction', d => {
    const b = broadcasts.find(x => x.id===d.broadcast_id);
    if (b) b.broadcast_reactions = d.reactions;
    renderFeed();
  });
  socket.on('client:last_seen', d => {
    const c = clients.find(x => x.id===d.client_id);
    if (c) { c.last_seen_at = d.last_seen_at; renderClients(); }
  });
  socket.on('client:joined', d => { clients.unshift({...d.client, unread_count:0}); renderClients(); });
  socket.on('client:updated', d => {
    const i = clients.findIndex(x => x.id===d.client.id);
    if (i>=0) clients[i] = {...clients[i], ...d.client};
    renderClients();
    if (currentClientId===d.client.id) updateChatHeader();
  });
  socket.on('client:typing', d => {
    if (currentClientId===d.client_id) {
      const row = document.getElementById('typing-row');
      row.style.display = 'block';
      clearTimeout(window._tt);
      window._tt = setTimeout(()=>row.style.display='none', 3000);
    }
  });
  socket.on('client:read_receipt', d => {
    if (currentClientId===d.client_id) markMsgsReadUI();
  });
}

// ── API ──
function api(url, opts={}) {
  return fetch(url, { ...opts, headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}`, ...(opts.headers||{}) } });
}

async function loadBroadcasts(q='') {
  const url = q ? `/api/broadcasts/search?q=${encodeURIComponent(q)}` : '/api/broadcasts';
  const r = await api(url);
  const d = await r.json();
  broadcasts = d.broadcasts || [];
  renderFeed();
}

async function loadClients() {
  const r = await api('/api/clients');
  const d = await r.json();
  clients = d.clients || [];
  renderClients();
  updateUnreadBadge();
}

// ── Broadcasts ──
function renderFeed() {
  const list = document.getElementById('feed-list');
  if (!broadcasts.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px">Inga sändningar ännu</div>';
    return;
  }
  const sorted = [...broadcasts].sort((a,b)=>{
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return new Date(b.created_at)-new Date(a.created_at);
  });
  list.innerHTML = sorted.map(adminCardHTML).join('');
}

function adminCardHTML(b) {
  const date = new Date(b.created_at).toLocaleString('sv-SE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const media = b.broadcast_media||[];
  const int = (b.broadcast_reactions||[]).filter(r=>r.reaction==='interested').length;
  const nint = (b.broadcast_reactions||[]).filter(r=>r.reaction==='not_interested').length;
  const gridClass = media.length>1 ? 'admin-card-media admin-card-media-grid' : 'admin-card-media';

  const mediaHTML = media.length ? `<div class="${gridClass}">${media.map(m=>
    m.storage_url
      ? (m.type==='video'
        ? `<video src="${m.storage_url}" controls preload="metadata"></video>`
        : `<img src="${m.thumbnail_url||m.storage_url}" data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)" loading="lazy">`)
      : `<div style="padding:16px;font-size:12px;color:var(--text3);font-style:italic">Bild ej tillgänglig</div>`
  ).join('')}</div>` : '';

  return `<div class="admin-card${b.is_pinned?' pinned':''}">
    ${mediaHTML}
    ${(b.text||b.price) ? `<div class="admin-card-body">
      ${b.price?`<div class="admin-card-price">${esc(b.price)}</div>`:''}
      ${b.text?`<div class="admin-card-text">${esc(b.text)}</div>`:''}
    </div>` : ''}
    <div class="admin-card-footer">
      <span class="admin-card-meta">${date}</span>
      <div class="admin-card-actions">
        <button class="reactions-pill" onclick="showReactions('${b.id}')">👍${int} ❌${nint}</button>
        <button class="pin-btn${b.is_pinned?' pin-active':''}" onclick="togglePin('${b.id}')">${b.is_pinned?'📌 Lossa':'📌 Fäst'}</button>
      </div>
    </div>
  </div>`;
}

async function postBroadcast() {
  const text = document.getElementById('bc-text').value.trim();
  const price = document.getElementById('bc-price').value.trim();
  const is_pinned = document.getElementById('bc-pin').checked;
  const btn = document.getElementById('post-btn');
  btn.textContent = 'Publicerar…'; btn.disabled = true;
  const r = await api('/api/broadcasts', {
    method:'POST', body: JSON.stringify({ text, price, is_pinned, media: pendingMedia })
  });
  btn.textContent = 'Publicera sändning'; btn.disabled = false;
  if (r.ok) {
    document.getElementById('bc-text').value = '';
    document.getElementById('bc-price').value = '';
    document.getElementById('bc-pin').checked = false;
    pendingMedia = [];
    document.getElementById('bc-media-preview').innerHTML = '';
    switchTab('admin-feed');
  }
}

async function togglePin(id) {
  await api(`/api/broadcasts/${id}/pin`, { method:'PATCH' });
}

async function showReactions(id) {
  const r = await api(`/api/reactions/${id}`);
  const d = await r.json();
  const list = document.getElementById('reaction-list');
  list.innerHTML = !d.reactions?.length
    ? '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Inga reaktioner ännu</div>'
    : d.reactions.map(r=>`<div class="reaction-item">
        <span class="reaction-name">${esc(r.clients?.admin_label||r.clients?.display_name||'Okänd')}</span>
        <span class="reaction-val">${r.reaction==='interested'?'👍 Intresserad':'❌ Inte intresserad'}</span>
      </div>`).join('');
  document.getElementById('reaction-modal').classList.add('open');
}

document.getElementById('post-btn').onclick = postBroadcast;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(window._st);
  window._st = setTimeout(()=>loadBroadcasts(e.target.value), 300);
});

// ── Clients ──
function renderClients() {
  const list = document.getElementById('clients-list');
  const active = clients.filter(c=>!c.is_inactive);
  const inactive = clients.filter(c=>c.is_inactive);
  if (!clients.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px">Inga klienter ännu</div>';
    return;
  }
  list.innerHTML = [...active,...inactive].map(c=>{
    const init = (c.admin_label||c.display_name||'?')[0].toUpperCase();
    const seen = c.last_seen_at ? timeAgo(c.last_seen_at) : '';
    const unread = c.unread_count>0 ? `<div class="unread-badge">${c.unread_count}</div>` : '';
    return `<div class="client-row${c.is_inactive?' client-inactive':''}" onclick="openChat('${c.id}')">
      <div class="client-avatar">${init}</div>
      <div class="client-body">
        <div class="client-name">${esc(c.admin_label||c.display_name)}</div>
        <div class="client-label">${c.admin_label?esc(c.display_name):''}</div>
      </div>
      <div class="client-right">
        ${unread}
        <div class="last-seen-txt">${seen}</div>
      </div>
    </div>`;
  }).join('');
}

function updateUnreadBadge() {
  totalUnread = clients.reduce((s,c)=>s+(c.unread_count||0),0);
  const badge = document.getElementById('clients-badge');
  if (totalUnread>0) { badge.textContent=totalUnread; badge.style.display='flex'; }
  else badge.style.display='none';
}

// ── Chat ──
async function openChat(clientId) {
  currentClientId = clientId;
  document.getElementById('chat-panel').classList.add('open');
  updateChatHeader();
  const r = await api(`/api/messages/${clientId}`);
  const d = await r.json();
  const msgs = d.messages||[];
  const c = document.getElementById('chat-messages');
  c.innerHTML = !msgs.length
    ? '<div class="chat-empty">💬 Ingen konversation ännu</div>'
    : msgs.map(msgHTML).join('');
  c.scrollTop = c.scrollHeight;
  await markRead(clientId);
  const cl = clients.find(x=>x.id===clientId);
  if (cl) { cl.unread_count=0; renderClients(); updateUnreadBadge(); }
}

function updateChatHeader() {
  const c = clients.find(x=>x.id===currentClientId);
  if (!c) return;
  document.getElementById('cp-name').textContent = c.admin_label||c.display_name;
  document.getElementById('cp-sub').textContent = c.admin_label ? c.display_name : '';
  document.getElementById('label-input').value = c.admin_label||'';
  document.getElementById('toggle-inactive-btn').textContent = c.is_inactive ? 'Aktivera' : 'Inaktivera';
}

function appendMsg(m) {
  const c = document.getElementById('chat-messages');
  const empty = c.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = msgHTML(m);
  c.appendChild(div.firstElementChild);
  c.scrollTop = c.scrollHeight;
}

function msgHTML(m) {
  const time = new Date(m.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const from = m.sender==='admin' ? 'from-admin' : 'from-client';
  const media = m.message_media||[];
  const mediaHTML = media.map(md=>md.storage_url
    ? (md.type==='video'
      ? `<video src="${md.storage_url}" controls style="max-width:200px;border-radius:10px;margin-top:6px;display:block"></video>`
      : `<img src="${md.thumbnail_url||md.storage_url}" data-full="${md.storage_url}" onclick="openLightbox(this.dataset.full)" style="max-width:200px;border-radius:10px;margin-top:6px;cursor:pointer;display:block" loading="lazy">`)
    : `<span style="font-size:12px;color:#555;font-style:italic">Bild ej tillgänglig</span>`
  ).join('');
  const tick = m.sender==='admin' ? `<span class="read-tick">${m.read?'✓✓':'✓'}</span>` : '';
  return `<div class="msg-row ${from}">
    <div class="bubble">${m.text?esc(m.text):''}${mediaHTML?`<div class="bubble-media">${mediaHTML}</div>`:''}</div>
    <div class="msg-meta">${time} ${tick}</div>
  </div>`;
}

function markMsgsReadUI() {
  document.querySelectorAll('.msg-row.from-admin .read-tick').forEach(el=>el.textContent='✓✓');
}

async function markRead(clientId) {
  await api(`/api/messages/${clientId}/read`, { method:'POST' });
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !pendingChatMedia.length) return;
  input.value = '';
  const r = await api(`/api/messages/${currentClientId}`, {
    method:'POST', body: JSON.stringify({ text, media: pendingChatMedia })
  });
  if (r.ok) {
    pendingChatMedia = [];
    document.getElementById('chat-media-prev').innerHTML = '';
    const d = await r.json();
    appendMsg(d.message);
  }
}

document.getElementById('send-btn').onclick = sendMessage;
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (socket) socket.emit('admin:typing', { client_id: currentClientId });
});

document.getElementById('chat-back').onclick = () => {
  document.getElementById('chat-panel').classList.remove('open');
  currentClientId = null;
};

document.getElementById('label-save-btn').onclick = async () => {
  if (!currentClientId) return;
  const label = document.getElementById('label-input').value.trim();
  await api(`/api/clients/${currentClientId}/label`, { method:'PATCH', body: JSON.stringify({ admin_label: label }) });
};

document.getElementById('toggle-inactive-btn').onclick = async () => {
  if (!currentClientId) return;
  await api(`/api/clients/${currentClientId}/inactive`, { method:'PATCH' });
};

// ── Media upload ──
async function uploadFiles(files, arr, prevEl) {
  const form = new FormData();
  files.forEach(f=>form.append('files',f));
  const r = await fetch('/api/upload', { method:'POST', headers:{Authorization:`Bearer ${token}`}, body:form });
  if (!r.ok) { alert('Uppladdning misslyckades'); return; }
  const d = await r.json();
  for (const f of d.files) {
    arr.push(f);
    const div = document.createElement('div');
    div.className = arr===pendingMedia ? 'prev-thumb' : 'prev-sm';
    const cls = arr===pendingMedia ? 'prev-thumb' : 'prev-sm';
    div.className = cls;
    div.innerHTML = f.type==='video'
      ? `<video src="${f.url}" muted></video><button onclick="rmFile(this,'${f.url}',${arr===pendingMedia})">✕</button>`
      : `<img src="${f.thumbUrl}"><button onclick="rmFile(this,'${f.url}',${arr===pendingMedia})">✕</button>`;
    prevEl.appendChild(div);
  }
}

function rmFile(btn, url, isBc) {
  const arr = isBc ? pendingMedia : pendingChatMedia;
  const i = arr.findIndex(f=>f.url===url);
  if (i>=0) arr.splice(i,1);
  btn.closest(isBc?'.prev-thumb':'.prev-sm').remove();
}

document.getElementById('file-input').addEventListener('change', async e => {
  await uploadFiles(Array.from(e.target.files), pendingMedia, document.getElementById('bc-media-preview'));
  e.target.value = '';
});
document.getElementById('chat-file-input').addEventListener('change', async e => {
  await uploadFiles(Array.from(e.target.files), pendingChatMedia, document.getElementById('chat-media-prev'));
  e.target.value = '';
});

// ── Invites ──
document.getElementById('invite-open-btn').onclick = () => {
  document.getElementById('invite-links').innerHTML = '';
  document.getElementById('invite-modal').classList.add('open');
};
document.getElementById('gen-invites-btn').onclick = async () => {
  const count = parseInt(document.getElementById('invite-count').value)||1;
  const r = await api('/api/invite', { method:'POST', body: JSON.stringify({ count }) });
  const d = await r.json();
  const container = document.getElementById('invite-links');
  container.innerHTML = '';
  for (const t of d.tokens) {
    const url = `${location.origin}/join/${t}`;
    const div = document.createElement('div');
    div.className = 'invite-row';
    div.innerHTML = `<span class="invite-url">${url}</span><button class="copy-btn" onclick="copyLink('${url}',this)">Kopiera</button>`;
    container.appendChild(div);
  }
};

async function copyLink(url, btn) {
  await navigator.clipboard.writeText(url);
  btn.textContent = '✓ Kopierat';
  setTimeout(()=>btn.textContent='Kopiera', 2000);
}

// ── Modal close on backdrop ──
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target===m) m.classList.remove('open'); });
});

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById('lb-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick = e => {
  if (e.target===e.currentTarget||e.target.id==='lb-close') document.getElementById('lightbox').classList.remove('open');
};

// ── Utils ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(iso) {
  const d = (Date.now()-new Date(iso))/1000;
  if (d<60) return 'just nu';
  if (d<3600) return `${Math.floor(d/60)}m`;
  if (d<86400) return `${Math.floor(d/3600)}t`;
  return `${Math.floor(d/86400)}d`;
}

// ── Boot ──
if (token) {
  fetch('/api/clients', { headers: { Authorization:`Bearer ${token}` } })
    .then(r => { if (r.ok) initApp(); else { localStorage.removeItem('vp_admin_token'); token=null; } })
    .catch(()=>{});
}
</script>
</body>
</html>

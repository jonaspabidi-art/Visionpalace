<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vision Palace – Admin</title>
<link rel="manifest" href="/admin-manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="VP Admin">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --blue: #4a9eff;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* ── Login ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100dvh; padding: 24px; background: var(--bg);
}
.login-card { width: 100%; max-width: 360px; text-align: center; }
.login-logo {
  width: 88px; height: 88px; border-radius: 22px; background: #fff;
  overflow: hidden; margin: 0 auto 16px;
  box-shadow: 0 8px 32px rgba(255,255,255,.12);
}
.login-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.login-card h1 {
  font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic;
  font-size: 30px; font-weight: 300; letter-spacing: 0.04em; margin-bottom: 6px;
}
.login-card p { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
.login-card input {
  width: 100%; padding: 15px 18px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 16px; outline: none; transition: border-color .2s;
  -webkit-appearance: none;
}
.login-card input:focus { border-color: var(--blue); }
.login-btn {
  width: 100%; margin-top: 12px; padding: 15px; background: var(--blue); border: none;
  border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
}
.login-btn:active { opacity: .85; }
.login-error { color: #ff5555; font-size: 13px; margin-top: 12px; }

/* ── App shell ── */
#app { display: none; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 14px; display: flex; align-items: center; gap: 10px;
  height: calc(56px + var(--safe-top)); padding-top: var(--safe-top);
  flex-shrink: 0;
}
.header-logo {
  width: 36px; height: 36px; border-radius: 10px; background: #fff;
  overflow: hidden; flex-shrink: 0;
}
.header-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.hbtn {
  padding: 7px 13px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.hbtn:active { opacity: .75; }
.hbtn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.icon-btn {
  width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ── Search bar ── */
#search-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 14px; flex-shrink: 0;
}
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.search-input {
  width: 100%; padding: 9px 14px 9px 36px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 11px; color: var(--text);
  font-size: 14px; outline: none; -webkit-appearance: none;
}
.search-input:focus { border-color: var(--blue); }

/* ── Tab bar ── */
.tab-bar {
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot); flex-shrink: 0;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 0; background: none; border: none; cursor: pointer; gap: 4px;
  color: var(--text3); transition: color .15s; position: relative;
}
.tab-btn.active { color: var(--blue); }
.tab-icon { display: flex; align-items: center; justify-content: center; height: 20px; }
.tab-icon svg { width: 20px; height: 20px; }
.tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
.tab-badge {
  position: absolute; top: 6px; right: calc(50% - 20px);
  background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; display: none;
  align-items: center; justify-content: center; padding: 0 4px;
}

/* ── Views ── */
.view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* ══════════════════════════════════════════
   BROADCAST VIEW — WhatsApp group chat style
══════════════════════════════════════════ */
#broadcast-view { display: none; flex-direction: column; }
#broadcast-view.active { display: flex; }

.bc-feed {
  flex: 1; overflow-y: auto; padding: 14px 14px 10px;
  display: flex; flex-direction: column; gap: 2px;
  -webkit-overflow-scrolling: touch;
}
.bc-feed::-webkit-scrollbar { display: none; }

.feed-empty {
  margin: auto; color: var(--text3); font-size: 14px; text-align: center; padding: 40px 0;
}

/* Each broadcast row — right-aligned (admin sends) */
.bc-msg-row {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  margin-bottom: 6px;
}

.bc-pin-tag {
  font-size: 10px; color: var(--blue); margin-bottom: 2px;
  padding-right: 2px; letter-spacing: 0.2px; opacity: 0.8;
}

.bc-bubble {
  max-width: 84%;
  background: var(--blue);
  color: #fff;
  border-radius: 18px 18px 4px 18px;
  padding: 10px 13px 8px;
  word-break: break-word;
}

.bc-bubble-media { margin-bottom: 8px; }
.bc-bubble-media img {
  max-width: 220px; width: 100%; border-radius: 10px;
  display: block; cursor: pointer; margin-bottom: 2px;
}
.bc-bubble-media video {
  max-width: 220px; width: 100%; border-radius: 10px; display: block;
}
.bc-media-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
  border-radius: 10px; overflow: hidden; max-width: 220px;
}
.bc-media-grid img {
  width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block;
}

.bc-bubble-price {
  font-size: 16px; font-weight: 800; margin-bottom: 4px;
  color: rgba(255,255,255,.9);
}
.bc-bubble-text {
  font-size: 15px; line-height: 1.4; white-space: pre-wrap;
}

.bc-bubble-footer {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; margin-top: 6px;
}
.bc-bubble-time { font-size: 11px; opacity: .6; }
.bc-react-btn {
  background: rgba(255,255,255,.18); border: none; color: #fff;
  border-radius: 10px; padding: 3px 9px; font-size: 11px;
  cursor: pointer; font-family: inherit;
}
.bc-react-btn:active { opacity: .75; }
.bc-pin-btn {
  background: none; border: none; color: rgba(255,255,255,.5);
  font-size: 14px; cursor: pointer; padding: 0; line-height: 1;
}
.bc-pin-btn.pinned { color: #fff; }
.bc-del-btn {
  background: none; border: none; color: rgba(255,255,255,.3);
  font-size: 14px; cursor: pointer; padding: 0; line-height: 1; transition: color .15s;
}
.bc-del-btn:active { color: #ff5555; }

/* Optimistic / pending broadcast bubble */
.bc-msg-row.pending .bc-bubble { opacity: 0.62; }
.bc-msg-row.pending .bc-bubble-footer .bc-react-btn,
.bc-msg-row.pending .bc-bubble-footer .bc-pin-btn,
.bc-msg-row.pending .bc-bubble-footer .bc-del-btn { display: none; }
.bc-sending-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,.55); border-top-color: transparent;
  animation: spin .7s linear infinite; vertical-align: middle;
}
.bc-msg-row.failed .bc-bubble { background: #802929; opacity: 1; }
.bc-msg-row.failed .bc-bubble-footer .bc-retry-btn {
  background: rgba(255,255,255,.18); border: none; color: #fff;
  border-radius: 10px; padding: 3px 9px; font-size: 11px;
  cursor: pointer; font-family: inherit;
}

/* Date separator */
.bc-date-sep { text-align: center; margin: 10px 0 8px; }
.bc-date-sep span {
  background: var(--surface2); color: var(--text3); font-size: 11px;
  font-weight: 500; padding: 4px 12px; border-radius: 10px;
}

/* ── Broadcast composer ── */
.bc-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 8px 12px; padding-bottom: max(8px, var(--safe-bot)); flex-shrink: 0;
}
.bc-media-prev {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
}
.prev-sm {
  position: relative; width: 56px; height: 56px; border-radius: 8px;
  overflow: hidden; border: 1px solid var(--border);
}
.prev-sm img, .prev-sm video { width: 100%; height: 100%; object-fit: cover; }
.prev-sm button {
  position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  background: rgba(0,0,0,.8); border: none; color: #fff; border-radius: 50%;
  font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
@keyframes spin { to { transform: rotate(360deg); } }
.prev-sm.uploading::after {
  content: ''; position: absolute; inset: 0; background: rgba(0,0,0,.45); z-index: 1;
}
.prev-sm.uploading::before {
  content: ''; position: absolute; top: 50%; left: 50%;
  width: 18px; height: 18px; margin: -9px 0 0 -9px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
  border-radius: 50%; animation: spin .7s linear infinite; z-index: 2;
}

.bc-extras {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.bc-price-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 8px 12px; font-size: 14px;
  outline: none; -webkit-appearance: none;
}
.bc-price-input:focus { border-color: var(--blue); }
.bc-price-input::placeholder { color: var(--text3); }
.pin-toggle-sm {
  display: flex; align-items: center; gap: 6px; font-size: 13px;
  color: var(--text2); white-space: nowrap; cursor: pointer;
}
.pin-toggle-sm input { accent-color: var(--blue); width: 16px; height: 16px; }

.bc-main-row { display: flex; gap: 8px; align-items: flex-end; }

.attach-bc {
  width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 22px; font-weight: 300;
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.attach-bc input { display: none; }

.extras-toggle {
  width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  letter-spacing: 1px;
}
.extras-toggle.active { border-color: var(--blue); color: var(--blue); }

.bc-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px;
  color: var(--text); padding: 10px 16px; font-size: 15px; resize: none; outline: none;
  max-height: 120px; min-height: 40px; font-family: inherit; line-height: 1.4;
}
.bc-input:focus { border-color: var(--blue); }
.bc-input::placeholder { color: var(--text3); }

.send-btn {
  width: 40px; height: 40px; background: var(--blue); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.send-btn:active { opacity: .85; }

/* ══════════════════════════════════════════
   CLIENTS VIEW
══════════════════════════════════════════ */
#clients-view { overflow-y: auto; -webkit-overflow-scrolling: touch; }
#clients-view::-webkit-scrollbar { display: none; }
.clients-list { padding: 8px 0; }
.client-row {
  display: flex; align-items: center; gap: 12px; padding: 13px 16px;
  border-bottom: 1px solid rgba(255,255,255,.04); cursor: pointer; transition: background .12s;
}
.client-row:active { background: var(--surface); }
.client-avatar {
  width: 46px; height: 46px; border-radius: 50%; background: #1a3a6a;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--blue); flex-shrink: 0;
}
.client-body { flex: 1; min-width: 0; }
.client-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-label { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.unread-badge {
  background: var(--blue); color: #fff; font-size: 11px; font-weight: 700;
  min-width: 20px; height: 20px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; padding: 0 5px;
}
.last-seen-txt { font-size: 11px; color: var(--text3); }
.client-inactive { opacity: .35; }

/* ══════════════════════════════════════════
   PRIVATE CHAT PANEL
══════════════════════════════════════════ */
#chat-panel {
  position: fixed; inset: 0; background: var(--bg); z-index: 40;
  display: none; flex-direction: column;
  transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
}
#chat-panel.open { display: flex; transform: translateX(0); }

.chat-panel-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; display: flex; align-items: center; gap: 12px;
  height: calc(56px + var(--safe-top)); padding-top: var(--safe-top); flex-shrink: 0;
}
.back-btn {
  background: none; border: none; color: var(--blue); font-size: 22px;
  cursor: pointer; padding: 4px; display: flex; align-items: center;
}
.chat-panel-info { flex: 1; min-width: 0; }
.chat-panel-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-panel-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.danger-btn {
  padding: 6px 12px; border-radius: 8px; border: 1px solid #ff3b30;
  background: transparent; color: #ff3b30; font-size: 12px; cursor: pointer; white-space: nowrap;
}

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px;
  -webkit-overflow-scrolling: touch;
}
.chat-messages::-webkit-scrollbar { display: none; }

.msg-row { display: flex; flex-direction: column; margin-bottom: 2px; }
.msg-row.from-admin { align-items: flex-end; }
.msg-row.from-client { align-items: flex-start; }
.bubble {
  max-width: 78%; padding: 9px 13px; border-radius: 18px;
  word-break: break-word; white-space: pre-wrap; font-size: 15px; line-height: 1.4;
}
.msg-row.from-admin .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 5px; }
.msg-row.from-client .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 5px; }
.msg-meta { font-size: 11px; color: var(--text3); margin: 3px 4px 6px; display: flex; align-items: center; gap: 4px; }
.msg-row.from-admin .msg-meta { align-self: flex-end; }
.read-tick { color: rgba(255,255,255,.6); }
.bubble-media img { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; cursor: pointer; }
.bubble-media video { max-width: 200px; border-radius: 10px; display: block; margin-top: 6px; }
.typing-row { padding: 4px 16px 8px; }
.typing-dots { display: inline-flex; gap: 4px; padding: 10px 14px; background: var(--surface2); border-radius: 18px; border-bottom-left-radius: 5px; }
.typing-dots span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: bounce .9s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

.label-bar {
  padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.label-bar input {
  flex: 1; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 13px; outline: none;
}
.label-bar input:focus { border-color: var(--blue); }
.label-save { padding: 8px 14px; background: var(--blue); border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }

.chat-composer {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 12px; padding-bottom: max(10px, var(--safe-bot)); flex-shrink: 0;
}
.chat-media-prev { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.composer-row { display: flex; gap: 8px; align-items: flex-end; }
.attach-sm {
  width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px;
  color: var(--text); padding: 10px 16px; font-size: 15px; resize: none; outline: none;
  max-height: 120px; min-height: 40px; font-family: inherit; line-height: 1.4;
}
.msg-input:focus { border-color: var(--blue); }
.msg-input::placeholder { color: var(--text3); }
#chat-file-input { display: none; }
.chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: var(--text3); font-size: 14px; }

/* ── Modals ── */
.modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 80; align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-sheet {
  background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 500px;
  padding: 20px; padding-bottom: max(20px, var(--safe-bot)); max-height: 80dvh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

.invite-row {
  display: flex; align-items: center; gap: 8px; background: var(--surface2);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
}
.invite-url { flex: 1; font-size: 12px; color: var(--blue); word-break: break-all; line-height: 1.4; }
.copy-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; flex-shrink: 0; }

.reaction-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface2); border-radius: 10px; margin-bottom: 6px; font-size: 13px; }
.reaction-name { font-weight: 600; }
.reaction-val { color: var(--text2); }

/* ── Lightbox ── */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 999; align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
#lb-close { position: absolute; top: max(16px, var(--safe-top)); right: 16px; background: rgba(255,255,255,.12); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><img src="/logo.png" alt="Vision Palace"></div>
    <h1>Vision Palace</h1>
    <p>Admin-inloggning</p>
    <input type="password" id="pw-input" placeholder="Lösenord" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Logga in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">

  <!-- Header -->
  <div class="app-header">
    <div class="header-logo"><img src="/logo.png" alt="VP"></div>
    <div class="header-title" id="header-title">Sändningar</div>
    <button class="icon-btn" id="search-toggle-btn" title="Sök" style="font-size:13px;font-weight:600;letter-spacing:0.3px">Sök</button>
    <button class="hbtn" id="notif-btn" onclick="enableNotifs()" style="display:none">🔔 Notiser</button>
    <button class="hbtn primary" id="invite-open-btn">+ Bjud in</button>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

let token = localStorage.getItem('vp_admin_token');
let socket = null;
let broadcasts = [];
let clients = [];
let currentClientId = null;
let pendingBcMedia = [];
let pendingChatMedia = [];
let inFlightBcTempIds = new Set();
let bcLoadGen = 0;
let totalUnread = 0;
let extrasOpen = false;
let searchVisible = false;

// ── Auth ──
document.getElementById('login-btn').onclick = login;
document.getElementById('pw-input').addEventListener('keydown', e => e.key === 'Enter' && login());

async function login() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch('/api/auth/admin', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error || 'Fel lösenord'; return; }
    token = d.token;
    localStorage.setItem('vp_admin_token', token);
    initApp();
  } catch { err.textContent = 'Anslutningsfel'; }
}

document.getElementById('logout-btn').onclick = () => {
  localStorage.removeItem('vp_admin_token');
  location.reload();
};

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab + '-view').classList.add('active');
  document.getElementById('header-title').textContent = tab === 'broadcast' ? 'Sändningar' : 'Klienter';
  // Show search toggle only on broadcast tab
  document.getElementById('search-toggle-btn').style.display = tab === 'broadcast' ? '' : 'none';
  if (tab !== 'broadcast' && searchVisible) toggleSearch();
}

// ── Search toggle ──
document.getElementById('search-toggle-btn').onclick = toggleSearch;
function toggleSearch() {
  searchVisible = !searchVisible;
  document.getElementById('search-bar').style.display = searchVisible ? '' : 'none';
  if (!searchVisible) {
    document.getElementById('search-input').value = '';
    loadBroadcasts();
  }
}
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(window._st);
  window._st = setTimeout(() => loadBroadcasts(e.target.value), 300);
});

// ── Extras toggle (price + pin) ──
document.getElementById('bc-extras-btn').onclick = () => {
  extrasOpen = !extrasOpen;
  document.getElementById('bc-extras').style.display = extrasOpen ? 'flex' : 'none';
  document.getElementById('bc-extras-btn').classList.toggle('active', extrasOpen);
};

// ── Init ──
function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  connectSocket();
  loadBroadcasts();
  loadClients();
  setTimeout(setupPush, 2000);
}

async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (Notification.permission === 'denied') return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-btn').style.display = '';
    return;
  }
  await registerAdminPushSub();
}

async function enableNotifs() {
  const perm = await Notification.requestPermission();
  document.getElementById('notif-btn').style.display = 'none';
  if (perm !== 'granted') return;
  await registerAdminPushSub();
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:${type==='error'?'#3d1a1a':'#1a3d2a'};color:${type==='error'?'#ff8888':'#66dd99'};
    border:1px solid ${type==='error'?'rgba(255,80,80,.4)':'rgba(80,200,120,.4)'};
    padding:10px 18px;border-radius:12px;font-size:13px;z-index:999;
    max-width:90vw;text-align:center;pointer-events:none;white-space:pre-wrap;word-break:break-all;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), type === 'error' ? 8000 : 3000);
}

async function registerAdminPushSub() {
  try {
    const kr = await fetch('/api/push/vapid-key');
    if (!kr.ok) throw new Error('vapid-key ' + kr.status);
    const { publicKey } = await kr.json();
    if (!publicKey) throw new Error('no publicKey');

    const sw = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('SW timeout')), 10000))
    ]);

    const existing = await sw.pushManager.getSubscription();
    if (existing) await existing.unsubscribe();
    const sub = await sw.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey)
    });
    if (!sub) throw new Error('subscribe returned null');

    const r = await fetch('/api/push/admin-subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ subscription: sub.toJSON() })
    });
    if (!r.ok) throw new Error('server ' + r.status);
    console.log('[Push] Admin subscription saved');
  } catch(e) {
    console.error('[Push] Admin setup failed:', e);
    showToast('Notiser: ' + e.message, 'error');
  }
}

function urlBase64ToUint8Array(b64) {
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

function connectSocket() {
  socket = io({ auth: { token }, transports: ['websocket', 'polling'] });

  socket.on('admin:new_broadcast', d => {
    // Our own optimistic POST is still in flight — let the HTTP response replace the pending bubble
    if (d.client_temp_id && inFlightBcTempIds.has(d.client_temp_id)) return;
    if (broadcasts.find(x => x.id === d.broadcast.id)) return;
    broadcasts.push(d.broadcast);
    appendBroadcast(d.broadcast);
  });

  socket.on('broadcast:pin_updated', d => {
    const b = broadcasts.find(x => x.id === d.id);
    if (b) b.is_pinned = d.is_pinned;
    renderFeed();
  });

  socket.on('broadcast:deleted', d => {
    broadcasts = broadcasts.filter(b => b.id !== d.id);
    const row = document.querySelector(`.bc-msg-row[data-id="${d.id}"]`);
    if (row) row.remove();
  });

  socket.on('broadcast:new_reaction', d => {
    const b = broadcasts.find(x => x.id === d.broadcast_id);
    if (b) b.broadcast_reactions = d.reactions;
    // Update just the reaction counts in the DOM
    updateReactionUI(d.broadcast_id, d.reactions);
  });

  socket.on('client:new_message', d => {
    if (currentClientId === d.client.id) {
      appendMsg(d.message);
      markRead(currentClientId);
    } else {
      let c = clients.find(x => x.id === d.client.id);
      if (!c) {
        // Client not in local list yet — refresh from server
        loadClients();
      } else {
        c.unread_count = (c.unread_count || 0) + 1;
        renderClients();
        updateUnreadBadge();
      }
    }
  });

  socket.on('client:last_seen', d => {
    const c = clients.find(x => x.id === d.client_id);
    if (c) { c.last_seen_at = d.last_seen_at; renderClients(); }
  });

  socket.on('client:joined', d => { clients.unshift({ ...d.client, unread_count: 0 }); renderClients(); });

  // After reconnect (e.g. server restart), reload fresh data and re-register push
  socket.on('connect', () => {
    loadBroadcasts();
    loadClients();
    setupPush();
  });

  socket.on('client:updated', d => {
    const i = clients.findIndex(x => x.id === d.client.id);
    if (i >= 0) clients[i] = { ...clients[i], ...d.client };
    renderClients();
    if (currentClientId === d.client.id) updateChatHeader();
  });

  socket.on('client:typing', d => {
    if (currentClientId === d.client_id) {
      const row = document.getElementById('typing-row');
      row.style.display = 'block';
      clearTimeout(window._tt);
      window._tt = setTimeout(() => row.style.display = 'none', 3000);
    }
  });

  socket.on('client:read_receipt', d => {
    if (currentClientId === d.client_id) markMsgsReadUI();
  });
}

// ── API ──
function api(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) }
  });
}

// ── Broadcasts ──
async function loadBroadcasts(q = '') {
  const gen = ++bcLoadGen;
  const url = q ? `/api/broadcasts/search?q=${encodeURIComponent(q)}` : '/api/broadcasts';
  const r = await api(url);
  if (gen !== bcLoadGen) return; // a newer call is already in flight — discard this result
  const d = await r.json();
  if (gen !== bcLoadGen) return;
  const pending = broadcasts.filter(b => b._pending || b._failed);
  const fresh = (d.broadcasts || []).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  broadcasts = [...fresh, ...pending];
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('bc-feed');
  if (!broadcasts.length) {
    feed.innerHTML = '<div class="feed-empty">Inga sändningar ännu</div>';
    return;
  }
  let html = '';
  let lastDate = '';
  for (const b of broadcasts) {
    const d = new Date(b.created_at);
    const dateStr = d.toLocaleDateString('sv-SE', { day: '2-digit', month: 'short', year: 'numeric' });
    if (dateStr !== lastDate) {
      html += `<div class="bc-date-sep"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
    }
    html += bcBubbleHTML(b);
  }
  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

function appendBroadcast(b) {
  if (document.querySelector(`.bc-msg-row[data-id="${b.id}"]`)) return;
  const feed = document.getElementById('bc-feed');
  const empty = feed.querySelector('.feed-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = bcBubbleHTML(b);
  feed.appendChild(div.firstElementChild);
  requestAnimationFrame(() => { feed.scrollTop = feed.scrollHeight; });
}

function bcBubbleHTML(b) {
  const time = new Date(b.created_at).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const media = b.broadcast_media || [];
  const interested = (b.broadcast_reactions || []).filter(r => r.reaction === 'interested').length;
  const notInt = (b.broadcast_reactions || []).filter(r => r.reaction === 'not_interested').length;
  const pending = !!b._pending;
  const failed = !!b._failed;

  const imgSrc = m => m.thumbnail_url || m.storage_url || '';
  const imgAttrs = m => (pending || failed)
    ? ''
    : `data-full="${m.storage_url}" onclick="openLightbox(this.dataset.full)"`;

  let mediaHTML = '';
  if (media.length === 1) {
    const m = media[0];
    mediaHTML = m.storage_url
      ? (m.type === 'video'
        ? `<video src="${m.storage_url}" ${pending ? '' : 'controls'} style="max-width:220px;border-radius:10px;display:block;margin-bottom:6px"></video>`
        : `<img src="${imgSrc(m)}" ${imgAttrs(m)} style="max-width:220px;border-radius:10px;display:block;margin-bottom:6px;cursor:${pending ? 'default' : 'pointer'}" loading="lazy">`)
      : '';
  } else if (media.length > 1) {
    const imgs = media.map(m => m.storage_url && m.type !== 'video'
      ? `<img src="${imgSrc(m)}" ${imgAttrs(m)} loading="lazy">`
      : ''
    ).join('');
    mediaHTML = `<div class="bc-media-grid" style="margin-bottom:6px">${imgs}</div>`;
  }

  let footerHTML;
  if (pending) {
    footerHTML = `<span class="bc-bubble-time">Skickar… <span class="bc-sending-dot"></span></span>`;
  } else if (failed) {
    footerHTML = `<span class="bc-bubble-time" style="color:#ffb3b3">Misslyckades</span>
      <button class="bc-retry-btn" onclick="retryBroadcast('${b.id}')">Försök igen</button>
      <button class="bc-del-btn" onclick="discardFailedBroadcast('${b.id}')" title="Släng">✕</button>`;
  } else {
    footerHTML = `<span class="bc-bubble-time">${time}</span>
      <button class="bc-react-btn" onclick="showReactions('${b.id}')">✓ ${interested} &nbsp; ✕ ${notInt}</button>
      <button class="bc-pin-btn${b.is_pinned ? ' pinned' : ''}" onclick="togglePin('${b.id}')" title="${b.is_pinned ? 'Ta bort fästning' : 'Fäst'}">◈</button>
      <button class="bc-del-btn" onclick="deleteBroadcast('${b.id}')" title="Ta bort">✕</button>`;
  }

  const rowCls = `bc-msg-row${pending ? ' pending' : ''}${failed ? ' failed' : ''}`;
  return `<div class="${rowCls}" data-id="${b.id}">
    ${b.is_pinned ? '<div class="bc-pin-tag">◈ Fäst</div>' : ''}
    <div class="bc-bubble">
      ${mediaHTML}
      ${b.price ? `<div class="bc-bubble-price">${esc(b.price)}</div>` : ''}
      ${b.text ? `<div class="bc-bubble-text">${esc(b.text)}</div>` : ''}
      <div class="bc-bubble-footer">${footerHTML}</div>
    </div>
  </div>`;
}

function updateReactionUI(broadcastId, reactions) {
  const row = document.querySelector(`.bc-msg-row[data-id="${broadcastId}"]`);
  if (!row) return;
  const interested = reactions.filter(r => r.reaction === 'interested').length;
  const notInt = reactions.filter(r => r.reaction === 'not_interested').length;
  const btn = row.querySelector('.bc-react-btn');
  if (btn) btn.innerHTML = `✓ ${interested} &nbsp; ✕ ${notInt}`;
}

function postBroadcast() {
  const text = document.getElementById('bc-text').value.trim();
  const price = document.getElementById('bc-price').value.trim();
  const is_pinned = document.getElementById('bc-pin').checked;
  const items = pendingBcMedia.filter(i => !i.removed);
  if (!text && !price && items.length === 0) return;

  // Clear composer instantly — gives immediate feedback regardless of network speed
  document.getElementById('bc-text').value = '';
  document.getElementById('bc-price').value = '';
  document.getElementById('bc-pin').checked = false;
  pendingBcMedia = [];
  document.getElementById('bc-media-prev').innerHTML = '';
  if (extrasOpen) {
    extrasOpen = false;
    document.getElementById('bc-extras').style.display = 'none';
    document.getElementById('bc-extras-btn').classList.remove('active');
  }
  autoResize(document.getElementById('bc-text'));

  // Build optimistic broadcast and show it in the feed immediately
  const tempId = 'tmp-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  inFlightBcTempIds.add(tempId);
  const optimistic = {
    id: tempId,
    text, price, is_pinned,
    created_at: new Date().toISOString(),
    broadcast_media: items.map(i => ({
      storage_url: i.url || i.localUrl,
      thumbnail_url: i.thumbUrl || i.localUrl,
      type: i.type
    })),
    broadcast_reactions: [],
    _pending: true,
    _items: items
  };
  broadcasts.push(optimistic);
  appendBroadcast(optimistic);

  sendBroadcast(optimistic);
}

async function sendBroadcast(optimistic) {
  const tempId = optimistic.id;
  try {
    // Wait for any uploads in this draft to finish
    const promises = [...new Set(optimistic._items.map(i => i.uploadPromise).filter(Boolean))];
    if (promises.length) await Promise.all(promises);

    // After uploads, every item must have a remote URL
    if (optimistic._items.some(i => !i.url)) throw new Error('upload incomplete');

    const media = optimistic._items.map(i => ({ url: i.url, thumbUrl: i.thumbUrl, type: i.type }));

    const r = await api('/api/broadcasts', {
      method: 'POST',
      body: JSON.stringify({
        text: optimistic.text,
        price: optimistic.price,
        is_pinned: optimistic.is_pinned,
        media,
        client_temp_id: tempId
      })
    });
    if (!r.ok) throw new Error('post failed');
    const d = await r.json();
    if (!d.broadcast) throw new Error('no broadcast in response');

    replaceOptimisticBroadcast(tempId, d.broadcast);
  } catch (e) {
    markBroadcastFailed(tempId);
  } finally {
    inFlightBcTempIds.delete(tempId);
  }
}

function replaceOptimisticBroadcast(tempId, real) {
  const idx = broadcasts.findIndex(b => b.id === tempId);
  if (idx >= 0) broadcasts[idx] = real;
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) {
    const div = document.createElement('div');
    div.innerHTML = bcBubbleHTML(real);
    row.replaceWith(div.firstElementChild);
  }
}

function markBroadcastFailed(tempId) {
  const b = broadcasts.find(x => x.id === tempId);
  if (!b) return;
  b._pending = false;
  b._failed = true;
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) {
    const div = document.createElement('div');
    div.innerHTML = bcBubbleHTML(b);
    row.replaceWith(div.firstElementChild);
  }
}

function retryBroadcast(tempId) {
  const b = broadcasts.find(x => x.id === tempId);
  if (!b) return;
  b._pending = true;
  b._failed = false;
  inFlightBcTempIds.add(tempId);
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) {
    const div = document.createElement('div');
    div.innerHTML = bcBubbleHTML(b);
    row.replaceWith(div.firstElementChild);
  }
  sendBroadcast(b);
}

function discardFailedBroadcast(tempId) {
  broadcasts = broadcasts.filter(b => b.id !== tempId);
  const row = document.querySelector(`.bc-msg-row[data-id="${tempId}"]`);
  if (row) row.remove();
}

document.getElementById('bc-send-btn').onclick = postBroadcast;
document.getElementById('bc-text').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postBroadcast(); }
});
document.getElementById('bc-text').addEventListener('input', function () { autoResize(this); });

async function deleteBroadcast(id) {
  if (!confirm('Ta bort detta meddelande för alla? Det går inte att ångra.')) return;
  // Remove instantly from UI — don't wait for server
  broadcasts = broadcasts.filter(b => b.id !== id);
  const row = document.querySelector(`.bc-msg-row[data-id="${id}"]`);
  if (row) row.remove();
  api(`/api/broadcasts/${id}`, { method: 'DELETE' });
}

async function togglePin(id) {
  const b = broadcasts.find(x => x.id === id);
  if (b) b.is_pinned = !b.is_pinned;
  renderFeed();
  api(`/api/broadcasts/${id}/pin`, { method: 'PATCH' });
}

async function showReactions(id) {
  const r = await api(`/api/reactions/${id}`);
  const d = await r.json();
  const list = document.getElementById('reaction-list');
  list.innerHTML = !d.reactions?.length
    ? '<div style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Inga reaktioner ännu</div>'
    : d.reactions.map(r => `<div class="reaction-item">
        <span class="reaction-name">${esc(r.clients?.admin_label || r.clients?.display_name || 'Okänd')}</span>
        <span class="reaction-val">${r.reaction === 'interested' ? '✓ Intresserad' : '✕ Inte intresserad'}</span>
      </div>`).join('');
  document.getElementById('reaction-modal').classList.add('open');
}

// ── Clients ──
function renderClients() {
  const list = document.getElementById('clients-list');
  const active = clients.filter(c => !c.is_inactive);
  const inactive = clients.filter(c => c.is_inactive);
  if (!clients.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px 0;font-size:14px">Inga klienter ännu</div>';
    return;
  }
  list.innerHTML = [...active, ...inactive].map(c => {
    const init = (c.admin_label || c.display_name || '?')[0].toUpperCase();
    const seen = c.last_seen_at ? timeAgo(c.last_seen_at) : '';
    const unread = c.unread_count > 0 ? `<div class="unread-badge">${c.unread_count}</div>` : '';
    return `<div class="client-row${c.is_inactive ? ' client-inactive' : ''}" onclick="openChat('${c.id}')">
      <div class="client-avatar">${init}</div>
      <div class="client-body">
        <div class="client-name">${esc(c.admin_label || c.display_name)}</div>
        <div class="client-label">${c.admin_label ? esc(c.display_name) : ''}</div>
      </div>
      <div class="client-right">
        ${unread}
        <div class="last-seen-txt">${seen}</div>
      </div>
    </div>`;
  }).join('');
}

function updateUnreadBadge() {
  totalUnread = clients.reduce((s, c) => s + (c.unread_count || 0), 0);
  const badge = document.getElementById('clients-badge');
  if (totalUnread > 0) { badge.textContent = totalUnread; badge.style.display = 'flex'; }
  else badge.style.display = 'none';
}

async function loadClients() {
  const r = await api('/api/clients');
  const d = await r.json();
  clients = d.clients || [];
  renderClients();
  updateUnreadBadge();
}

// ── Private chat ──
async function openChat(clientId) {
  currentClientId = clientId;
  document.getElementById('chat-panel').classList.add('open');
  updateChatHeader();
  const r = await api(`/api/messages/${clientId}`);
  const d = await r.json();
  const msgs = d.messages || [];
  const c = document.getElementById('chat-messages');
  c.innerHTML = !msgs.length
    ? '<div class="chat-empty">Ingen konversation ännu</div>'
    : msgs.map(msgHTML).join('');
  c.scrollTop = c.scrollHeight;
  await markRead(clientId);
  const cl = clients.find(x => x.id === clientId);
  if (cl) { cl.unread_count = 0; renderClients(); updateUnreadBadge(); }
}

function updateChatHeader() {
  const c = clients.find(x => x.id === currentClientId);
  if (!c) return;
  document.getElementById('cp-name').textContent = c.admin_label || c.display_name;
  document.getElementById('cp-sub').textContent = c.admin_label ? c.display_name : '';
  document.getElementById('label-input').value = c.admin_label || '';
  document.getElementById('toggle-inactive-btn').textContent = c.is_inactive ? 'Aktivera' : 'Inaktivera';
}

function appendMsg(m) {
  const c = document.getElementById('chat-messages');
  const empty = c.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.innerHTML = msgHTML(m);
  c.appendChild(div.firstElementChild);
  c.scrollTop = c.scrollHeight;
}

function msgHTML(m) {
  const time = new Date(m.created_at).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  const from = m.sender === 'admin' ? 'from-admin' : 'from-client';
  const media = m.message_media || [];
  const mediaHTML = media.map(md => md.storage_url
    ? (md.type === 'video'
      ? `<video src="${md.storage_url}" controls style="max-width:200px;border-radius:10px;margin-top:6px;display:block"></video>`
      : `<img src="${md.thumbnail_url || md.storage_url}" data-full="${md.storage_url}" onclick="openLightbox(this.dataset.full)" style="max-width:200px;border-radius:10px;margin-top:6px;cursor:pointer;display:block" loading="lazy">`)
    : `<span style="font-size:12px;color:#555;font-style:italic">Bild ej tillgänglig</span>`
  ).join('');
  const tick = m.sender === 'admin' ? `<span class="read-tick">${m.read ? '✓✓' : '✓'}</span>` : '';
  return `<div class="msg-row ${from}">
    <div class="bubble">${m.text ? esc(m.text) : ''}${mediaHTML ? `<div class="bubble-media">${mediaHTML}</div>` : ''}</div>
    <div class="msg-meta">${time} ${tick}</div>
  </div>`;
}

function markMsgsReadUI() {
  document.querySelectorAll('.msg-row.from-admin .read-tick').forEach(el => el.textContent = '✓✓');
}

async function markRead(clientId) {
  await api(`/api/messages/${clientId}/read`, { method: 'POST' });
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const items = pendingChatMedia.filter(i => !i.removed);
  if (!text && items.length === 0) return;
  input.value = '';
  autoResize(input);

  // Wait for any uploads in this draft
  const promises = [...new Set(items.map(i => i.uploadPromise).filter(Boolean))];
  if (promises.length) {
    try { await Promise.all(promises); }
    catch { return; } // alert already shown by uploadFiles
  }
  const media = items.map(i => ({ url: i.url, thumbUrl: i.thumbUrl, type: i.type }));

  const r = await api(`/api/messages/${currentClientId}`, {
    method: 'POST', body: JSON.stringify({ text, media })
  });
  if (r.ok) {
    pendingChatMedia = [];
    document.getElementById('chat-media-prev').innerHTML = '';
    const d = await r.json();
    appendMsg(d.message);
  }
}

document.getElementById('send-btn').onclick = sendMessage;
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (socket) socket.emit('admin:typing', { client_id: currentClientId });
});
document.getElementById('msg-input').addEventListener('input', function () { autoResize(this); });

document.getElementById('chat-back').onclick = () => {
  document.getElementById('chat-panel').classList.remove('open');
  currentClientId = null;
};

document.getElementById('label-save-btn').onclick = async () => {
  if (!currentClientId) return;
  const label = document.getElementById('label-input').value.trim();
  await api(`/api/clients/${currentClientId}/label`, { method: 'PATCH', body: JSON.stringify({ admin_label: label }) });
};

document.getElementById('toggle-inactive-btn').onclick = async () => {
  if (!currentClientId) return;
  await api(`/api/clients/${currentClientId}/inactive`, { method: 'PATCH' });
};

// ── Media upload ──
function uploadFiles(files, arr, prevEl) {
  const items = Array.from(files).map(file => {
    const localUrl = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video');
    const div = document.createElement('div');
    div.className = 'prev-sm uploading';
    div.innerHTML = isVideo
      ? `<video src="${localUrl}" muted></video><button>✕</button>`
      : `<img src="${localUrl}" alt=""><button>✕</button>`;
    const item = {
      localUrl,
      type: isVideo ? 'video' : 'image',
      url: null,
      thumbUrl: null,
      uploadPromise: null,
      removed: false,
      _div: div
    };
    div.querySelector('button').onclick = () => {
      item.removed = true;
      const idx = arr.indexOf(item);
      if (idx >= 0) arr.splice(idx, 1);
      div.remove();
    };
    prevEl.appendChild(div);
    arr.push(item);
    return { item, file };
  });

  const up = (async () => {
    const form = new FormData();
    items.forEach(({ file }) => form.append('files', file));
    const r = await fetch('/api/upload', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form });
    if (!r.ok) throw new Error('upload failed');
    const d = await r.json();
    d.files.forEach((f, i) => {
      const { item } = items[i];
      item.url = f.url;
      item.thumbUrl = f.thumbUrl;
      if (item._div.parentElement) item._div.classList.remove('uploading');
    });
  })();

  up.catch(() => {
    items.forEach(({ item }) => {
      if (item._div.parentElement) item._div.classList.remove('uploading');
    });
    alert('Uppladdning misslyckades');
  });

  items.forEach(({ item }) => item.uploadPromise = up);
}

document.getElementById('bc-file').addEventListener('change', e => {
  uploadFiles(Array.from(e.target.files), pendingBcMedia, document.getElementById('bc-media-prev'));
  e.target.value = '';
});
document.getElementById('chat-file-input').addEventListener('change', e => {
  uploadFiles(Array.from(e.target.files), pendingChatMedia, document.getElementById('chat-media-prev'));
  e.target.value = '';
});

// ── Invites ──
document.getElementById('invite-open-btn').onclick = () => {
  document.getElementById('invite-links').innerHTML = '';
  document.getElementById('invite-modal').classList.add('open');
};
document.getElementById('gen-invites-btn').onclick = async () => {
  const count = parseInt(document.getElementById('invite-count').value) || 1;
  const r = await api('/api/invite', { method: 'POST', body: JSON.stringify({ count }) });
  const d = await r.json();
  const container = document.getElementById('invite-links');
  container.innerHTML = '';
  for (const t of d.tokens) {
    const url = `${location.origin}/join/${t}`;
    const div = document.createElement('div');
    div.className = 'invite-row';
    div.innerHTML = `<span class="invite-url">${url}</span><button class="copy-btn" onclick="copyLink('${url}',this)">Kopiera</button>`;
    container.appendChild(div);
  }
};

async function copyLink(url, btn) {
  await navigator.clipboard.writeText(url);
  btn.textContent = '✓ Kopierat';
  setTimeout(() => btn.textContent = 'Kopiera', 2000);
}

// ── Modal close on backdrop ──
document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── Lightbox ──
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox').onclick = e => {
  if (e.target === e.currentTarget || e.target.id === 'lb-close')
    document.getElementById('lightbox').classList.remove('open');
};

// ── Auto-resize textareas ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Utils ──
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function timeAgo(iso) {
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 60) return 'just nu';
  if (d < 3600) return `${Math.floor(d / 60)}m`;
  if (d < 86400) return `${Math.floor(d / 3600)}t`;
  return `${Math.floor(d / 86400)}d`;
}

// ── Boot ──
if (token) {
  fetch('/api/clients', { headers: { Authorization: `Bearer ${token}` } })
    .then(r => { if (r.ok) initApp(); else { localStorage.removeItem('vp_admin_token'); token = null; } })
    .catch(() => {});
}
